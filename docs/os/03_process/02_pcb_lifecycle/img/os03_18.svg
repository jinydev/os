<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .node { rx: 40; stroke-width: 3; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#F8FAFC"/>
        </marker>
        <filter id="glow">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
        </filter>
    </defs>
    <rect width="900" height="500" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#F8FAFC" font-size="28" font-weight="800" text-anchor="middle">프로세스 상태 변화 (5 State Model)</text>

    <!-- NEW -->
    <g transform="translate(100, 100)" filter="url(#glow)">
        <rect width="130" height="130" rx="65" fill="#0EA5E9" fill-opacity="0.2" stroke="#38BDF8" stroke-width="4"/>
        <text x="65" y="70" fill="#E0F2FE" font-size="24" font-weight="800" text-anchor="middle">생성</text>
        <text x="65" y="95" fill="#BAE6FD" font-size="14" font-weight="600" text-anchor="middle">(New)</text>
    </g>

    <!-- READY -->
    <g transform="translate(260, 250)" filter="url(#glow)">
        <rect width="130" height="130" rx="65" fill="#3B82F6" fill-opacity="0.4" stroke="#60A5FA" stroke-width="4"/>
        <text x="65" y="70" fill="#EFF6FF" font-size="24" font-weight="800" text-anchor="middle">준비</text>
        <text x="65" y="95" fill="#BFDBFE" font-size="14" font-weight="600" text-anchor="middle">(Ready)</text>
    </g>

    <!-- RUNNING -->
    <g transform="translate(540, 250)" filter="url(#glow)">
        <rect width="130" height="130" rx="65" fill="#10B981" fill-opacity="0.4" stroke="#34D399" stroke-width="4"/>
        <text x="65" y="70" fill="#ECFDF5" font-size="24" font-weight="800" text-anchor="middle">실행</text>
        <text x="65" y="95" fill="#A7F3D0" font-size="14" font-weight="600" text-anchor="middle">(Running)</text>
    </g>

    <!-- WAIT -->
    <g transform="translate(260, 70)" filter="url(#glow)">
        <rect width="130" height="130" rx="65" fill="#F59E0B" fill-opacity="0.2" stroke="#FBBF24" stroke-width="4"/>
        <text x="65" y="70" fill="#FFFBEB" font-size="24" font-weight="800" text-anchor="middle">대기</text>
        <text x="65" y="95" fill="#FDE68A" font-size="14" font-weight="600" text-anchor="middle">(Blocked)</text>
    </g>

    <!-- TERMINATED -->
    <g transform="translate(730, 250)" filter="url(#glow)">
        <rect width="130" height="130" rx="65" fill="#64748B" fill-opacity="0.4" stroke="#94A3B8" stroke-width="4"/>
        <text x="65" y="70" fill="#F8FAFC" font-size="24" font-weight="800" text-anchor="middle">종료</text>
        <text x="65" y="95" fill="#E2E8F0" font-size="14" font-weight="600" text-anchor="middle">(Exit)</text>
    </g>

    <!-- Edges -->
    <path d="M 205 195 L 285 260" stroke="#F8FAFC" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="210" y="245" fill="#94A3B8" font-size="14" font-weight="600">Admitted</text>

    <!-- Ready -> Running -->
    <path d="M 390 290 L 530 290" stroke="#F8FAFC" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="460" y="275" fill="#F8FAFC" font-size="18" font-weight="800" text-anchor="middle">디스패치</text>
    
    <!-- Running -> Ready -->
    <path d="M 530 330 L 390 330" stroke="#F8FAFC" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="460" y="320" fill="#F8FAFC" font-size="18" font-weight="800" text-anchor="middle">인터럽트 (타임아웃)</text>

    <!-- Running -> Wait -->
    <path d="M 605 250 L 385 130" stroke="#F8FAFC" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="510" y="170" fill="#F8FAFC" font-size="16" font-weight="800" text-anchor="middle">입출력/이벤트 대기</text>

    <!-- Wait -> Ready -->
    <path d="M 325 200 L 325 240" stroke="#F8FAFC" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="340" y="225" fill="#F8FAFC" font-size="16" font-weight="800">입출력 완료</text>

    <!-- Running -> Terminated -->
    <path d="M 670 315 L 720 315" stroke="#F8FAFC" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="695" y="300" fill="#F8FAFC" font-size="16" font-weight="800" text-anchor="middle">종료/완료</text>

</svg>
