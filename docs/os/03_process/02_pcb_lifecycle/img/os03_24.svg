<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .box { stroke-width: 2; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
    </defs>
    <rect width="900" height="600" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#F8FAFC" font-size="26" font-weight="800" text-anchor="middle">프로세스와 프로세스 제어 블록 (PCB)의 물리적 맵핑</text>

    <!-- Memory Map Background -->
    <rect x="350" y="100" width="200" height="460" fill="#1E293B" stroke="#475569" stroke-width="4" rx="8"/>
    
    <!-- User Space Memory -->
    <text x="450" y="130" fill="#94A3B8" font-size="18" font-weight="800" text-anchor="middle">유저 영역 메모리</text>
    <rect x="350" y="150" width="200" height="50" fill="#0ea5e9" class="box" stroke="#0284c7"/>
    <text x="450" y="180" fill="#e0f2fe" font-size="18" font-weight="600" text-anchor="middle">프로세스 A 공간</text>

    <rect x="350" y="200" width="200" height="50" fill="#024abc" class="box" stroke="#1d4ed8"/>
    <text x="450" y="230" fill="#dbeafe" font-size="18" font-weight="600" text-anchor="middle">프로세스 B 공간</text>
    
    <rect x="350" y="250" width="200" height="50" fill="#4c1d95" class="box" stroke="#7c3aed"/>
    <text x="450" y="280" fill="#ede9fe" font-size="18" font-weight="600" text-anchor="middle">프로세스 C 공간</text>
    
    <rect x="350" y="300" width="200" height="70" fill="#1E293B" class="box" stroke="#475569"/>
    <text x="450" y="340" fill="#94a3b8" font-size="18" font-weight="600" text-anchor="middle">. . .</text>

    <!-- Kernel Space Memory -->
    <rect x="350" y="370" width="200" height="190" fill="#be123c" stroke="#e11d48" rx="8" stroke-width="2"/>
    <text x="450" y="400" fill="#ffe4e6" font-size="18" font-weight="800" text-anchor="middle">OS 커널 영역 메모리</text>

    <!-- PCB Blocks inside Kernel -->
    <rect x="370" y="430" width="45" height="45" fill="#f43f5e" rx="4"/>
    <text x="392" y="458" fill="#fff1f2" font-size="16" font-weight="800" text-anchor="middle">PCB A</text>

    <rect x="425" y="430" width="45" height="45" fill="#f43f5e" rx="4"/>
    <text x="447" y="458" fill="#fff1f2" font-size="16" font-weight="800" text-anchor="middle">PCB B</text>

    <rect x="480" y="430" width="45" height="45" fill="#f43f5e" rx="4"/>
    <text x="502" y="458" fill="#fff1f2" font-size="16" font-weight="800" text-anchor="middle">PCB C</text>

    <!-- Zoom box for Process A -->
    <g transform="translate(620, 150)">
        <polygon points="0,0 -70,0 -70,50 0,200" fill="#0ea5e9" fill-opacity="0.2"/>
        <rect x="0" y="0" width="150" height="200" fill="#0ea5e9" stroke="#0284c7" stroke-width="4" rx="8"/>
        <rect x="0" y="0" width="150" height="40" fill="#0284c7" rx="6"/>
        <text x="75" y="27" fill="#e0f2fe" font-size="18" font-weight="800" text-anchor="middle">Stack</text>
        <rect x="0" y="60" width="150" height="40" fill="#0369a1"/>
        <text x="75" y="87" fill="#e0f2fe" font-size="18" font-weight="800" text-anchor="middle">Heap</text>
        <rect x="0" y="100" width="150" height="40" fill="#075985"/>
        <text x="75" y="127" fill="#e0f2fe" font-size="18" font-weight="800" text-anchor="middle">Data</text>
        <rect x="0" y="140" width="150" height="60" fill="#0c4a6e" rx="6"/>
        <text x="75" y="175" fill="#e0f2fe" font-size="18" font-weight="800" text-anchor="middle">Code</text>
    </g>

    <path d="M 400 430 Q 370 250 550 175" stroke="#f43f5e" stroke-width="3" stroke-dasharray="6" fill="none"/>
    <circle cx="400" cy="430" r="5" fill="#fff1f2"/>
    <text x="510" y="470" fill="#f43f5e" font-size="14" font-weight="600">Pointer to Process A memory address</text>
</svg>
