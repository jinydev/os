<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --subtext: #1abc9c;
        --state: #2980b9;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --subtext: #16a085;
          --state: #3498db;
          --line: #b2bec3;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .desc { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; }
      .sched-text { fill: var(--subtext); font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle;}
      .title { font-size: 24px; }
      .state-circ { fill: var(--state); stroke: #fff; stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">프로세스 상태 변화와 스케줄러의 기표 역할</text>

  <!-- States -->
  <circle cx="250" cy="120" r="50" class="state-circ"/>
  <text x="250" y="127" class="text" fill="#fff" text-anchor="middle">생성</text>

  <!-- Suspend Box -->
  <circle cx="120" cy="250" r="55" class="state-circ"/>
  <text x="120" y="240" class="text" fill="#fff" text-anchor="middle">중단</text>
  <text x="120" y="265" class="desc" fill="#fff" text-anchor="middle">(일시정지)</text>

  <circle cx="350" cy="250" r="50" class="state-circ"/>
  <text x="350" y="257" class="text" fill="#fff" text-anchor="middle">준비</text>

  <circle cx="650" cy="250" r="50" class="state-circ"/>
  <text x="650" y="257" class="text" fill="#fff" text-anchor="middle">실행</text>

  <circle cx="850" cy="250" r="50" class="state-circ"/>
  <text x="850" y="257" class="text" fill="#fff" text-anchor="middle">종료</text>

  <circle cx="350" cy="420" r="50" class="state-circ"/>
  <text x="350" y="415" class="text" fill="#fff" text-anchor="middle">대기</text>
  <text x="350" y="440" class="desc" fill="#fff" text-anchor="middle">(보류)</text>

  <!-- Edges -->
  <!-- Create -> Suspend -->
  <path d="M 215 155 L 155 215" class="arrow"/>
  <text x="180" y="185" class="sched-text" transform="rotate(45, 180, 185)">장기 스케줄러</text>

  <!-- Create -> Ready -->
  <path d="M 285 155 L 325 210" class="arrow"/>
  <text x="280" y="200" class="sched-text">장기 스케줄러</text>

  <!-- Suspend <-> Ready -->
  <path d="M 185 240 L 290 240" class="arrow"/>
  <path d="M 290 260 L 185 260" class="arrow"/>
  <text x="240" y="230" class="sched-text">중기 스케줄러</text>

  <!-- Ready -> Exec -->
  <path d="M 410 260 L 590 260" class="arrow"/>
  <text x="500" y="250" class="sched-text" fill="var(--state)">단기 스케줄러</text>
  <text x="500" y="280" class="desc" text-anchor="middle">(스케줄링 알고리즘)</text>

  <!-- Exec -> Ready -->
  <path d="M 590 240 L 410 240" class="arrow"/>
  <text x="500" y="225" class="desc" text-anchor="middle">(시간·우선순위 인터럽트)</text>

  <!-- Exec -> Terminate -->
  <path d="M 710 250 L 790 250" class="arrow"/>
  <text x="750" y="235" class="sched-text">단·장기 스케줄러</text>

  <!-- Exec -> Wait -->
  <path d="M 610 280 L 400 400" class="arrow"/>
  <text x="560" y="340" class="sched-text">단기 스케줄러</text>
  <text x="560" y="365" class="desc" text-anchor="middle">(입출력 요구, 페이지 부재)</text>

  <!-- Wait -> Ready -->
  <path d="M 350 360 L 350 310" class="arrow"/>
  <text x="270" y="310" class="sched-text">단기 스케줄러</text>
  <text x="270" y="335" class="desc" text-anchor="middle">(장기 관리자의 신호,</text>
  <text x="270" y="355" class="desc" text-anchor="middle">페이지 인터럽트 처리)</text>

</svg>
