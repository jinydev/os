<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --axis: #2d3436;
        --low: #3498db;
        --high: #e74c3c;
        --dash: #b2bec3;
        --box: #ecf0f1;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --axis: #dfe6e9;
          --low: #2980b9;
          --high: #c0392b;
          --dash: #636e72;
          --box: #2d3436;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
      .title { font-size: 24px; font-weight: bold; }
      .axis { stroke: var(--axis); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .thread-high { stroke: var(--high); stroke-width: 6; fill: none; }
      .thread-low { stroke: var(--low); stroke-width: 6; fill: none; }
      .thread-inherit { stroke: var(--high); stroke-width: 8; fill: none; stroke-dasharray: 8 4; }
      .dash-grid { stroke: var(--dash); stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
      .box { fill: var(--box); stroke: var(--axis); stroke-width: 2; rx: 4; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--axis)"/>
    </marker>
    <marker id="arrow-inherit" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--high)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">우선순위 역전과 우선순위 상속 프로토콜 (Priority Inheritance Protocol)</text>

  <!-- Axes -->
  <path d="M 200 420 L 900 420" class="axis"/>
  <text x="910" y="440" class="text">시간 (Time)</text>

  <path d="M 200 420 L 200 100" class="axis"/>
  <text x="180" y="80" class="text title" text-anchor="end">우선순위 (Priority)</text>

  <!-- Priority Levels -->
  <text x="180" y="186" class="text" fill="var(--high)" text-anchor="end">높은 우선순위 (H)</text>
  <path d="M 200 180 L 900 180" class="dash-grid"/>

  <text x="180" y="346" class="text" fill="var(--low)" text-anchor="end">낮은 우선순위 (L)</text>
  <path d="M 200 340 L 900 340" class="dash-grid"/>

  <!-- Timelines and Actions -->
  <!-- Low starts -->
  <path d="M 200 340 L 350 340" class="thread-low"/>
  <rect x="230" y="360" width="120" height="40" class="box"/>
  <text x="290" y="386" class="text" text-anchor="middle">L 자원 A 획득</text>

  <!-- High starts and gets blocked -->
  <path d="M 350 180 L 450 180" class="thread-high"/>
  <rect x="360" y="110" width="160" height="50" class="box"/>
  <text x="440" y="132" class="text" text-anchor="middle" fill="var(--high)">H 실행 및 자원 A 요청</text>
  <text x="440" y="152" class="text" text-anchor="middle" fill="var(--high)">실패 후 대기 (Block)</text>

  <!-- Priority Inheritance -->
  <path d="M 450 340 L 450 180" stroke="var(--high)" stroke-width="4" fill="none" marker-end="url(#arrow-inherit)"/>
  <rect x="470" y="240" width="130" height="40" class="box"/>
  <text x="535" y="266" class="text" text-anchor="middle" fill="var(--high)">L 우선순위 상승</text>
  
  <path d="M 450 180 L 650 180" class="thread-inherit"/>
  <text x="550" y="160" class="text" text-anchor="middle">L이 H의 임시 권한으로 자원 A 처리 완료</text>

  <!-- Return and High continues -->
  <path d="M 650 180 L 650 340" stroke="var(--high)" stroke-width="4" fill="none" marker-end="url(#arrow-inherit)"/>
  <rect x="670" y="240" width="130" height="40" class="box"/>
  <text x="735" y="266" class="text" text-anchor="middle" fill="var(--low)">L 우선순위 복구</text>

  <path d="M 650 340 L 800 340" class="thread-low"/>
  <path d="M 650 180 L 850 180" class="thread-high"/>
  
  <rect x="670" y="110" width="160" height="50" class="box"/>
  <text x="750" y="132" class="text" text-anchor="middle" fill="var(--high)">블록 풀린 H가</text>
  <text x="750" y="152" class="text" text-anchor="middle" fill="var(--high)">자원 A 획득 후 실행</text>

</svg>
