<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --axis: #2d3436;
        --low: #3498db;
        --high: #e74c3c;
        --dash: #b2bec3;
        --box: #ecf0f1;
        --err: #c0392b;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --axis: #dfe6e9;
          --low: #2980b9;
          --high: #c0392b;
          --dash: #636e72;
          --box: #2d3436;
          --err: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
      .title { font-size: 24px; font-weight: bold; }
      .axis { stroke: var(--axis); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .thread-high { stroke: var(--high); stroke-width: 6; fill: none; }
      .thread-low { stroke: var(--low); stroke-width: 6; fill: none; }
      .dash-grid { stroke: var(--dash); stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
      .box { fill: var(--box); stroke: var(--axis); stroke-width: 2; rx: 4; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--axis)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">우선순위 역전 현상 (Priority Inversion Problem)</text>

  <!-- Axes -->
  <path d="M 200 360 L 900 360" class="axis"/>
  <text x="910" y="380" class="text">시간 (Time)</text>

  <path d="M 200 360 L 200 100" class="axis"/>
  <text x="180" y="80" class="text title" text-anchor="end">우선순위 (Priority)</text>

  <!-- Priority Levels -->
  <text x="180" y="186" class="text" fill="var(--high)" text-anchor="end">높은 우선순위 (H)</text>
  <path d="M 200 180 L 900 180" class="dash-grid"/>

  <text x="180" y="306" class="text" fill="var(--low)" text-anchor="end">낮은 우선순위 (L)</text>
  <path d="M 200 300 L 900 300" class="dash-grid"/>

  <!-- Timelines and Actions -->
  <!-- Low starts -->
  <path d="M 200 300 L 350 300" class="thread-low"/>
  <rect x="230" y="320" width="120" height="40" class="box"/>
  <text x="290" y="346" class="text" text-anchor="middle">L 자원 A 획득</text>

  <!-- High starts and gets blocked -->
  <path d="M 350 180 L 450 180" class="thread-high"/>
  <rect x="360" y="110" width="160" height="50" class="box"/>
  <text x="440" y="132" class="text" text-anchor="middle" fill="var(--high)">H 실행 및 자원 A 요청</text>
  <text x="440" y="152" class="text" text-anchor="middle" fill="var(--high)">실패 후 대기 (Block)</text>

  <!-- Low continues but causes High to wait -> Priority Inversion highlighted -->
  <path d="M 450 300 L 700 300" class="thread-low"/>
  <text x="550" y="240" class="text title" fill="var(--err)" text-anchor="middle">우선순위 역전 발생!</text>
  <text x="550" y="265" class="text" fill="var(--text)" font-weight="normal" text-anchor="middle" font-size="14">H는 L이 자원을 뱉을 때까지 영원히 기다릴 위험.</text>
  <text x="550" y="285" class="text" fill="var(--text)" font-weight="normal" text-anchor="middle" font-size="14">중간 단계 프로세스가 있다면 L이 선점당해 H의 수행은 더욱 무기한 보류됨.</text>

  <!-- Low finishes -->
  <rect x="620" y="320" width="120" height="40" class="box"/>
  <text x="680" y="346" class="text" text-anchor="middle">L 자원 A 반납</text>

  <!-- High continues -->
  <path d="M 700 180 L 850 180" class="thread-high"/>
  <rect x="710" y="110" width="140" height="50" class="box"/>
  <text x="780" y="132" class="text" text-anchor="middle" fill="var(--high)">H 자원 A 획득 후</text>
  <text x="780" y="152" class="text" text-anchor="middle" fill="var(--high)">늦게 실행 재개</text>

</svg>
