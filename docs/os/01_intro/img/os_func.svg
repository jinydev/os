<svg width="100%" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>
  
  <rect x="50" y="100" width="180" height="100" fill="#0078D7" rx="8"/>
  <text x="140" y="155" fill="white" font-size="24" font-weight="bold" font-family="sans-serif" text-anchor="middle">운영체제의 기능</text>
  
  <path d="M 230 150 L 300 150" stroke="#FFF" stroke-width="2"/>
  <path d="M 300 70 L 300 230" stroke="#FFF" stroke-width="2"/>
  
  <path d="M 300 70 L 350 70" stroke="#FFF" stroke-width="2"/>
  <rect x="350" y="40" width="150" height="60" fill="#005A9E" rx="5"/>
  <text x="425" y="75" fill="white" font-size="20" font-family="sans-serif" text-anchor="middle">자원 관리</text>
  
  <path d="M 300 230 L 350 230" stroke="#FFF" stroke-width="2"/>
  <rect x="350" y="200" width="150" height="60" fill="#005A9E" rx="5"/>
  <text x="425" y="235" fill="white" font-size="20" font-family="sans-serif" text-anchor="middle">시스템 관리</text>

  <!-- 자원 관리 세부 내역 -->
  <path d="M 500 70 L 530 70" stroke="#FFF" stroke-width="2"/>
  <path d="M 530 30 L 530 110" stroke="#FFF" stroke-width="2"/>
  
  <rect x="550" y="15" width="200" height="25" fill="#333" rx="3"/>
  <text x="650" y="32" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">메모리 관리</text>
  
  <rect x="550" y="45" width="200" height="25" fill="#333" rx="3"/>
  <text x="650" y="62" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">프로세스 관리</text>
  
  <rect x="550" y="75" width="200" height="25" fill="#333" rx="3"/>
  <text x="650" y="92" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">주변장치(I/O) 관리</text>
  
  <rect x="550" y="105" width="200" height="25" fill="#333" rx="3"/>
  <text x="650" y="122" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">파일/데이터 관리</text>

  <!-- 시스템 관리 세부 내역 -->
  <path d="M 500 230 L 530 230" stroke="#FFF" stroke-width="2"/>
  <path d="M 530 185 L 530 275" stroke="#FFF" stroke-width="2"/>

  <rect x="550" y="170" width="200" height="25" fill="#333" rx="3"/>
  <text x="650" y="187" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">시스템 보호(권한 제어)</text>
  
  <rect x="550" y="200" width="200" height="25" fill="#333" rx="3"/>
  <text x="650" y="217" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">네트워킹(통신)</text>
  
  <rect x="550" y="230" width="200" height="25" fill="#333" rx="3"/>
  <text x="650" y="247" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">명령 해석기(Shell)</text>
