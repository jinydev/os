<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #34495e;
        --seg: #9b59b6;
        --table: #f39c12;
        --mem: #bdc3c7;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #4a6278;
          --seg: #8e44ad;
          --table: #f1c40f;
          --mem: #34495e;
          --line: #95a5a6;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; }
      .title { font-size: 28px; }
      .seg-box { fill: var(--seg); stroke: var(--bg); stroke-width: 2; rx: 5; }
      .mem-box { fill: transparent; stroke: var(--line); stroke-width: 2; }
      .table-hdr { fill: var(--table); }
      .table-row { fill: var(--bg); stroke: var(--line); stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">세그먼테이션 (Segmentation) 아키텍처</text>

  <text x="500" y="80" class="text-sm" text-anchor="middle" font-weight="normal">의미 단위(Code, Data, Stack)로 분할하여 보호와 공유에 유리함</text>

  <!-- Logical Memory (User View) -->
  <text x="200" y="140" class="text" text-anchor="middle">논리 메모리 (사용자 관점)</text>
  
  <rect x="120" y="170" width="100" height="80" class="seg-box"/>
  <text x="170" y="215" class="text" fill="#fff" text-anchor="middle">코드(0)</text>

  <rect x="250" y="280" width="80" height="40" class="seg-box"/>
  <text x="290" y="305" class="text" fill="#fff" text-anchor="middle">데이터(2)</text>
  
  <rect x="100" y="350" width="120" height="60" class="seg-box"/>
  <text x="160" y="385" class="text" fill="#fff" text-anchor="middle">스택(1)</text>

  <!-- Segment Table -->
  <text x="500" y="160" class="text" text-anchor="middle">세그먼트 테이블</text>
  <rect x="400" y="180" width="200" height="30" class="table-hdr"/>
  <text x="430" y="202" class="text" fill="#fff" text-anchor="middle">Seg#</text>
  <text x="495" y="202" class="text" fill="#fff" text-anchor="middle">Limit</text>
  <text x="560" y="202" class="text" fill="#fff" text-anchor="middle">Base</text>

  <rect x="400" y="210" width="60" height="30" class="table-row"/>
  <rect x="460" y="210" width="70" height="30" class="table-row"/>
  <rect x="530" y="210" width="70" height="30" class="table-row"/>
  <text x="430" y="232" class="text" text-anchor="middle">0</text>
  <text x="495" y="232" class="text" text-anchor="middle">800</text>
  <text x="565" y="232" class="text" text-anchor="middle">1400</text>

  <rect x="400" y="240" width="60" height="30" class="table-row"/>
  <rect x="460" y="240" width="70" height="30" class="table-row"/>
  <rect x="530" y="240" width="70" height="30" class="table-row"/>
  <text x="430" y="262" class="text" text-anchor="middle">1</text>
  <text x="495" y="262" class="text" text-anchor="middle">400</text>
  <text x="565" y="262" class="text" text-anchor="middle">6300</text>

  <rect x="400" y="270" width="60" height="30" class="table-row"/>
  <rect x="460" y="270" width="70" height="30" class="table-row"/>
  <rect x="530" y="270" width="70" height="30" class="table-row"/>
  <text x="430" y="292" class="text" text-anchor="middle">2</text>
  <text x="495" y="292" class="text" text-anchor="middle">100</text>
  <text x="565" y="292" class="text" text-anchor="middle">4300</text>


  <!-- Physical Memory -->
  <text x="800" y="140" class="text" text-anchor="middle">물리 메모리 (RAM)</text>
  <rect x="730" y="160" width="140" height="280" class="mem-box"/>
  
  <text x="690" y="196" class="text-sm" text-anchor="middle">1400-</text>
  <rect x="730" y="180" width="140" height="60" class="seg-box"/>
  <text x="800" y="215" class="text" fill="#fff" text-anchor="middle">코드(0)</text>
  
  <text x="690" y="296" class="text-sm" text-anchor="middle">4300-</text>
  <rect x="730" y="280" width="140" height="30" class="seg-box"/>
  <text x="800" y="300" class="text" fill="#fff" text-anchor="middle">데이터(2)</text>

  <text x="690" y="386" class="text-sm" text-anchor="middle">6300-</text>
  <rect x="730" y="370" width="140" height="40" class="seg-box"/>
  <text x="800" y="395" class="text" fill="#fff" text-anchor="middle">스택(1)</text>

  <!-- Pointers -->
  <path d="M 230 210 Q 320 210 390 220" class="arrow"/>
  <path d="M 610 225 Q 670 225 720 200" class="arrow"/>

</svg>
