<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --frame: #27ae60;
        --victim: #e74c3c;
        --new: #3498db;
        --disk: #8e44ad;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --frame: #2ecc71;
          --victim: #c0392b;
          --new: #2980b9;
          --disk: #9b59b6;
          --line: #95a5a6;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; }
      .title { font-size: 28px; }
      .box { fill: transparent; stroke: var(--line); stroke-width: 2; }
      .victim-fill { fill: var(--victim); }
      .new-fill { fill: var(--new); }
      .frame-fill { fill: var(--frame); }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .num-circle { fill: var(--line); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">페이지 교체 절차 (Page Replacement)</text>
  <text x="500" y="80" class="text-sm" font-weight="normal" text-anchor="middle">빈 프레임이 없을 때, 희생자(Victim) 프레임을 선택하여 디스크로 내보내는 과정</text>

  <!-- Physical Memory -->
  <text x="350" y="150" class="text" text-anchor="middle">물리 메모리</text>
  <rect x="250" y="170" width="200" height="260" class="box"/>
  <line x1="250" y1="210" x2="450" y2="210" stroke="var(--line)" stroke-width="2"/>
  <line x1="250" y1="280" x2="450" y2="280" stroke="var(--line)" stroke-width="2"/>
  <line x1="250" y1="350" x2="450" y2="350" stroke="var(--line)" stroke-width="2"/>
  
  <rect x="250" y="210" width="200" height="70" class="victim-fill" stroke="var(--bg)" stroke-width="2"/>
  <text x="350" y="250" class="text" fill="#fff" text-anchor="middle">희생 프레임 (Victim)</text>
  
  <!-- Page Table Update -->
  <rect x="50" y="170" width="100" height="200" class="box"/>
  <line x1="50" y1="220" x2="150" y2="220" stroke="var(--line)"/>
  <line x1="50" y1="270" x2="150" y2="270" stroke="var(--line)"/>
  <text x="100" y="150" class="text" text-anchor="middle">Page Table</text>
  
  <text x="100" y="250" class="text victim-fill" text-anchor="middle">v -> i</text>
  <text x="180" y="250" class="text-sm" text-anchor="start">2. Invalid 변경</text>

  <!-- Disk SWAP -->
  <ellipse cx="800" cy="180" rx="90" ry="20" class="box" fill="var(--disk)" opacity="0.2"/>
  <path d="M 710 180 L 710 380 A 90 20 0 0 0 890 380 L 890 180" class="box" fill="var(--disk)" opacity="0.2"/>
  <text x="800" y="420" class="text" text-anchor="middle">보조기억장치 (가상 메모리)</text>

  <rect x="750" y="210" width="100" height="40" class="victim-fill"/>
  <text x="800" y="235" class="text" fill="#fff" text-anchor="middle">Victim Page</text>
  
  <rect x="750" y="320" width="100" height="40" class="new-fill"/>
  <text x="800" y="345" class="text" fill="#fff" text-anchor="middle">새로운 Page</text>

  <!-- Flow 1: Swap Out -->
  <path d="M 450 230 L 740 230" class="arrow" stroke="var(--victim)"/>
  <circle cx="590" cy="210" r="12" class="victim-fill"/>
  <text x="590" y="216" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">1</text>
  <text x="590" y="200" class="text-sm victim-fill" text-anchor="middle">Swap Out (저장)</text>

  <!-- Flow 3: Swap In -->
  <path d="M 750 340 L 450 260" class="arrow" stroke="var(--new)"/>
  <circle cx="590" cy="315" r="12" class="new-fill"/>
  <text x="590" y="321" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">3</text>
  <text x="590" y="345" class="text-sm new-fill" text-anchor="middle">Swap In (가져오기)</text>

  <!-- Flow 4: Page Table Reset -->
  <path d="M 240 250 L 150 250" class="arrow" stroke="var(--new)" stroke-dasharray="4"/>
  <text x="180" y="230" class="text-sm" text-anchor="start">4. 테이블/Valid 재설정</text>

</svg>
