<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #34495e;
        --time: #e74c3c;
        --wss: #3498db;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #4a6278;
          --time: #ff7675;
          --wss: #2980b9;
          --line: #95a5a6;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; font-weight: normal; }
      .title { font-size: 28px; }
      .box-frame { fill: transparent; stroke: var(--wss); stroke-width: 3; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow-time { stroke: var(--time); stroke-width: 3; stroke-dasharray: 4 4; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">작업 집합 모델 (Working-Set Model, WSM)</text>
  <text x="500" y="80" class="text-sm" text-anchor="middle">프로세스가 일정 시간(Δ) 동안 집중적으로 참조하는 페이지들의 집합 (이 크기만큼의 프레임을 반드시 보장해야 스래싱 예방)</text>

  <!-- Reference String Header -->
  <text x="120" y="160" class="text">페이지 참조:</text>
  
  <!-- String Data -->
  <!-- 2 2 1 5 7 7 7 5 3 4 4 4 3 4 3 4 4 4 -->
  <g transform="translate(250, 140)">
    <text x="0" y="20" class="text">2</text>
    <text x="30" y="20" class="text">2</text>
    <text x="60" y="20" class="text">1</text>
    <text x="90" y="20" class="text">5</text>
    <text x="120" y="20" class="text">7</text>
    <text x="150" y="20" class="text">7</text>
    <text x="180" y="20" class="text">7</text>
    <text x="210" y="20" class="text">5</text>
    <text x="240" y="20" class="text">3</text>
    <text x="270" y="20" class="text">4</text>
    <text x="300" y="20" class="text">4</text>
    <text x="330" y="20" class="text">4</text>
    <text x="360" y="20" class="text">3</text>
    <text x="390" y="20" class="text">4</text>
    <text x="420" y="20" class="text">3</text>
    <text x="450" y="20" class="text">4</text>
    <text x="480" y="20" class="text">4</text>
    <text x="510" y="20" class="text">4</text>
  </g>

  <!-- Delta t1 Window -->
  <text x="490" y="230" class="text" fill="var(--text)">t1</text>
  <line x1="490" y1="210" x2="490" y2="180" class="arrow" stroke="var(--text)"/>
  
  <rect x="235" y="130" width="250" height="40" class="box-frame"/>
  <path d="M 235 200 L 485 200" class="arrow-time"/>
  <text x="360" y="195" class="text-sm" text-anchor="middle" fill="var(--time)">Δ = 8 (Window Size)</text>
  
  <text x="360" y="235" class="text" text-anchor="middle" fill="var(--wss)">WSS(t1) = { 1, 2, 5, 7 }</text>
  <text x="360" y="260" class="text-sm" text-anchor="middle">필요 프레임 수 : 4개</text>

  <!-- Delta t2 Window -->
  <text x="790" y="380" class="text" fill="var(--text)">t2</text>
  <line x1="790" y1="360" x2="790" y2="180" class="arrow" stroke="var(--text)"/>
  
  <rect x="535" y="130" width="250" height="40" class="box-frame"/>
  <path d="M 535 280 L 785 280" class="arrow-time"/>
  <text x="660" y="275" class="text-sm" text-anchor="middle" fill="var(--time)">Δ = 8 (Window Size)</text>
  
  <text x="660" y="315" class="text" text-anchor="middle" fill="var(--wss)">WSS(t2) = { 3, 4 }</text>
  <text x="660" y="340" class="text-sm" text-anchor="middle">필요 프레임 수 : 2개</text>


  <!-- Conclusion -->
  <text x="500" y="430" class="text" fill="var(--time)" text-anchor="middle">시간에 따라 필요한 워킹 셋(WSS)의 크기가 동적으로 변함.</text>

</svg>
