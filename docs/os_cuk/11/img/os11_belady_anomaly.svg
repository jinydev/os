<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --graph-bg: #ecf0f1;
        --line-col: #3498db;
        --grid: #bdc3c7;
        --anomaly: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --graph-bg: #2c3e50;
          --line-col: #2980b9;
          --grid: #4a6278;
          --anomaly: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; font-weight: normal; }
      .title { font-size: 28px; }
      .axis { stroke: var(--text); stroke-width: 3; fill: none; }
      .grid-line { stroke: var(--grid); stroke-width: 2; fill: none; }
      .graph-line { stroke: var(--line-col); stroke-width: 4; fill: none; }
      .anomaly-line { stroke: var(--anomaly); stroke-width: 4; fill: none; }
      .dot { fill: var(--line-col); }
      .dot-anomaly { fill: var(--anomaly); }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">벨라디의 모순 (Belady's Anomaly)</text>
  <text x="500" y="80" class="text-sm" text-anchor="middle">프레임을 더 많이 할당해주었는데도 불구하고 오히려 페이지 부재(Page Fault)가 증가하는 기이한 현상 (FIFO 알고리즘의 치명적 단점)</text>

  <!-- Graph Area -->
  <rect x="200" y="120" width="600" height="300" fill="var(--graph-bg)" rx="10"/>

  <!-- Y-Axis (Page Faults) -->
  <text x="130" y="270" class="text" text-anchor="middle" transform="rotate(-90, 130, 270)">페이지 부재 횟수</text>
  <path d="M 250 400 L 250 140" class="axis"/>
  <polygon points="245,140 250,130 255,140" fill="var(--text)"/>

  <!-- X-Axis (Frames) -->
  <text x="500" y="460" class="text" text-anchor="middle">할당된 프레임 수</text>
  <path d="M 250 400 L 780 400" class="axis"/>
  <polygon points="780,395 790,400 780,405" fill="var(--text)"/>

  <!-- Grid & Labels Y -->
  <text x="230" y="405" class="text-sm" text-anchor="end">0</text>
  
  <path d="M 250 350 L 760 350" class="grid-line"/>
  <text x="230" y="355" class="text-sm" text-anchor="end">5</text>

  <path d="M 250 300 L 760 300" class="grid-line"/>
  <text x="230" y="305" class="text-sm" text-anchor="end">10</text>

  <path d="M 250 250 L 760 250" class="grid-line"/>
  <text x="230" y="255" class="text-sm" text-anchor="end">14</text>
  
  <path d="M 250 200 L 760 200" class="grid-line"/>
  <text x="230" y="205" class="text-sm" text-anchor="end">16</text>

  <!-- Grid & Labels X -->
  <path d="M 330 400 L 330 140" class="grid-line"/>
  <text x="330" y="430" class="text" text-anchor="middle">1</text>

  <path d="M 430 400 L 430 140" class="grid-line"/>
  <text x="430" y="430" class="text" text-anchor="middle">2</text>

  <path d="M 530 400 L 530 140" class="grid-line"/>
  <text x="530" y="430" class="text" text-anchor="middle">3</text>

  <path d="M 630 400 L 630 140" class="grid-line"/>
  <text x="630" y="430" class="text" text-anchor="middle">4</text>

  <path d="M 730 400 L 730 140" class="grid-line"/>
  <text x="730" y="430" class="text" text-anchor="middle">5</text>

  <!-- Graph Plotting -->
  <!-- Let's map typical Anomaly string 1,2,3,4,1,2,5,1,2,3,4,5 -->
  <!-- frame 1: very high -->
  <!-- frame 2: high -->
  <!-- frame 3: 9 faults -->
  <!-- frame 4: 10 faults (Anomaly!) -->
  <!-- frame 5: 5 faults -->

  <path d="M 330 180 L 430 250 L 530 310" class="graph-line"/>
  <path d="M 530 310 L 630 250" class="anomaly-line"/>
  <path d="M 630 250 L 730 350" class="graph-line"/>

  <circle cx="330" cy="180" r="6" class="dot"/>
  <circle cx="430" cy="250" r="6" class="dot"/>
  <circle cx="530" cy="310" r="6" class="dot"/>
  
  <circle cx="630" cy="250" r="8" class="dot-anomaly"/>
  <circle cx="730" cy="350" r="6" class="dot"/>

  <!-- Anomaly Alert Text -->
  <text x="690" y="245" class="text" fill="var(--anomaly)">프레임 +1 증가</text>
  <text x="690" y="270" class="text" fill="var(--anomaly)">하지만 부재율 증가!</text>
  <path d="M 630 220 L 640 180 L 710 180" stroke="var(--anomaly)" stroke-width="2" fill="none"/>

</svg>
