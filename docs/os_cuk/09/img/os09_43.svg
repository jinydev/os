<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #2980b9;
        --pipe: #1abc9c;
        --line: #bdc3c7;
        --highlight: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #3498db;
          --pipe: #16a085;
          --line: #7f8c8d;
          --highlight: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .title { font-size: 28px; }
      .proc-ellipse { fill: var(--box); }
      .pipe-cyl { fill: var(--pipe); rx: 10; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">pipe() 시스템 콜과 파일 기술자(File Descriptor)</text>

  <!-- Process -->
  <ellipse cx="250" cy="250" rx="100" ry="70" class="proc-ellipse"/>
  <text x="250" y="255" class="text" fill="#fff" text-anchor="middle" font-size="28">Process</text>

  <!-- Ports in process -->
  <text x="320" y="220" class="text" fill="#f1c40f">읽기</text>
  <text x="320" y="300" class="text" fill="#f1c40f">쓰기</text>

  <!-- Pipe -->
  <rect x="500" y="220" width="150" height="60" class="pipe-cyl"/>
  <text x="575" y="258" class="text" fill="#fff" text-anchor="middle" font-size="24">파이프</text>
  <ellipse cx="500" cy="250" rx="10" ry="30" fill="var(--bg)" opacity="0.3"/>

  <!-- Path filedes[1] -> Pipe Write -->
  <path d="M 320 290 Q 400 320 480 270 L 490 260" class="arrow"/>
  <rect x="360" y="320" width="120" height="30" fill="#fce4ec" rx="5"/>
  <text x="420" y="342" class="text" fill="var(--highlight)" text-anchor="middle">filedes[1]</text>

  <!-- Path Pipe Read -> filedes[0] -->
  <path d="M 660 250 Q 750 200 650 150 L 330 150 Q 280 150 280 180" class="arrow"/>
  <rect x="670" y="120" width="120" height="30" fill="#fce4ec" rx="5"/>
  <text x="730" y="142" class="text" fill="var(--highlight)" text-anchor="middle">filedes[0]</text>

</svg>
