<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #34495e;
        --proc: #2980b9;
        --shm: #f1c40f;
        --line: #bdc3c7;
        --highlight: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #4a6278;
          --proc: #3498db;
          --shm: #f39c12;
          --line: #7f8c8d;
          --highlight: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .title { font-size: 28px; }
      .proc-box { fill: var(--proc); rx: 15; }
      .addr-space { fill: var(--box); }
      .shm-box { fill: var(--shm); rx: 4; }
      .arrow { stroke: var(--proc); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--proc)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">공유 메모리의 개념: [1] 생성 (shmget)</text>
  
  <text x="500" y="90" class="text" fill="var(--highlight)" text-anchor="middle">[1] 공유메모리 생성</text>

  <!-- Process A -->
  <rect x="200" y="150" width="150" height="50" class="proc-box"/>
  <text x="275" y="140" class="text" text-anchor="middle">Process A</text>
  <text x="275" y="182" class="text" fill="var(--highlight)" text-anchor="middle">shmget(...)</text>

  <!-- Process A Addr Space -->
  <rect x="200" y="230" width="150" height="200" class="addr-space"/>
  <text x="275" y="220" class="text" text-anchor="middle">Process A의 주소공간</text>

  <!-- Process B -->
  <rect x="650" y="150" width="150" height="50" class="proc-box"/>
  <text x="725" y="140" class="text" text-anchor="middle">Process B</text>
  <text x="725" y="182" class="text" fill="var(--highlight)" text-anchor="middle">shmget(...)</text>

  <!-- Process B Addr Space -->
  <rect x="650" y="230" width="150" height="200" class="addr-space"/>
  <text x="725" y="220" class="text" text-anchor="middle">Process B의 주소공간</text>

  <!-- Shared Memory Space (Kernel Physical) -->
  <rect x="425" y="300" width="150" height="80" class="shm-box"/>
  <text x="500" y="290" class="text" text-anchor="middle">공유메모리 공간</text>

  <!-- Arrow Requests -->
  <path d="M 350 175 L 470 175 L 470 290" class="arrow"/>
  <path d="M 650 175 L 530 175 L 530 290" class="arrow"/>

  <rect x="50" y="440" width="220" height="40" fill="var(--box)" rx="4"/>
  <text x="160" y="468" class="text" fill="#f1c40f" text-anchor="middle">공유메모리 사용절차 (1)</text>

</svg>
