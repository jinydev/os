<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #3498db;
        --box-dark: #2980b9;
        --kernel: #e0e0e0;
        --kernel-box: #7f8c8d;
        --highlight: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #2980b9;
          --box-dark: #1c5980;
          --kernel: #2c3e50;
          --kernel-box: #95a5a6;
          --highlight: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .title { font-size: 28px; }
      .proc-box { fill: var(--box); rx: 8; }
      .handler-box { fill: var(--box-dark); rx: 25; }
      .kernel-bg { fill: var(--kernel); stroke: var(--kernel-box); stroke-width: 2; rx: 4; }
      .pcb-box { fill: var(--box-dark); rx: 4; }
      .arrow { stroke: var(--highlight); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .line { stroke: var(--text); stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--highlight)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">시그널(Signal) 처리 메커니즘</text>
  
  <!-- Kernel Space -->
  <rect x="250" y="300" width="500" height="150" class="kernel-bg"/>
  <text x="180" y="380" class="text">Kernel</text>

  <!-- PCBs in Kernel -->
  <rect x="300" y="350" width="150" height="60" class="pcb-box"/>
  <text x="375" y="340" class="text" text-anchor="middle">PCB #1</text>
  <text x="375" y="385" class="text" fill="#fff" text-anchor="middle">Signal-A 세팅</text>

  <rect x="550" y="350" width="150" height="60" class="pcb-box"/>
  <text x="625" y="340" class="text" text-anchor="middle">PCB #2</text>

  <!-- Processes in User Space -->
  <rect x="300" y="150" width="150" height="60" class="proc-box"/>
  <text x="375" y="140" class="text" text-anchor="middle">Process #1</text>

  <rect x="550" y="150" width="150" height="60" class="proc-box"/>
  <text x="625" y="140" class="text" text-anchor="middle">Process #2</text>
  <text x="625" y="240" class="text" text-anchor="middle">Signal-A 발생</text>

  <!-- Handlers for Process #1 -->
  <rect x="80" y="100" width="180" height="50" class="handler-box"/>
  <text x="170" y="132" class="text" fill="#fff" text-anchor="middle">Handler_A</text>

  <rect x="80" y="180" width="180" height="50" class="handler-box"/>
  <text x="170" y="212" class="text" fill="#fff" text-anchor="middle">Handler_B</text>

  <!-- Connections -->
  <path d="M 300 180 L 260 180" class="line"/>
  <path d="M 300 180 L 260 205" class="line"/>
  
  <path d="M 625 250 L 550 350" class="arrow"/>
  
  <path d="M 375 350 L 375 220" class="arrow"/>
  <path d="M 300 125 L 270 125" class="arrow"/>
  
</svg>
