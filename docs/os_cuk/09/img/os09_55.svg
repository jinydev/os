<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #34495e;
        --proc: #2980b9;
        --shm: #f1c40f;
        --line: #2c3e50;
        --highlight: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #4a6278;
          --proc: #3498db;
          --shm: #f39c12;
          --line: #ecf0f1;
          --highlight: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .title { font-size: 28px; }
      .proc-box { fill: var(--proc); rx: 15; }
      .addr-space { fill: var(--box); }
      .shm-box { fill: var(--shm); rx: 4; }
      .arrow { stroke: var(--proc); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow-thin { stroke: var(--line); stroke-width: 2; fill: none; marker-end: url(#arrowhead-thin); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--proc)"/>
    </marker>
    <marker id="arrowhead-thin" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">공유 메모리의 개념: [3] 일반 메모리처럼 사용</text>
  
  <text x="130" y="110" class="text" fill="var(--highlight)" text-anchor="middle" font-size="24">[3] 데이터 쓰기</text>
  <text x="860" y="140" class="text" fill="var(--highlight)" text-anchor="middle" font-size="24">[4] 데이터 읽기</text>

  <!-- Process A -->
  <rect x="200" y="150" width="150" height="50" class="proc-box"/>
  <text x="275" y="140" class="text" text-anchor="middle">Process A</text>

  <!-- Process A Addr Space -->
  <rect x="200" y="230" width="150" height="200" class="addr-space"/>
  <text x="275" y="220" class="text" text-anchor="middle">Process A의 주소공간</text>
  <rect x="200" y="260" width="150" height="60" class="shm-box"/> <!-- mapped area -->
  <text x="275" y="298" class="text" text-anchor="middle" font-size="24">데이터</text>

  <!-- Process B -->
  <rect x="650" y="150" width="150" height="50" class="proc-box"/>
  <text x="725" y="140" class="text" text-anchor="middle">Process B</text>

  <!-- Process B Addr Space -->
  <rect x="650" y="230" width="150" height="200" class="addr-space"/>
  <text x="725" y="220" class="text" text-anchor="middle">Process B의 주소공간</text>
  <rect x="650" y="320" width="150" height="60" class="shm-box"/> <!-- mapped area -->
  <text x="725" y="358" class="text" text-anchor="middle" font-size="24">데이터</text>

  <!-- Shared Memory Space (Kernel Physical) -->
  <rect x="425" y="280" width="150" height="80" class="shm-box"/>
  <text x="500" y="270" class="text" text-anchor="middle">공유메모리 공간</text>
  <text x="500" y="328" class="text" text-anchor="middle" font-size="24">데이터</text>

  <!-- Data Flow Arrows -->
  <path d="M 200 175 L 130 175 L 130 290 L 190 290" class="arrow"/>
  
  <path d="M 800 350 L 860 350 L 860 175 L 810 175" class="arrow"/>

  <!-- Mapping indicators -->
  <path d="M 355 270 L 420 290" class="arrow-thin"/>
  <path d="M 420 350 L 355 310" class="arrow-thin"/>
  
  <path d="M 575 290 L 645 330" class="arrow-thin"/>
  <path d="M 645 370 L 575 350" class="arrow-thin"/>

  <rect x="50" y="440" width="220" height="40" fill="var(--box)" rx="4"/>
  <text x="160" y="468" class="text" fill="#f1c40f" text-anchor="middle">공유메모리 사용절차 (3)</text>

</svg>
