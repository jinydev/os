<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #f1f2f6;
        --box-border: #ced6e0;
        --hl: #ff4757;
        --func: #3742fa;
        --comment: #2ed573;
        --line: #2f3542;
        --alert: #ff6b81;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #1e272e;
          --box-border: #485460;
          --hl: #ff6b81;
          --func: #70a1ff;
          --comment: #7bed9f;
          --line: #dfe6e9;
          --alert: #ff4757;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 18px; }
      .title { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: bold; }
      .sub-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; fill: var(--hl); }
      .panel { fill: var(--box); stroke: var(--box-border); stroke-width: 2; rx: 8; }
      .func { fill: var(--func); font-weight: bold; }
      .comment { fill: var(--comment); }
      .hl { fill: var(--hl); font-weight: bold; }
      .arrow { stroke: var(--alert); stroke-width: 4; fill: none; marker-end: url(#arrow-red); }
    </style>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--alert)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="title text" text-anchor="middle">하드웨어 기반 동기화: TestAndSet 명령어 구조</text>

  <!-- Left Panel: CPU Instruction Meaning -->
  <text x="250" y="110" class="sub-title" text-anchor="middle">하드웨어 TestAndSet 원자적 연산</text>
  <rect x="50" y="130" width="450" height="240" class="panel"/>
  
  <text x="70" y="170" class="text hl">boolean</text>
  <text x="150" y="170" class="text func">TestAndSet</text>
  <text x="260" y="170" class="text hl">(boolean *target) {</text>

  <text x="90" y="210" class="text hl">boolean</text>
  <text x="170" y="210" class="text">old_value = *target;</text>

  <text x="90" y="250" class="text">*target = <tspan class="hl">TRUE</tspan>; </text>
  <text x="280" y="250" class="text comment">// 타겟 메모리를 1로 세팅</text>

  <text x="90" y="290" class="text hl">return</text>
  <text x="160" y="290" class="text">old_value; </text>
  <text x="280" y="290" class="text comment">// 이전 값을 반환</text>

  <text x="70" y="330" class="text hl">}</text>

  <!-- Atomic Note -->
  <rect x="50" y="390" width="450" height="80" fill="none" stroke="var(--alert)" stroke-width="2" rx="4" stroke-dasharray="6 6"/>
  <text x="275" y="425" class="text title" font-size="18" fill="var(--alert)" text-anchor="middle">하드웨어 잠금 (Hardware Lock)</text>
  <text x="275" y="450" class="text" font-size="14" text-anchor="middle">위 로직은 분할 불가능한 하나의 CPU Instruction으로 실행됨</text>

  <!-- Right Panel: Usage in Process -->
  <text x="775" y="110" class="sub-title" text-anchor="middle">TestAndSet()을 이용한 상호배제 구현</text>
  <rect x="550" y="130" width="400" height="340" class="panel"/>

  <text x="570" y="170" class="text hl">do {</text>
  
  <text x="600" y="210" class="text hl">while ( <tspan class="func">TestAndSet</tspan>(&amp;lock) );</text>
  
  <text x="630" y="250" class="text comment">// 임계 영역 (Critical Section)</text>
  <text x="630" y="280" class="text">...</text>

  <text x="600" y="330" class="text">lock = <tspan class="hl">FALSE</tspan>;</text>
  <text x="750" y="330" class="text comment">// 퇴출 영역 (Unlock)</text>

  <text x="600" y="380" class="text comment">// 나머지 영역 (Remainder Section)</text>
  
  <text x="570" y="430" class="text hl">} while ( TRUE );</text>

  <!-- Descriptive Arrow -->
  <path class="arrow" d="M350,540 C550,540 500,210 590,205"/>
  <rect x="180" y="500" width="300" height="80" fill="#ffebd2" stroke="#ffb142" stroke-width="2" rx="8"/>
  <text x="330" y="535" class="title text" font-size="16" fill="#cc8e35" text-anchor="middle">lock이 FALSE 일 때만 루프를 탈출하여</text>
  <text x="330" y="560" class="title text" font-size="16" fill="#cc8e35" text-anchor="middle">임계구역에 진입 (동시에 lock은 TRUE가 됨)</text>

</svg>
