<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --pa-color: #3498db;
        --pa-bg: #81ecec;
        --pb-color: #e67e22;
        --pb-bg: #ffeaa7;
        --line: #2d3436;
        --dash: #636e72;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --pa-color: #2980b9;
          --pa-bg: #00cec9;
          --pb-color: #d35400;
          --pb-bg: #fdcb6e;
          --line: #dfe6e9;
          --dash: #b2bec3;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; }
      .title { font-size: 24px; font-weight: bold; }
      .timeline { stroke: var(--line); stroke-width: 2; fill: none; }
      .dash { stroke: var(--dash); stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
      .mark { stroke: var(--text); stroke-width: 3; fill: none; marker-end: url(#arrow-down); }
    </style>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">임계 영역(Critical Section)의 시간에 따른 상호배제 흐름</text>

  <!-- Timelines base -->
  <text x="150" y="160" class="text title" font-size="20" text-anchor="end">프로세스 A</text>
  <path d="M 180 155 L 900 155" class="timeline"/>

  <text x="150" y="320" class="text title" font-size="20" text-anchor="end">프로세스 B</text>
  <path d="M 180 315 L 900 315" class="timeline"/>

  <!-- T1: A enters -->
  <path d="M 220 155 L 220 370" class="dash" stroke="var(--pa-color)"/>
  <text x="220" y="390" class="title text" font-size="20" text-anchor="middle">T1</text>
  <text x="260" y="100" class="text" text-anchor="middle">A가 임계 영역에 진입</text>
  <path d="M 280 110 L 220 150" class="mark"/>

  <!-- A processing block -->
  <rect x="220" y="145" width="380" height="20" fill="var(--pa-color)"/>

  <!-- T2: B tries -->
  <path d="M 340 155 L 340 370" class="dash" stroke="var(--pb-color)"/>
  <text x="340" y="390" class="title text" font-size="20" text-anchor="middle">T2</text>
  <text x="440" y="250" class="text" text-anchor="middle">B가 진입 시도하지만 A가 선점 중</text>
  <text x="440" y="270" class="text" fill="#ff7675" text-anchor="middle">(B는 대기 상태로 전환)</text>
  <path d="M 380 280 L 340 310" class="mark"/>

  <!-- T3: A exits, B enters -->
  <path d="M 600 155 L 600 370" class="dash" stroke="var(--pa-color)"/>
  <text x="600" y="390" class="title text" font-size="20" text-anchor="middle">T3</text>
  <text x="600" y="100" class="text" text-anchor="middle">A가 임계 영역에서 나옴 (Exit)</text>
  <path d="M 640 110 L 600 150" class="mark"/>

  <text x="670" y="250" class="text" text-anchor="middle">B가 드디어 진입 승인</text>
  <path d="M 640 260 L 600 310" class="mark"/>

  <!-- B processing block -->
  <rect x="600" y="305" width="260" height="20" fill="var(--pb-color)"/>

  <!-- T4: B exits -->
  <path d="M 860 315 L 860 370" class="dash" stroke="var(--pb-color)"/>
  <text x="860" y="390" class="title text" font-size="20" text-anchor="middle">T4</text>
  <text x="860" y="270" class="text" text-anchor="middle">B가 임계 영역에서 나옴</text>
  <path d="M 820 280 L 860 310" class="mark"/>

</svg>
