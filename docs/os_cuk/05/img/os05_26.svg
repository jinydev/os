<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --code-bg: #f8f9fa;
        --cmd: #9b59b6;
        --sect1: #ffb8b8;
        --sect2: #fab1a0;
        --sect3: #ffeaa7;
        --sect4: #55efc4;
        --line: #2d3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --code-bg: #1e272e;
          --cmd: #a29bfe;
          --sect1: #d63031;
          --sect2: #e17055;
          --sect3: #fdcb6e;
          --sect4: #00b894;
          --line: #dfe6e9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'JetBrains Mono', monospace, sans-serif; font-size: 20px; }
      .title { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: bold; }
      .code-box { fill: var(--code-bg); stroke: var(--line); stroke-width: 2; rx: 8; }
      .label-text { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; fill: #2d3436; text-anchor: middle;}
      .dark-label { fill: #fff; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="60" class="title text" text-anchor="middle">임계 영역 프로세스 코드 구조 (Critical Section Structure)</text>

  <rect x="150" y="100" width="700" height="350" class="code-box"/>

  <text x="200" y="150" class="text" font-weight="bold">do {</text>

  <!-- Entry Section -->
  <rect x="250" y="170" width="500" height="40" fill="var(--sect1)" rx="4"/>
  <text x="500" y="196" class="label-text">진입 영역 (Entry section) : Lock 획득</text>

  <!-- Critical Section -->
  <rect x="250" y="230" width="500" height="40" fill="var(--sect2)" rx="4"/>
  <text x="500" y="256" class="label-text">임계 영역 (Critical section) : 공유 데이터 변경</text>

  <!-- Exit Section -->
  <rect x="250" y="290" width="500" height="40" fill="var(--sect3)" rx="4"/>
  <text x="500" y="316" class="label-text">퇴출 영역 (Exit section) : Lock 해제</text>

  <!-- Remainder Section -->
  <rect x="250" y="350" width="500" height="40" fill="var(--sect4)" rx="4"/>
  <text x="500" y="376" class="label-text">나머지 영역 (Remainder section) : 안전한 지역변수 로직</text>

  <text x="200" y="420" class="text" font-weight="bold">} while ( TRUE );</text>

</svg>
