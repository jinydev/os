<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --mut: #7f8c8d;
        --mon-bg: #f8efba;
        --mon-border: #fdcb6e;
        --proc: #55efc4;
        --cond: #74b9ff;
        --line: #2d3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --mut: #b2bec3;
          --mon-bg: #2d3436;
          --mon-border: #636e72;
          --proc: #00b894;
          --cond: #0984e3;
          --line: #dfe6e9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; }
      .title { font-size: 26px; font-weight: bold; }
      .sub-title { font-size: 20px; font-weight: bold; }
      .mon { fill: var(--mon-bg); stroke: var(--mon-border); stroke-width: 4; rx: 16; }
      .inner-box { fill: none; stroke: var(--line); stroke-width: 2; stroke-dasharray: 4 4; rx: 8; }
      .queue { fill: var(--proc); stroke: var(--line); stroke-width: 2; }
      .cond-q { fill: var(--cond); stroke: var(--line); stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">모니터 (Monitor) 아키텍처 - 강력한 객체지향 동기화 도구</text>

  <!-- Monitor Entity box -->
  <rect x="250" y="100" width="500" height="420" class="mon"/>
  <text x="500" y="140" class="text title" text-anchor="middle">Monitor Object</text>
  
  <!-- Shared Data Variables -->
  <rect x="350" y="160" width="300" height="80" class="inner-box"/>
  <text x="500" y="190" class="text sub-title" text-anchor="middle">공유 데이터 영역 (Shared Data)</text>
  <text x="500" y="215" class="text mut" font-size="16" text-anchor="middle">Private Variables (외부 직접 접근 불가)</text>

  <!-- Operations/Procedures -->
  <rect x="350" y="280" width="300" height="120" class="inner-box"/>
  <text x="500" y="320" class="text sub-title" text-anchor="middle">내부 프로시저 (Methods)</text>
  <text x="500" y="350" class="text" font-size="16" text-anchor="middle">procedure P1( ... )</text>
  <text x="500" y="375" class="text" font-size="16" text-anchor="middle">procedure P2( ... )</text>

  <!-- Initialization -->
  <rect x="350" y="440" width="300" height="50" class="inner-box"/>
  <text x="500" y="470" class="text sub-title" font-size="18" text-anchor="middle">초기화 코드 (Initialization)</text>

  <!-- External Processes Queue -->
  <g transform="translate(140, 275)">
    <rect x="-80" y="0" width="40" height="40" class="queue"/>
    <rect x="-40" y="0" width="40" height="40" class="queue"/>
    <rect x="0" y="0" width="40" height="40" class="queue"/>
    <text x="-20" y="65" class="text" font-size="16" text-anchor="middle" font-weight="bold">진입 큐 (Entry Queue)</text>
    <!-- Arrow pointing to Method -->
    <path class="arrow" d="M40,20 L210,20"/>
  </g>

  <!-- Condition Variables Queues -->
  <g transform="translate(730, 260)">
    <rect x="20" y="0" width="40" height="40" class="cond-q"/>
    <rect x="60" y="0" width="40" height="40" class="cond-q"/>
    <text x="60" y="-10" class="text" font-size="14" text-anchor="middle">Condition X</text>
    
    <rect x="20" y="70" width="40" height="40" class="cond-q"/>
    <rect x="60" y="70" width="40" height="40" class="cond-q"/>
    <rect x="100" y="70" width="40" height="40" class="cond-q"/>
    <text x="80" y="60" class="text" font-size="14" text-anchor="middle">Condition Y</text>
    
    <!-- Arrow from Method outward to Wait Queues -->
    <path class="arrow" d="M-80,40 L20,40"/>
    <path class="arrow" d="M-80,70 L20,70"/>
  </g>

  <rect x="200" y="550" width="600" height="80" fill="#e8f4f8" stroke="#3dc1d3" stroke-width="2" rx="8"/>
  <text x="500" y="585" class="text" font-size="16" fill="#1e3799" font-weight="bold" text-anchor="middle">단 하나의 프로세스/스레드만이 모니터 내부 코드를 실행할 수 있도록 보장됨</text>
  <text x="500" y="610" class="text" font-size="14" fill="#3c6382" text-anchor="middle">컴파일러가 진입 큐와 강제 락킹(Locking)을 제공하여 프로그래머의 실수 방지</text>

</svg>
