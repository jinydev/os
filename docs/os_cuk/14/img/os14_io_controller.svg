<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #ecf0f1;
        --core: #e74c3c;
        --interface: #3498db;
        --register: #2ecc71;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #34495e;
          --core: #ff7675;
          --interface: #2980b9;
          --register: #27ae60;
          --line: #95a5a6;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 18px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: normal; }
      .title { font-size: 26px; }
      
      .out-box { fill: var(--box); stroke: var(--text); stroke-width: 2; rx: 10; }
      .int-box { fill: var(--interface); rx: 5; }
      .reg-box { fill: var(--register); rx: 5; }
      .logic-box { fill: var(--core); rx: 5; }
      
      .arrow { stroke: var(--text); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-rev { stroke: var(--text); stroke-width: 3; fill: none; marker-start: url(#arrowhead-rev); }
      .arrow-bi { stroke: var(--text); stroke-width: 3; fill: none; marker-end: url(#arrowhead); marker-start: url(#arrowhead-rev); }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="var(--text)"/>
    </marker>
    <marker id="arrowhead-rev" markerWidth="6" markerHeight="4" refX="1" refY="2" orient="auto">
      <polygon points="6 0, 0 2, 6 4" fill="var(--text)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">입출력 제어기 (I/O Controller) 로직 아키텍처</text>
  
  <rect x="250" y="100" width="500" height="300" class="out-box"/>
  <text x="500" y="130" class="text" text-anchor="middle">디바이스 컨트롤러 (장치 모델 내부 칩)</text>

  <!-- Left Side: OS & Bus Interface -->
  <text x="130" y="200" class="text" text-anchor="end">데이터 선 (Data Bus)</text>
  <text x="130" y="270" class="text" text-anchor="end">제어 선 (Control Bus)</text>
  <text x="130" y="340" class="text" text-anchor="end">주소 선 (Address Bus)</text>

  <!-- Registers -->
  <rect x="280" y="160" width="140" height="30" class="reg-box"/>
  <text x="350" y="181" class="text-sm" fill="#fff" text-anchor="middle">데이터 레지스터 (Data)</text>
  <path d="M 150 175 L 280 175" class="arrow-bi"/>
  
  <rect x="280" y="200" width="140" height="30" class="reg-box"/>
  <text x="350" y="221" class="text-sm" fill="#fff" text-anchor="middle">상태 레지스터 (Status)</text>
  <path d="M 230 175 L 230 215 L 280 215" class="arrow-rev"/>
  
  <rect x="280" y="240" width="140" height="30" class="reg-box"/>
  <text x="350" y="261" class="text-sm" fill="#fff" text-anchor="middle">명령/제어 (Control)</text>
  <path d="M 150 265 L 230 265 L 230 255 L 280 255" class="arrow"/>
  
  <!-- Controller Internal Logic -->
  <rect x="470" y="210" width="100" height="150" class="logic-box"/>
  <text x="520" y="270" class="text" fill="#fff" text-anchor="middle">컨트롤러</text>
  <text x="520" y="300" class="text" fill="#fff" text-anchor="middle">논리회로</text>

  <path d="M 420 175 L 520 175 L 520 210" class="arrow-bi"/>
  <path d="M 420 215 L 470 215" class="arrow-rev"/>
  <path d="M 420 255 L 470 255" class="arrow"/>
  <path d="M 150 335 L 470 335" class="arrow"/> <!-- Address logic mapping -->

  <!-- Right Side: Device Specific Interface -->
  <rect x="620" y="200" width="100" height="120" class="int-box"/>
  <text x="670" y="250" class="text-sm" fill="#fff" text-anchor="middle">물리장치</text>
  <text x="670" y="275" class="text-sm" fill="#fff" text-anchor="middle">인터페이스</text>

  <path d="M 570 260 L 620 260" class="arrow-bi"/>

  <text x="890" y="210" class="text" text-anchor="start">데이터 라인 Pin</text>
  <text x="890" y="260" class="text" text-anchor="start">장치 상태 Pin</text>
  <text x="890" y="310" class="text" text-anchor="start">물리 구동 Pin</text>
  
  <path d="M 720 205 L 870 205" class="arrow-bi"/>
  <path d="M 720 255 L 870 255" class="arrow-rev"/>
  <path d="M 720 305 L 870 305" class="arrow"/>

</svg>
