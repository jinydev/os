<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --app: #e67e22;
        --kernel: #2ecc71;
        --driver: #3498db;
        --hw: #95a5a6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --app: #d35400;
          --kernel: #27ae60;
          --driver: #2980b9;
          --hw: #7f8c8d;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 18px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: normal; }
      .title { font-size: 26px; }
      
      .layer { fill: transparent; stroke: var(--text); stroke-width: 3; rx: 10; }
      .block { rx: 5; }
      .arrow-bi { stroke: var(--text); stroke-width: 4; fill: none; marker-end: url(#arrowhead); marker-start: url(#arrowhead-rev); }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="var(--text)"/>
    </marker>
    <marker id="arrowhead-rev" markerWidth="6" markerHeight="4" refX="1" refY="2" orient="auto">
      <polygon points="6 0, 0 2, 6 4" fill="var(--text)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">커널 I/O 서브시스템의 우아한 추상화 구조 (Layered Architecture)</text>

  <!-- Level 1: Application -->
  <rect x="250" y="80" width="500" height="50" class="block" fill="var(--app)"/>
  <text x="500" y="110" class="text" fill="#fff" text-anchor="middle">응용 프로그램 (Application Node.js, C++, WebBrowser)</text>
  <text x="130" y="110" class="text" text-anchor="middle">User Space</text>
  
  <path d="M 500 130 L 500 160" class="arrow-bi"/>
  <text x="520" y="150" class="text-sm">표준 System Call (open, read, write, ioctl)</text>

  <line x1="50" y1="165" x2="950" y2="165" stroke="var(--text)" stroke-width="2" stroke-dasharray="10 5"/>

  <!-- Level 2: Kernel I/O Subsystem -->
  <text x="130" y="240" class="text" text-anchor="middle">Kernel Space</text>
  
  <rect x="250" y="180" width="500" height="60" class="layer"/>
  <text x="500" y="215" class="text" text-anchor="middle">커널 입출력 서브시스템 (VFS, 스케줄러, 버퍼/캐시 매니저)</text>

  <path d="M 350 240 L 350 270" class="arrow-bi"/>
  <path d="M 650 240 L 650 270" class="arrow-bi"/>
  <text x="500" y="260" class="text-sm" text-anchor="middle">표준규격 장치 드라이버 인터페이스 (통일성)</text>

  <!-- Level 3: Device Drivers -->
  <rect x="250" y="280" width="230" height="50" class="block" fill="var(--driver)"/>
  <text x="365" y="310" class="text" fill="#fff" text-anchor="middle">NVIDIA 그래픽 장치 드라이버</text>

  <rect x="520" y="280" width="230" height="50" class="block" fill="var(--driver)"/>
  <text x="635" y="310" class="text" fill="#fff" text-anchor="middle">WD 디스크 장치 드라이버</text>

  <line x1="50" y1="350" x2="950" y2="350" stroke="var(--text)" stroke-width="2" stroke-dasharray="10 5"/>

  <path d="M 365 330 L 365 370" class="arrow-bi"/>
  <path d="M 635 330 L 635 370" class="arrow-bi"/>

  <!-- Level 4: Hardware Controllers -->
  <text x="130" y="405" class="text" text-anchor="middle">Hardware</text>

  <rect x="250" y="380" width="230" height="50" class="block" fill="var(--hw)"/>
  <text x="365" y="410" class="text" fill="#fff" text-anchor="middle">PCIe 그래픽 카드 칩</text>

  <rect x="520" y="380" width="230" height="50" class="block" fill="var(--hw)"/>
  <text x="635" y="410" class="text" fill="#fff" text-anchor="middle">SATA/NVMe 디스크 물리칩</text>

  <text x="880" y="250" class="text-sm" fill="var(--kernel)">기기벤더(하드웨어사)는</text>
  <text x="880" y="270" class="text-sm" fill="var(--kernel)">오직 드라이버만</text>
  <text x="880" y="290" class="text-sm" fill="var(--kernel)">규격에 맞춰 납품한다.</text>

</svg>
