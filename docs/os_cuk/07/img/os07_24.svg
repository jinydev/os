<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --head: #bdc3c7;
        --pcb: #3498db;
        --line: #2c3e50;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --head: #636e72;
          --pcb: #2980b9;
          --line: #bdc3c7;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
      .desc { font-weight: normal; font-size: 14px; fill: var(--text); }
      .title { font-size: 24px; }
      .head-box { fill: var(--head); stroke: var(--text); stroke-width: 2; rx: 4; }
      .pcb-box { fill: transparent; stroke: var(--pcb); stroke-width: 3; rx: 4; }
      .inner-line { stroke: var(--pcb); stroke-width: 2; }
      .head-inner-line { stroke: var(--text); stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">스케줄링 다단계 큐 원리 (PCB Linked List)</text>

  <!-- Left Labels -->
  <text x="350" y="90" class="text title" text-anchor="middle">큐 헤더</text>
  <text x="210" y="140" class="text" text-anchor="middle">준비 큐</text>
  
  <!-- Ready Queue Header -->
  <rect x="280" y="100" width="100" height="60" class="head-box"/>
  <path d="M 280 130 L 380 130" class="head-inner-line"/>
  <text x="330" y="122" class="text" text-anchor="middle">head</text>
  <text x="330" y="152" class="text" text-anchor="middle">tail</text>

  <!-- Ready Queue PCBs (PCB7, PCB2) -->
  <text x="490" y="90" class="text" text-anchor="middle">PCB 7</text>
  <rect x="440" y="100" width="100" height="100" class="pcb-box"/>
  <path d="M 440 130 L 540 130" class="inner-line"/>
  <path d="M 440 160 L 540 160" class="inner-line"/>
  <text x="490" y="152" class="text" text-anchor="middle">레지스터</text>
  <text x="490" y="185" class="text" text-anchor="middle">...</text>

  <text x="650" y="90" class="text" text-anchor="middle">PCB 2</text>
  <rect x="600" y="100" width="100" height="100" class="pcb-box"/>
  <path d="M 600 130 L 700 130" class="inner-line"/>
  <path d="M 600 160 L 700 160" class="inner-line"/>
  <text x="650" y="152" class="text" text-anchor="middle">레지스터</text>
  <text x="650" y="185" class="text" text-anchor="middle">...</text>

  <!-- Ready Queue Edges -->
  <path d="M 380 115 L 430 115" class="arrow"/>
  <path d="M 540 115 L 590 115" class="arrow"/>
  <path d="M 700 115 L 730 115" class="arrow"/> <!-- Null pointer -->
  <!-- Tail pointer -->
  <path d="M 380 145 Q 500 220 595 190" class="arrow"/>

  
  <!-- Printer 1 Queue Header -->
  <text x="210" y="230" class="text" text-anchor="middle">프린터 1</text>
  <rect x="280" y="190" width="100" height="60" class="head-box"/>
  <path d="M 280 220 L 380 220" class="head-inner-line"/>
  <text x="330" y="212" class="text" text-anchor="middle">head</text>
  <text x="330" y="242" class="text" text-anchor="middle">tail</text>

  <!-- Printer 1 Empty Edges -->
  <path d="M 380 205 L 410 205" class="arrow"/>
  <path d="M 380 235 L 410 235" class="arrow"/>


  <!-- Printer 2 Queue Header -->
  <text x="210" y="320" class="text" text-anchor="middle">프린터 2</text>
  <rect x="280" y="280" width="100" height="60" class="head-box"/>
  <path d="M 280 310 L 380 310" class="head-inner-line"/>
  <text x="330" y="302" class="text" text-anchor="middle">head</text>
  <text x="330" y="332" class="text" text-anchor="middle">tail</text>

  <!-- Printer 2 PCBs (PCB3, PCB14, PCB6) -->
  <text x="490" y="270" class="text" text-anchor="middle">PCB 3</text>
  <rect x="440" y="280" width="100" height="100" class="pcb-box"/>
  <path d="M 440 310 L 540 310" class="inner-line"/>
  <path d="M 440 340 L 540 340" class="inner-line"/>

  <text x="650" y="270" class="text" text-anchor="middle">PCB 14</text>
  <rect x="570" y="280" width="100" height="100" class="pcb-box"/>
  <path d="M 570 310 L 670 310" class="inner-line"/>
  <path d="M 570 340 L 670 340" class="inner-line"/>

  <text x="780" y="270" class="text" text-anchor="middle">PCB 6</text>
  <rect x="700" y="280" width="100" height="100" class="pcb-box"/>
  <path d="M 700 310 L 800 310" class="inner-line"/>
  <path d="M 700 340 L 800 340" class="inner-line"/>

  <!-- Printer 2 Edges -->
  <path d="M 380 295 L 430 295" class="arrow"/>
  <path d="M 540 295 L 560 295" class="arrow"/>
  <path d="M 670 295 L 690 295" class="arrow"/>
  <path d="M 800 295 L 830 295" class="arrow"/>
  <!-- Tail -->
  <path d="M 380 325 L 410 330" class="arrow"/>


  <!-- Disk Queue Header -->
  <text x="210" y="410" class="text" text-anchor="middle">디스크</text>
  <rect x="280" y="370" width="100" height="60" class="head-box"/>
  <path d="M 280 400 L 380 400" class="head-inner-line"/>
  <text x="330" y="392" class="text" text-anchor="middle">head</text>
  <text x="330" y="422" class="text" text-anchor="middle">tail</text>

  <!-- Disk PCB (PCB5) -->
  <text x="490" y="440" class="text" text-anchor="middle">PCB 5</text>
  <rect x="440" y="450" width="100" height="100" class="pcb-box"/>
  <path d="M 440 480 L 540 480" class="inner-line"/>
  <path d="M 440 510 L 540 510" class="inner-line"/>

  <!-- Disk Edges -->
  <path d="M 380 385 Q 410 395 435 460" class="arrow"/>
  <path d="M 380 415 Q 410 405 435 480" class="arrow"/>
  <path d="M 540 465 L 570 465" class="arrow"/>


  <!-- Terminal Queue Header -->
  <text x="210" y="500" class="text" text-anchor="middle">단말기</text>
  <rect x="280" y="460" width="100" height="60" class="head-box"/>
  <path d="M 280 490 L 380 490" class="head-inner-line"/>
  <text x="330" y="482" class="text" text-anchor="middle">head</text>
  <text x="330" y="512" class="text" text-anchor="middle">tail</text>

  <!-- Terminal Empty Edges -->
  <path d="M 380 475 L 435 475" class="arrow"/>
  <path d="M 380 505 L 435 505" class="arrow"/>

</svg>
