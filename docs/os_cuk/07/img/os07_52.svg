<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --axis: #34495e;
        --p1: #1565c0;
        --p2: #1976d2;
        --p3: #2196f3;
        --p4: #42a5f5;
        --p5: #64b5f6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --axis: #bdc3c7;
          --p1: #3f51b5;
          --p2: #5c6bc0;
          --p3: #7986cb;
          --p4: #9fa8da;
          --p5: #c5cae9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
      .desc { font-weight: normal; font-size: 16px; fill: var(--text); }
      .title { font-size: 24px; }
      .gantt-bg { fill: var(--p2); stroke: var(--bg); stroke-width: 2; }
      .arrow { stroke: #e74c3c; stroke-width: 3; fill: none; marker-end: url(#arrowhead-red); }
    </style>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">선점형 SJF (SRTF, Shortest Remaining Time First) 스케줄링</text>

  <!-- Source Table Mapping -->
  <text x="50" y="80" class="text" text-anchor="start">도착: P1(0), P2(1), P3(2), P4(3), P5(4)</text>
  <text x="50" y="110" class="text" text-anchor="start">잔여 실행시간 추적: P1(10), P2(28), P3(6), P4(4), P5(14)</text>

  <text x="50" y="140" class="text" text-anchor="start" fill="#e74c3c">특징: 매 도착 시점마다, 남은 잔여시간을 비교하여 더 짧은 놈이 CPU를 강제로 뺏음 (Preemption)</text>

  <!-- SRTF Gantt Box -->
  <!-- Timeline Start = 0 -->
  <text x="100" y="270" class="text" text-anchor="middle">0</text>
  
  <!-- t=0: P1 runs. -->
  <rect x="100" y="160" width="20" height="80" class="gantt-bg" fill="var(--p1)"/>
  <text x="110" y="205" class="text" fill="#fff" text-anchor="middle" font-size="16">P1</text>
  <text x="120" y="270" class="text" text-anchor="middle">2</text>

  <!-- t=1: P2 arr(28). P1=9 -> P1 keeps running until t=2 -->
  <!-- t=2: P3 arr(6). P1=8. P3(6) < P1(8) -> PREEMPT! -->
  <path d="M 120 150 L 120 120 L 100 120" class="arrow"/>
  <text x="130" y="110" class="text" fill="#e74c3c">선점!</text>

  <!-- P3 runs: t=2 to t=3. -->
  <rect x="120" y="160" width="10" height="80" class="gantt-bg" fill="var(--p3)"/>
  <text x="125" y="270" class="text" text-anchor="middle">3</text>

  <!-- t=3: P4 arr(4). P3=5. P4(4) < P3(5) -> PREEMPT! -->
  <path d="M 130 150 L 130 90 L 110 90" class="arrow"/>

  <!-- P4 runs: t=3 to t=7 (finishes). -->
  <rect x="130" y="160" width="40" height="80" class="gantt-bg" fill="var(--p4)"/>
  <text x="150" y="205" class="text" fill="#fff" text-anchor="middle" font-size="18">P4</text>
  <text x="170" y="270" class="text" text-anchor="middle">7</text>
  
  <!-- t=7: Wait queue: P3(5), P1(8), P5(14), P2(28). Shortest: P3(5). Runs to 12. -->
  <rect x="170" y="160" width="50" height="80" class="gantt-bg" fill="var(--p3)"/>
  <text x="195" y="205" class="text" fill="#fff" text-anchor="middle" font-size="22">P3</text>
  <text x="220" y="270" class="text" text-anchor="middle">12</text>

  <!-- t=12: Wait queue: P1(8), P5(14), P2(28). Shortest: P1(8). Runs to 20. -->
  <rect x="220" y="160" width="80" height="80" class="gantt-bg" fill="var(--p1)"/>
  <text x="260" y="205" class="text" fill="#fff" text-anchor="middle" font-size="22">P1</text>
  <text x="300" y="270" class="text" text-anchor="middle">20</text>

  <!-- t=20: Wait queue: P5(14), P2(28). Shortest: P5(14). Runs to 34. -->
  <rect x="300" y="160" width="140" height="80" class="gantt-bg" fill="var(--p5)"/>
  <text x="370" y="205" class="text" fill="#fff" text-anchor="middle" font-size="22">P5</text>
  <text x="440" y="270" class="text" text-anchor="middle">34</text>

  <!-- t=34: Wait queue: P2(28). Shortest: P2(28). Runs to 62. -->
  <rect x="440" y="160" width="280" height="80" class="gantt-bg" fill="var(--p2)"/>
  <text x="580" y="205" class="text" fill="#fff" text-anchor="middle" font-size="22">P2</text>
  <text x="720" y="270" class="text" text-anchor="middle">62</text>


  <!-- Metrics Box -->
  <rect x="50" y="320" width="900" height="100" fill="transparent" stroke="var(--axis)" stroke-width="2"/>
  
  <text x="80" y="350" class="text">반환시간</text>
  <text x="80" y="380" class="desc">P1: 20, P2: 61, P3: 10, P4: 4, P5: 30 (평균: 25.0)</text>

  <text x="500" y="350" class="text">대기시간</text>
  <text x="500" y="380" class="desc">P1: 10, P2: 33, P3: 4, P4: 0, P5: 16 (평균: 12.6)</text>

</svg>
