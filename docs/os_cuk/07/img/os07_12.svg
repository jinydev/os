<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --state: #3498db;
        --active: #e74c3c;
        --line: #7f8c8d;
        --desc: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --state: #2980b9;
          --active: #c0392b;
          --line: #b2bec3;
          --desc: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .desc { fill: var(--desc); font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; }
      .state-circle { fill: var(--state); stroke: #ffffff; stroke-width: 4; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text" text-anchor="middle" font-size="28">프로세스의 상태 변화 모델</text>

  <!-- States -->
  <circle cx="150" cy="150" r="50" class="state-circle"/>
  <text x="150" y="157" class="text" fill="#fff" text-anchor="middle" font-size="24">생성</text>

  <circle cx="350" cy="250" r="50" class="state-circle"/>
  <text x="350" y="257" class="text" fill="#fff" text-anchor="middle" font-size="24">준비</text>
  <text x="350" y="160" class="text" font-weight="normal" text-anchor="middle">CPU를 할당받으려고</text>
  <text x="350" y="185" class="text" font-weight="normal" text-anchor="middle">기다리는 상태</text>

  <circle cx="650" cy="250" r="50" class="state-circle"/>
  <text x="650" y="257" class="text" fill="#fff" text-anchor="middle" font-size="24">실행</text>
  <text x="650" y="160" class="text" font-weight="normal" text-anchor="middle">CPU 프로세서를 점유하여</text>
  <text x="650" y="185" class="text" font-weight="normal" text-anchor="middle">명령어가 실행되는 상태</text>

  <circle cx="850" cy="250" r="50" class="state-circle"/>
  <text x="850" y="257" class="text" fill="#fff" text-anchor="middle" font-size="24">종료</text>

  <circle cx="350" cy="420" r="50" class="state-circle"/>
  <text x="350" y="415" class="text" fill="#fff" text-anchor="middle" font-size="24">대기</text>
  <text x="350" y="445" class="text" fill="#fff" text-anchor="middle" font-size="16">(보류)</text>
  
  <text x="570" y="420" class="text" font-weight="normal" text-anchor="middle">이벤트나 입출력 대기 신호</text>
  <text x="570" y="445" class="text" font-weight="normal" text-anchor="middle">발생을 기다리는 상태</text>

  <!-- Edges -->
  <!-- 생성 -> 준비 -->
  <path d="M 185 185 L 315 215" class="arrow"/>

  <!-- 준비 -> 실행 (디스패치) -->
  <path d="M 400 230 L 600 230" class="arrow"/>
  <rect x="440" y="200" width="120" height="25" fill="#ffeaa7" rx="4"/>
  <text x="500" y="218" class="desc" text-anchor="middle">디스패치</text>

  <!-- 실행 -> 준비 (시간 종료) -->
  <path d="M 600 270 L 400 270" class="arrow"/>
  <rect x="440" y="280" width="120" height="25" fill="#ffeaa7" rx="4"/>
  <text x="500" y="298" class="desc" text-anchor="middle">시간 종료</text>

  <!-- 실행 -> 종료 -->
  <path d="M 700 250 L 800 250" class="arrow"/>
  <text x="750" y="240" class="desc" text-anchor="middle">완료</text>

  <!-- 실행 -> 대기 -->
  <path d="M 610 280 L 390 400" class="arrow"/>
  <rect x="450" y="340" width="160" height="50" fill="#ffeaa7" rx="4"/>
  <text x="530" y="360" class="desc" text-anchor="middle">이벤트나</text>
  <text x="530" y="380" class="desc" text-anchor="middle">입출력 신호 발생</text>

  <!-- 대기 -> 준비 -->
  <path d="M 350 370 L 350 300" class="arrow"/>
  <rect x="180" y="310" width="160" height="50" fill="#ffeaa7" rx="4"/>
  <text x="260" y="330" class="desc" text-anchor="middle">이벤트나</text>
  <text x="260" y="350" class="desc" text-anchor="middle">입출력 완료</text>

</svg>
