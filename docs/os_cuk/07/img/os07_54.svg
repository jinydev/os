<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --axis: #34495e;
        --line: #3498db;
        --highlight: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --axis: #bdc3c7;
          --line: #2980b9;
          --highlight: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .title { font-size: 24px; }
      .axis { stroke: var(--axis); stroke-width: 4; fill: none; }
      .graph { stroke: var(--line); stroke-width: 5; fill: none; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">에이징 (Aging) 기법: 기아 상태(Starvation) 해결책</text>
  <text x="500" y="90" class="text" font-weight="normal" text-anchor="middle">우선 순위가 낮은 프로세스가 무기한 지연되는 현상을 막기 위함</text>
  
  <text x="500" y="130" class="text" fill="var(--highlight)" text-anchor="middle">시간이 지날수록 대기 중인 프로세스의 우선 순위를 높여줌!</text>


  <!-- Graph Axes -->
  <!-- Y Axis (Priority) -->
  <path d="M 250 400 L 250 200" class="axis"/>
  <text x="230" y="210" class="text" text-anchor="end">우선 순위 (높음)</text>
  <text x="230" y="390" class="text" text-anchor="end">우선 순위 (낮음)</text>

  <!-- X Axis (Time) -->
  <path d="M 250 400 L 750 400" class="axis"/>
  <text x="730" y="430" class="text" text-anchor="middle">시간 (대기 시간)</text>

  <!-- Graph Line (Aging Curve) -->
  <path d="M 250 400 L 700 230" class="graph"/>

  <!-- Annotation -->
  <rect x="650" y="180" width="120" height="40" fill="var(--line)" rx="8"/>
  <text x="710" y="208" class="text" fill="#fff" text-anchor="middle">우선 순위 상승</text>

  <path d="M 500 305 L 450 280" stroke="var(--highlight)" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="350" y="270" class="text" fill="var(--highlight)" text-anchor="middle">에이징 (Aging)</text>

</svg>
