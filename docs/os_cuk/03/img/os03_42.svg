<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .box { rx: 10; stroke-width: 3; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1E293B"/>
            <stop offset="100%" stop-color="#0F172A"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
        </marker>
    </defs>

    <rect width="900" height="400" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#FFFFFF" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="1">시스템 호출과 유저-커널 모드 전환</text>

    <!-- Split Panels -->
    <!-- User space -->
    <rect x="50" y="90" width="800" height="130" fill="#0C4A6E" class="box" stroke="#0284C7"/>
    <text x="70" y="120" fill="#38BDF8" font-size="18" font-weight="800" text-anchor="start">사용자 모드 (Mode Bit = 1)</text>
    <text x="830" y="120" fill="#38BDF8" font-size="16" font-weight="600" text-anchor="end">안전 영역 (HW 직접 제어 불가)</text>
    
    <!-- Kernel space -->
    <rect x="50" y="240" width="800" height="130" fill="#4C1D95" class="box" stroke="#7C3AED"/>
    <text x="70" y="350" fill="#A78BFA" font-size="18" font-weight="800" text-anchor="start">운영체제 커널 모드 (Mode Bit = 0)</text>
    <text x="830" y="350" fill="#A78BFA" font-size="16" font-weight="600" text-anchor="end">권한 영역 (HW 제어 가능)</text>

    <!-- Line divider -->
    <line x1="50" y1="230" x2="850" y2="230" stroke="#475569" stroke-width="6" stroke-dasharray="10"/>

    <!-- Process blocks -->
    <rect x="150" y="130" width="160" height="60" fill="#0369a1" stroke="#38BDF8" class="box"/>
    <text x="230" y="165" fill="#F0F9FF" font-size="16" font-weight="800" text-anchor="middle">일반 프로그램 실행</text>

    <rect x="370" y="270" width="160" height="60" fill="#5b21b6" stroke="#C084FC" class="box"/>
    <text x="450" y="305" fill="#FAF5FF" font-size="16" font-weight="800" text-anchor="middle">시스템 콜 (OS 함수) 처리</text>

    <rect x="590" y="130" width="160" height="60" fill="#0369a1" stroke="#38BDF8" class="box"/>
    <text x="670" y="165" fill="#F0F9FF" font-size="16" font-weight="800" text-anchor="middle">프로세스 복귀 지속</text>

    <!-- Arrows -->
    <!-- Drop down arrow -->
    <path d="M 310 160 L 370 270" stroke="#3B82F6" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
    <text x="230" y="220" fill="#93C5FD" font-size="14" font-weight="800" text-anchor="middle">시스템 콜 (소프트 트랩)</text>
    <text x="230" y="240" fill="#E2E8F0" font-size="12" font-weight="400" text-anchor="middle">CPU 모드 비트 1 -> 0 변경</text>

    <!-- Climb up arrow -->
    <path d="M 530 270 L 590 160" stroke="#3B82F6" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
    <text x="670" y="240" fill="#F3F4F6" font-size="12" font-weight="400" text-anchor="middle">CPU 모드 비트 0 -> 1 복원</text>
    <text x="670" y="220" fill="#93C5FD" font-size="14" font-weight="800" text-anchor="middle">리턴 및 권한 반납</text>

</svg>
