<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .box { rx: 10; stroke-width: 3; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1E293B"/>
            <stop offset="100%" stop-color="#0F172A"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
        </marker>
    </defs>

    <rect width="900" height="400" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#FFFFFF" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="1">USER MODE vs KERNEL MODE TRANSITION</text>

    <!-- Split Background Panels -->
    <!-- User space -->
    <rect x="50" y="90" width="800" height="130" fill="#0C4A6E" class="box" stroke="transparent"/>
    <text x="70" y="120" fill="#38BDF8" font-size="18" font-weight="800" text-anchor="start">User Process Space (Mode Bit = 1)</text>
    
    <!-- Kernel space -->
    <rect x="50" y="240" width="800" height="130" fill="#4C1D95" class="box" stroke="transparent"/>
    <text x="70" y="350" fill="#A78BFA" font-size="18" font-weight="800" text-anchor="start">Kernel OS Space (Mode Bit = 0)</text>

    <!-- Line divider -->
    <line x1="50" y1="230" x2="850" y2="230" stroke="#475569" stroke-width="6" stroke-dasharray="10"/>

    <!-- Process blocks -->
    <rect x="150" y="130" width="160" height="60" fill="#0284C7" stroke="#38BDF8" class="box"/>
    <text x="230" y="165" fill="#F0F9FF" font-size="16" font-weight="800" text-anchor="middle">App Execution</text>

    <rect x="370" y="270" width="160" height="60" fill="#7C3AED" stroke="#C084FC" class="box"/>
    <text x="450" y="305" fill="#FAF5FF" font-size="16" font-weight="800" text-anchor="middle">Execute Syscall</text>

    <rect x="590" y="130" width="160" height="60" fill="#0284C7" stroke="#38BDF8" class="box"/>
    <text x="670" y="165" fill="#F0F9FF" font-size="16" font-weight="800" text-anchor="middle">Resume App</text>

    <!-- Arrows -->
    <!-- Drop down arrow -->
    <path d="M 310 160 L 370 270" stroke="#3B82F6" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="250" y="220" fill="#93C5FD" font-size="14" font-weight="600" text-anchor="middle">Trap / Syscall</text>
    <text x="250" y="240" fill="#E2E8F0" font-size="12" font-weight="400" text-anchor="middle">Set Mode = 0</text>

    <!-- Climb up arrow -->
    <path d="M 530 270 L 590 160" stroke="#3B82F6" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="650" y="240" fill="#F3F4F6" font-size="12" font-weight="400" text-anchor="middle">Set Mode = 1</text>
    <text x="650" y="220" fill="#93C5FD" font-size="14" font-weight="600" text-anchor="middle">Return from trap</text>

</svg>
