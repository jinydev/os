<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .box { rx: 12; stroke-width: 3; }
            .cir { stroke-width: 4; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
        </marker>
        <filter id="shadow">
            <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
        </filter>
    </defs>
    <rect width="900" height="500" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#F8FAFC" font-size="28" font-weight="800" text-anchor="middle">프로세스 생성 시 세부 작업 순서</text>

    <line x1="200" y1="120" x2="200" y2="440" stroke="#3B82F6" stroke-width="8" marker-end="url(#arrow)"/>

    <!-- Step 1 -->
    <g transform="translate(200, 140)">
        <circle cx="0" cy="0" r="25" fill="#1E3A8A" stroke="#60A5FA" class="cir"/>
        <text x="0" y="8" fill="#DBEAFE" font-size="24" font-weight="800" text-anchor="middle">1</text>
        <rect x="50" y="-30" width="550" height="60" fill="#0F172A" class="box" stroke="#334155" filter="url(#shadow)"/>
        <text x="70" y="5" fill="#E2E8F0" font-size="20" font-weight="800">새로운 프로세스에 고유한 식별자 (PID) 할당</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(200, 240)">
        <circle cx="0" cy="0" r="25" fill="#1E3A8A" stroke="#60A5FA" class="cir"/>
        <text x="0" y="8" fill="#DBEAFE" font-size="24" font-weight="800" text-anchor="middle">2</text>
        <rect x="50" y="-40" width="550" height="80" fill="#0F172A" class="box" stroke="#334155" filter="url(#shadow)"/>
        <text x="70" y="-5" fill="#E2E8F0" font-size="20" font-weight="800">프로세스의 코드/데이터를 위한 메모리 주소 공간 할당</text>
        <text x="70" y="25" fill="#94A3B8" font-size="18" font-weight="600">및 PCB를 저장할 커널 공간 할당</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(200, 340)">
        <circle cx="0" cy="0" r="25" fill="#1E3A8A" stroke="#60A5FA" class="cir"/>
        <text x="0" y="8" fill="#DBEAFE" font-size="24" font-weight="800" text-anchor="middle">3</text>
        <rect x="50" y="-30" width="550" height="60" fill="#0F172A" class="box" stroke="#334155" filter="url(#shadow)"/>
        <text x="70" y="5" fill="#E2E8F0" font-size="20" font-weight="800">PCB 초기화 (상태 = New, PC = 시작 주소 등 설정)</text>
    </g>

    <!-- Step 4 -->
    <g transform="translate(200, 440)">
        <circle cx="0" cy="0" r="25" fill="#1E3A8A" stroke="#60A5FA" class="cir"/>
        <text x="0" y="8" fill="#DBEAFE" font-size="24" font-weight="800" text-anchor="middle">4</text>
        <rect x="50" y="-30" width="550" height="60" fill="#0F172A" class="box" stroke="#10B981" filter="url(#shadow)"/>
        <text x="70" y="5" fill="#A7F3D0" font-size="20" font-weight="800">준비(Ready) 상태로 변환하여 준비 큐(Ready Queue)에 삽입</text>
    </g>
</svg>
