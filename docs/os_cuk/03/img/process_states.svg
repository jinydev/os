<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .node { rx: 40; stroke-width: 3; }
            .edge { stroke: #64748B; stroke-width: 3; fill: none; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
        </marker>
        <filter id="glow">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <rect width="900" height="500" rx="20" fill="url(#bg)"/>
    
    <text x="450" y="50" fill="#F8FAFC" font-size="24" font-weight="800" text-anchor="middle" letter-spacing="2">PROCESS STATE TRANSITIONS</text>

    <!-- Nodes -->
    <!-- NEW -->
    <g transform="translate(50, 210)" filter="url(#glow)">
        <rect width="120" height="80" fill="#1E3A8A" stroke="#3B82F6" class="node"/>
        <text x="60" y="48" fill="#DBEAFE" font-size="20" font-weight="800" text-anchor="middle">NEW</text>
    </g>

    <!-- READY -->
    <g transform="translate(280, 210)" filter="url(#glow)">
        <rect width="120" height="80" fill="#065F46" stroke="#10B981" class="node"/>
        <text x="60" y="48" fill="#D1FAE5" font-size="20" font-weight="800" text-anchor="middle">READY</text>
    </g>

    <!-- RUNNING -->
    <g transform="translate(510, 210)" filter="url(#glow)">
        <rect width="140" height="80" fill="#9D174D" stroke="#EC4899" class="node"/>
        <text x="70" y="48" fill="#FCE7F3" font-size="20" font-weight="800" text-anchor="middle">RUNNING</text>
    </g>

    <!-- WAITING -->
    <g transform="translate(380, 360)" filter="url(#glow)">
        <rect width="140" height="80" fill="#B45309" stroke="#F59E0B" class="node"/>
        <text x="70" y="48" fill="#FEF3C7" font-size="20" font-weight="800" text-anchor="middle">WAITING</text>
    </g>

    <!-- TERMINATED -->
    <g transform="translate(740, 210)" filter="url(#glow)">
        <rect width="140" height="80" fill="#374151" stroke="#9CA3AF" class="node"/>
        <text x="70" y="48" fill="#F3F4F6" font-size="18" font-weight="800" text-anchor="middle">TERMINATED</text>
    </g>

    <!-- Edges -->
    <!-- New -> Ready -->
    <path d="M 170 250 L 265 250" class="edge" marker-end="url(#arrow)"/>
    <text x="225" y="240" fill="#94A3B8" font-size="12" font-weight="600" text-anchor="middle">Admitted</text>

    <!-- Ready -> Running -->
    <path d="M 390 235 L 495 235" class="edge" marker-end="url(#arrow)"/>
    <text x="450" y="225" fill="#10B981" font-size="12" font-weight="800" text-anchor="middle">Dispatch</text>

    <!-- Running -> Ready -->
    <path d="M 515 265 L 395 265" class="edge" marker-end="url(#arrow)"/>
    <text x="450" y="285" fill="#EC4899" font-size="12" font-weight="800" text-anchor="middle">Interrupt</text>

    <!-- Running -> Terminated -->
    <path d="M 650 250 L 725 250" class="edge" marker-end="url(#arrow)"/>
    <text x="690" y="240" fill="#94A3B8" font-size="12" font-weight="600" text-anchor="middle">Exit</text>

    <!-- Running -> Waiting -->
    <path d="M 580 290 Q 580 400 535 400" class="edge" marker-end="url(#arrow)"/>
    <text x="640" y="360" fill="#F59E0B" font-size="12" font-weight="600" text-anchor="middle">I/O or Event Wait</text>

    <!-- Waiting -> Ready -->
    <path d="M 380 400 Q 340 400 340 305" class="edge" marker-end="url(#arrow)"/>
    <text x="270" y="360" fill="#10B981" font-size="12" font-weight="600" text-anchor="middle">I/O or Event</text>
    <text x="270" y="375" fill="#10B981" font-size="12" font-weight="600" text-anchor="middle">Completion</text>

</svg>
