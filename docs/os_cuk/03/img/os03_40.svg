<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .box { rx: 4; stroke-width: 2; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
        </marker>
        <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
        </marker>
    </defs>
    <rect width="900" height="500" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#F8FAFC" font-size="28" font-weight="800" text-anchor="middle">문맥 교환 (Context Switching) 원리</text>

    <!-- Side Panels -->
    <!-- User space -->
    <rect x="50" y="90" width="220" height="380" fill="#0C4A6E" rx="12" stroke="#0284C7" stroke-width="4"/>
    <text x="160" y="130" fill="#38BDF8" font-size="22" font-weight="800" text-anchor="middle">사용자 모드</text>

    <!-- Kernel space -->
    <rect x="300" y="90" width="550" height="380" fill="#1E293B" rx="12" stroke="#475569" stroke-width="4"/>
    <text x="575" y="130" fill="#F43F5E" font-size="22" font-weight="800" text-anchor="middle">커널 모드</text>

    <!-- Execution Lines in User Space -->
    <rect x="80" y="160" width="160" height="50" fill="#1D4ED8" stroke="#3B82F6" class="box"/>
    <text x="160" y="192" fill="#DBEAFE" font-size="18" font-weight="800" text-anchor="middle">Pj 실행중</text>

    <rect x="80" y="320" width="160" height="50" fill="#047857" stroke="#10B981" class="box"/>
    <text x="160" y="352" fill="#D1FAE5" font-size="18" font-weight="800" text-anchor="middle">Pk 실행중</text>

    <!-- Kernel Transition Steps -->
    <path d="M 240 185 L 340 185" stroke="#3B82F6" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="350" y="160" width="300" height="50" fill="#4C1D95" stroke="#7C3AED" class="box"/>
    <text x="500" y="192" fill="#EDE9FE" font-size="18" font-weight="800" text-anchor="middle">커널 모드로 전환 (트랩 발생)</text>

    <text x="400" y="245" fill="#CBD5E1" font-size="16" font-weight="600" text-anchor="start">1. Pj 의 하드웨어 상태를 임시로 PCBj에 저장</text>
    <text x="400" y="275" fill="#CBD5E1" font-size="16" font-weight="600" text-anchor="start">2. 스케줄러가 다음 실행할 프로세스로 Pk 선택</text>
    <text x="400" y="305" fill="#CBD5E1" font-size="16" font-weight="600" text-anchor="start">3. 메모리 내 PCBk 에서 Pk의 저장 상태를 CPU로 로드</text>

    <rect x="350" y="320" width="300" height="50" fill="#4C1D95" stroke="#7C3AED" class="box"/>
    <text x="500" y="352" fill="#EDE9FE" font-size="18" font-weight="800" text-anchor="middle">사용자 모드로 전환 복귀</text>

    <path d="M 350 345 L 250 345" stroke="#10B981" stroke-width="4" marker-end="url(#arrow2)"/>

</svg>
