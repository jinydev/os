<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --text-mut: #7f8c8d;
        --os: #dcdde1;
        --stack: #48dbfb;
        --heap: #c8d6e5;
        --data: #2980b9;
        --text-bin: #95a5a6;
        --line: #2d3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --text-mut: #b2bec3;
          --os: #2d3436;
          --stack: #0984e3;
          --heap: #636e72;
          --data: #0f1c3f;
          --text-bin: #353b48;
          --line: #dfe6e9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', system-ui, sans-serif; }
      .text-w { fill: #fff; font-family: 'Inter', system-ui, sans-serif; font-weight: bold; }
      .title { font-size: 26px; font-weight: bold; }
      .box { stroke: var(--bg); stroke-width: 2; }
      .ptr { stroke: var(--line); stroke-width: 2; stroke-dasharray: 6 6; fill: none; marker-start: url(#arrow-start); }
    </style>
    <marker id="arrow-start" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>

  <text x="500" y="40" class="text title" text-anchor="middle">스레드의 주소 공간 (Thread Address Space)</text>

  <!-- Process Memory Layout Box -->
  <g transform="translate(150, 80)">
    <rect x="0" y="0" width="300" height="520" fill="none" stroke="var(--line)" stroke-width="2"/>
    
    <!-- OS Reserved -->
    <rect x="0" y="0" width="300" height="50" fill="var(--os)" class="box"/>
    <text x="150" y="32" class="text" font-size="18" font-weight="bold" text-anchor="middle">운영체제 (OS)</text>

    <!-- Stack Areas -->
    <rect x="0" y="50" width="300" height="40" fill="var(--stack)" class="box"/>
    <text x="150" y="75" class="text-w" font-size="16" text-anchor="middle">스레드 1 스택</text>

    <rect x="0" y="100" width="300" height="40" fill="var(--stack)" class="box"/>
    <text x="150" y="125" class="text-w" font-size="16" text-anchor="middle">스레드 2 스택</text>

    <rect x="0" y="150" width="300" height="40" fill="var(--stack)" class="box"/>
    <text x="150" y="175" class="text-w" font-size="16" text-anchor="middle">스레드 3 스택</text>

    <!-- Heap Area -->
    <rect x="0" y="250" width="300" height="90" fill="var(--heap)" class="box"/>
    <text x="150" y="300" class="text" font-size="20" font-weight="bold" text-anchor="middle">힙 (Heap)</text>

    <!-- Data Area -->
    <rect x="0" y="340" width="300" height="100" fill="var(--data)" class="box"/>
    <text x="150" y="395" class="text-w" font-size="20" text-anchor="middle">데이터 (Data)</text>

    <!-- Text Area -->
    <rect x="0" y="440" width="300" height="80" fill="var(--text-bin)" class="box"/>
    <text x="150" y="485" class="text" font-size="20" font-weight="bold" text-anchor="middle">텍스트 (Code)</text>

    <!-- Internal Pointers for Growth -->
    <path d="M150,90 L150,100" stroke="var(--line)" stroke-width="2" marker-end="url(#arrow-start)" transform="rotate(180 150 95)"/>
    <path d="M150,140 L150,150" stroke="var(--line)" stroke-width="2" marker-end="url(#arrow-start)" transform="rotate(180 150 145)"/>
    <path d="M150,190 L150,210" stroke="var(--line)" stroke-width="2" marker-end="url(#arrow-start)" transform="rotate(180 150 200)"/>
    <path d="M150,240 L150,250" stroke="var(--line)" stroke-width="2" marker-end="url(#arrow-start)"/>
  </g>

  <!-- Pointers on Right Side -->
  <g transform="translate(460, 80)">
    <!-- Stack Pointers -->
    <path class="ptr" d="M0,70 L80,70"/>
    <text x="90" y="76" class="text" font-size="18" font-weight="bold">스레드 1 스택 포인터 (SP)</text>

    <path class="ptr" d="M0,120 L80,120"/>
    <text x="90" y="126" class="text" font-size="18" font-weight="bold">스레드 2 스택 포인터 (SP)</text>

    <path class="ptr" d="M0,170 L80,170"/>
    <text x="90" y="176" class="text" font-size="18" font-weight="bold">스레드 3 스택 포인터 (SP)</text>

    <!-- PCs -->
    <path class="ptr" d="M0,450 L80,450"/>
    <text x="90" y="456" class="text" font-size="18" font-weight="bold">스레드 1 프로그램 카운터 (PC)</text>

    <path class="ptr" d="M0,480 L80,480"/>
    <text x="90" y="486" class="text" font-size="18" font-weight="bold">스레드 2 프로그램 카운터 (PC)</text>

    <path class="ptr" d="M0,510 L80,510"/>
    <text x="90" y="516" class="text" font-size="18" font-weight="bold">스레드 3 프로그램 카운터 (PC)</text>
  </g>

  <!-- Abstract Arrow on Left -->
  <g transform="translate(60, 80)">
    <path d="M40,0 L40,520" stroke="#3498db" stroke-width="4" marker-start="url(#arrow-start)" marker-end="url(#arrow-start)" transform="rotate(180 40 0) rotate(180 40 520)"/>
    <text x="-40" y="270" class="text" font-size="20" font-weight="bold" transform="rotate(-90 -40 270)">주소 공간 (Address Space)</text>
  </g>

</svg>
