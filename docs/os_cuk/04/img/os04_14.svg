<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --text-mut: #7f8c8d;
        --line: #bdc3c7;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --text-mut: #b2bec3;
          --line: #485460;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', system-ui, sans-serif; }
      .text-w { fill: #fff; font-family: 'Inter', system-ui, sans-serif; font-weight: bold; }
      .title { font-size: 28px; font-weight: bold; }
    </style>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" class="bg"/>

  <text x="500" y="60" class="text title" text-anchor="middle">스레드의 4가지 특징 (Thread Characteristics)</text>

  <!-- Connecting line -->
  <line x1="80" y1="220" x2="920" y2="220" stroke="var(--line)" stroke-width="3"/>

  <!-- Circle 1 -->
  <circle cx="200" cy="220" r="80" fill="url(#grad1)" filter="url(#shadow)"/>
  <text x="200" y="210" class="text-w" font-size="22" text-anchor="middle">응답성</text>
  <text x="200" y="240" class="text-w" font-size="16" text-anchor="middle">Responsiveness</text>

  <!-- Circle 2 -->
  <circle cx="400" cy="220" r="80" fill="url(#grad2)" filter="url(#shadow)"/>
  <text x="400" y="210" class="text-w" font-size="22" text-anchor="middle">자원 공유</text>
  <text x="400" y="240" class="text-w" font-size="16" text-anchor="middle">Resource Sharing</text>

  <!-- Circle 3 -->
  <circle cx="600" cy="220" r="80" fill="url(#grad3)" filter="url(#shadow)"/>
  <text x="600" y="210" class="text-w" font-size="22" text-anchor="middle">규모 적응성</text>
  <text x="600" y="240" class="text-w" font-size="16" text-anchor="middle">Scalability</text>

  <!-- Circle 4 -->
  <circle cx="800" cy="220" r="80" fill="url(#grad4)" filter="url(#shadow)"/>
  <text x="800" y="210" class="text-w" font-size="22" text-anchor="middle">경제성</text>
  <text x="800" y="240" class="text-w" font-size="16" text-anchor="middle">Economy</text>

</svg>
