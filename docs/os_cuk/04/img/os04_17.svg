<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --text-mut: #7f8c8d;
        --proc-bg: #e3f2fd;
        --proc-border: #64b5f6;
        --thread-color: #2e86de;
        --box-bg: #ecf0f1;
        --box-border: #bdc3c7;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --text-mut: #a4b0be;
          --proc-bg: #112d4e;
          --proc-border: #21618c;
          --thread-color: #48dbfb;
          --box-bg: #1e272e;
          --box-border: #485460;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', system-ui, sans-serif; }
      .text-mut { fill: var(--text-mut); font-family: 'Inter', system-ui, sans-serif; }
      .proc-circle { fill: var(--proc-bg); stroke: var(--proc-border); stroke-width: 4; }
      .title { font-size: 26px; font-weight: bold; font-family: 'Inter', system-ui, sans-serif; fill: var(--text); }
      .label { font-size: 18px; font-weight: 600; text-anchor: middle; fill: var(--text); }
      .thread { stroke: var(--thread-color); stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrow { stroke: var(--text-mut); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-mut)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>

  <text x="500" y="50" class="title" text-anchor="middle">스레드 활용 사례 : 워드 프로세서 (Word Processor)</text>
  <text x="500" y="80" class="text-mut" text-anchor="middle" font-size="16">비동기적 요소(UI, 백업, 렌더링)를 분리하여 응답성 향상</text>

  <!-- Process Circle -->
  <circle cx="500" cy="300" r="100" class="proc-circle"/>
  <text x="500" y="440" class="label">워드 프로세서 프로세스</text>

  <!-- Thread lines -->
  <path class="thread" d="M460,240 Q430,260 460,280 T460,320 T460,360"/>
  <path class="thread" d="M500,240 Q470,260 500,280 T500,320 T500,360"/>
  <path class="thread" d="M540,240 Q510,260 540,280 T540,320 T540,360"/>

  <!-- Top: Document Render -->
  <rect x="460" y="100" width="80" height="80" fill="var(--thread-color)" rx="4"/>
  <rect x="470" y="115" width="60" height="6" fill="#fff"/>
  <rect x="470" y="130" width="60" height="6" fill="#fff"/>
  <rect x="470" y="145" width="40" height="6" fill="#fff"/>
  <text x="600" y="140" class="label text" font-size="24">워드 문서</text>
  
  <text x="620" y="240" class="label text-mut" font-size="16">문서, 이미지, 텍스트를</text>
  <text x="620" y="260" class="label text-mut" font-size="16">화면에 보여주는 스레드</text>
  <path class="arrow" d="M500,200 L500,195"/>

  <!-- Left: Keyboard -->
  <rect x="150" y="280" width="160" height="60" fill="var(--box-bg)" stroke="var(--box-border)" stroke-width="2" rx="4"/>
  <text x="230" y="260" class="label text" font-size="24">키보드 입력</text>
  <text x="360" y="290" class="label text-mut" font-size="16">사용자의 키보드 입력에</text>
  <text x="360" y="310" class="label text-mut" font-size="16">응답하는 스레드</text>
  <path class="arrow" d="M400,310 L320,310"/>

  <!-- Right: Disk Backup -->
  <path d="M750,290 C750,270 850,270 850,290 L850,340 C850,360 750,360 750,340 Z" fill="var(--box-bg)" stroke="var(--box-border)" stroke-width="2"/>
  <ellipse cx="800" cy="290" rx="50" ry="15" fill="none" stroke="var(--box-border)" stroke-width="2"/>
  <text x="800" y="260" class="label text" font-size="24">디스크 (Storage)</text>

  <text x="660" y="290" class="label text-mut" font-size="16">지정된 시간에 디스크에</text>
  <text x="660" y="310" class="label text-mut" font-size="16">저장하는 백업 스레드</text>
  <path class="arrow" d="M600,310 L740,310"/>

</svg>
