<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .pyramid { stroke: #e2e8f0; stroke-width: 2; }
      .pyramid-reg { fill: #ef4444; }
      .pyramid-cache { fill: #f97316; }
      .pyramid-main { fill: #eab308; }
      .pyramid-sub { fill: #3b82f6; }
      .pyramid-offline { fill: #64748b; }
      .text-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
      .text-sub { font-family: 'Inter', sans-serif; font-size: 14px; fill: #64748b; }
      .text-level { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; fill: #ffffff; text-anchor: middle; }
      .text-desc { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; fill: #334155; }
      
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .text-title { fill: #f8fafc; }
        .text-sub { fill: #94a3b8; }
        .text-desc { fill: #cbd5e1; }
        .pyramid { stroke: #1e293b; }
        .pyramid-reg { fill: #991b1b; }
        .pyramid-cache { fill: #9a3412; }
        .pyramid-main { fill: #854d0e; }
        .pyramid-sub { fill: #1e3a8a; }
        .pyramid-offline { fill: #334155; }
      }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" />

  <text x="400" y="40" class="text-title" text-anchor="middle">메모리 계층 구조 (Memory Hierarchy)</text>
  <text x="400" y="65" class="text-sub" text-anchor="middle">속도, 용량, 비용 간의 트레이드오프</text>

  <!-- Pyramid -->
  <polygon points="400,100 350,150 450,150" class="pyramid pyramid-reg" />
  <polygon points="350,150 300,210 500,210 450,150" class="pyramid pyramid-cache" />
  <polygon points="300,210 230,280 570,280 500,210" class="pyramid pyramid-main" />
  <polygon points="230,280 150,360 650,360 570,280" class="pyramid pyramid-sub" />
  <polygon points="150,360 70,440 730,440 650,360" class="pyramid pyramid-offline" />

  <!-- Labels in Pyramid -->
  <text x="400" y="140" class="text-level">레지스터</text>
  <text x="400" y="190" class="text-level">캐시 메모리</text>
  <text x="400" y="255" class="text-level">메인 메모리</text>
  <text x="400" y="330" class="text-level">보조 기억장치</text>
  <text x="400" y="410" class="text-level">오프라인 저장장치 (백업)</text>

  <!-- Left Descriptions (Speed / Cost) -->
  <path d="M 60 120 L 60 420" stroke="#94a3b8" stroke-width="2" marker-start="url(#arrowhead-up)" />
  <text x="50" y="270" class="text-desc" text-anchor="end">접근 속도 빠름</text>
  <text x="50" y="290" class="text-desc" text-anchor="end">비트당 비용 높음</text>
  <polygon points="60,120 55,130 65,130" fill="#94a3b8" />

  <!-- Right Descriptions (Capacity) -->
  <path d="M 740 120 L 740 420" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead-down)" />
  <text x="750" y="280" class="text-desc" text-anchor="start">저장 용량 증가</text>
  <polygon points="740,420 735,410 745,410" fill="#94a3b8" />

</svg>
