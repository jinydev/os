<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .circle { fill: #ffffff; stroke: #3b82f6; stroke-width: 3; }
      .node-fetch { fill: #eff6ff; stroke: #2563eb; }
      .node-exec { fill: #f0fdf4; stroke: #16a34a; }
      .node-int { fill: #fef2f2; stroke: #dc2626; }
      .text-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .text-node { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .text-sub { font-family: 'Inter', sans-serif; font-size: 13px; fill: #475569; text-anchor: middle; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrowhd); }
      
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .node-fetch { fill: #1e3a8a; stroke: #2563eb; }
        .node-exec { fill: #14532d; stroke: #16a34a; }
        .node-int { fill: #7f1d1d; stroke: #dc2626; }
        .text-title, .text-node { fill: #f8fafc; }
        .text-sub { fill: #cbd5e1; }
        .arrow { stroke: #94a3b8; }
      }
    </style>
    <marker id="arrowhd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="currentColor"/>
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" />
  
  <text x="400" y="40" class="text-title">명령어 실행 사이클 (Instruction Cycle)</text>

  <!-- Nodes -->
  <circle class="circle node-fetch" cx="250" cy="200" r="70" />
  <text x="250" y="195" class="text-node">인출 사이클</text>
  <text x="250" y="215" class="text-sub">(Fetch)</text>

  <circle class="circle node-exec" cx="550" cy="200" r="70" />
  <text x="550" y="195" class="text-node">실행 사이클</text>
  <text x="550" y="215" class="text-sub">(Execute)</text>

  <circle class="circle node-int" cx="400" cy="330" r="60" />
  <text x="400" y="325" class="text-node">인터럽트</text>
  <text x="400" y="345" class="text-sub">(Interrupt)</text>

  <!-- Edges -->
  <!-- Fetch to Exec -->
  <path class="arrow" d="M 320 180 Q 400 150 480 180" />
  
  <!-- Exec to Fetch (No Interrupt) -->
  <path class="arrow" d="M 480 220 Q 400 250 320 220" />
  <text x="400" y="240" class="text-sub" style="font-weight:bold;">인터럽트 비활성화</text>
  <text x="400" y="165" class="text-sub" style="font-weight:bold;">디코딩 및 실행</text>

  <!-- Exec to Interupt -->
  <path class="arrow" d="M 520 260 Q 480 300 450 310" />
  <text x="520" y="310" class="text-sub">인터럽트 발생</text>

  <!-- Interupt to Fetch -->
  <path class="arrow" d="M 350 310 Q 300 280 280 260" />
  <text x="300" y="330" class="text-sub">처리 후 복귀</text>

  <!-- Start -->
  <path class="arrow" d="M 120 200 L 170 200" />
  <text x="120" y="190" class="text-sub">시작</text>

</svg>
