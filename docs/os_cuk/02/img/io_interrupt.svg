<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .card { rx: 12; stroke-width: 2; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1E293B"/>
            <stop offset="100%" stop-color="#0F172A"/>
        </linearGradient>
    </defs>

    <rect width="900" height="400" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#FFFFFF" font-size="24" font-weight="800" text-anchor="middle" letter-spacing="1">I/O CONTROL MECHANISMS</text>
    
    <!-- Polling -->
    <g transform="translate(50, 100)">
        <rect width="240" height="250" fill="#4B5563" stroke="#9CA3AF" class="card"/>
        <text x="120" y="40" fill="#F3F4F6" font-size="22" font-weight="800" text-anchor="middle">1. Polling</text>
        <text x="120" y="80" fill="#D1D5DB" font-size="14" font-weight="600" text-anchor="middle">CPU actively asks:</text>
        <rect x="30" y="100" width="180" height="40" rx="8" fill="#1F2937"/>
        <text x="120" y="125" fill="#FCA5A5" font-size="13" font-weight="600" text-anchor="middle">"Are you done? No."</text>
        <rect x="30" y="150" width="180" height="40" rx="8" fill="#1F2937"/>
        <text x="120" y="175" fill="#FCA5A5" font-size="13" font-weight="600" text-anchor="middle">"Are you done? No."</text>
        <text x="120" y="220" fill="#9CA3AF" font-size="13" font-weight="600" text-anchor="middle">Status: Wastes CPU cycles</text>
    </g>

    <!-- Interrupt -->
    <g transform="translate(330, 100)">
        <rect width="240" height="250" fill="#065F46" stroke="#34D399" class="card"/>
        <text x="120" y="40" fill="#F3F4F6" font-size="22" font-weight="800" text-anchor="middle">2. Interrupt</text>
        <text x="120" y="80" fill="#A7F3D0" font-size="14" font-weight="600" text-anchor="middle">Event-driven approach</text>
        <rect x="30" y="100" width="180" height="40" rx="8" fill="#064E3B"/>
        <text x="120" y="125" fill="#34D399" font-size="13" font-weight="600" text-anchor="middle">CPU computes freely</text>
        <path d="M 120 145 L 120 185" stroke="#FDE047" stroke-width="3" stroke-dasharray="4"/>
        <rect x="30" y="190" width="180" height="40" rx="8" fill="#B45309" stroke="#FBBF24" stroke-width="2"/>
        <text x="120" y="215" fill="#FEF3C7" font-size="13" font-weight="600" text-anchor="middle">"Done! Interrupt ISR"</text>
    </g>

    <!-- DMA -->
    <g transform="translate(610, 100)">
        <rect width="240" height="250" fill="#3730A3" stroke="#818CF8" class="card"/>
        <text x="120" y="40" fill="#F3F4F6" font-size="22" font-weight="800" text-anchor="middle">3. DMA</text>
        <text x="120" y="80" fill="#C7D2FE" font-size="14" font-weight="600" text-anchor="middle">Direct Memory Access</text>
        <rect x="30" y="100" width="180" height="60" rx="8" fill="#312E81"/>
        <text x="120" y="125" fill="#818CF8" font-size="12" font-weight="600" text-anchor="middle">Special Controller moves</text>
        <text x="120" y="145" fill="#818CF8" font-size="12" font-weight="600" text-anchor="middle">data directly to RAM.</text>
        
        <rect x="30" y="175" width="180" height="40" rx="8" fill="#312E81"/>
        <text x="120" y="200" fill="#A5B4FC" font-size="12" font-weight="600" text-anchor="middle">1 Interrupt at 100% completion</text>
        <text x="120" y="235" fill="#A5B4FC" font-size="11" font-weight="600" text-anchor="middle">Status: Highest throughput</text>
    </g>
</svg>
