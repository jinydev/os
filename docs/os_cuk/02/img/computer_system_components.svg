<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
        </style>
        <radialGradient id="bg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#1E293B"/>
            <stop offset="100%" stop-color="#0F172A"/>
        </radialGradient>
        <linearGradient id="busGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#10B981" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.8"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
        </filter>
    </defs>
    
    <rect width="900" height="450" rx="20" fill="url(#bg)"/>

    <!-- System Bus Background -->
    <rect x="150" y="270" width="600" height="40" rx="8" fill="url(#busGrad)"/>
    <text x="450" y="295" fill="#E2E8F0" font-size="16" font-weight="600" text-anchor="middle" letter-spacing="2">SYSTEM BUS (DATA / ADDRESS / CONTROL)</text>
    
    <!-- Lines connecting modules to Bus -->
    <path d="M250 180 V270 M450 180 V270 M650 180 V270" stroke="#94A3B8" stroke-width="4" stroke-dasharray="8 6"/>
    <circle cx="250" cy="270" r="6" fill="#3B82F6"/>
    <circle cx="450" cy="270" r="6" fill="#10B981"/>
    <circle cx="650" cy="270" r="6" fill="#8B5CF6"/>

    <!-- CPU Card -->
    <g transform="translate(150, 70)" filter="url(#shadow)">
        <rect width="200" height="110" rx="16" fill="#1E40AF" stroke="#60A5FA" stroke-width="2"/>
        <text x="100" y="45" fill="#FFFFFF" font-size="22" font-weight="800" text-anchor="middle">CPU</text>
        <text x="100" y="70" fill="#93C5FD" font-size="13" font-weight="400" text-anchor="middle">Central Processing</text>
        <text x="100" y="88" fill="#93C5FD" font-size="13" font-weight="400" text-anchor="middle">Unit</text>
    </g>

    <!-- Memory Card -->
    <g transform="translate(350, 70)" filter="url(#shadow)">
        <rect width="200" height="110" rx="16" fill="#065F46" stroke="#34D399" stroke-width="2"/>
        <text x="100" y="45" fill="#FFFFFF" font-size="22" font-weight="800" text-anchor="middle">Memory</text>
        <text x="100" y="70" fill="#A7F3D0" font-size="13" font-weight="400" text-anchor="middle">Main Memory</text>
        <text x="100" y="88" fill="#A7F3D0" font-size="13" font-weight="400" text-anchor="middle">(RAM)</text>
    </g>

    <!-- I/O Card -->
    <g transform="translate(550, 70)" filter="url(#shadow)">
        <rect width="200" height="110" rx="16" fill="#5B21B6" stroke="#A78BFA" stroke-width="2"/>
        <text x="100" y="45" fill="#FFFFFF" font-size="22" font-weight="800" text-anchor="middle">I/O Devices</text>
        <text x="100" y="70" fill="#DDD6FE" font-size="13" font-weight="400" text-anchor="middle">Disk, Network,</text>
        <text x="100" y="88" fill="#DDD6FE" font-size="13" font-weight="400" text-anchor="middle">Keyboard, Display</text>
    </g>

    <!-- Bus Architecture details -->
    <text x="450" y="360" fill="#94A3B8" font-size="15" font-weight="400" text-anchor="middle">Von Neumann Architecture is defined by shared memory for</text>
    <text x="450" y="385" fill="#94A3B8" font-size="15" font-weight="400" text-anchor="middle">both programs and data communicating over a shared system bus.</text>
</svg>
