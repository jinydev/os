<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
        <linearGradient id="opGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#BE123C"/>
            <stop offset="100%" stop-color="#E11D48"/>
        </linearGradient>
        <linearGradient id="opndGrad1" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#0F766E"/>
            <stop offset="100%" stop-color="#0D9488"/>
        </linearGradient>
        <linearGradient id="opndGrad2" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#4338CA"/>
            <stop offset="100%" stop-color="#4F46E5"/>
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
        </filter>
    </defs>

    <rect width="900" height="300" rx="20" fill="url(#bg)"/>

    <text x="450" y="60" fill="#E2E8F0" font-size="22" font-weight="800" text-anchor="middle" letter-spacing="2">INSTRUCTION FORMAT</text>
    <text x="450" y="85" fill="#94A3B8" font-size="14" font-weight="400" text-anchor="middle">Basic structure of a machine code instruction</text>

    <!-- Opcode Block -->
    <g transform="translate(100, 130)" filter="url(#shadow)">
        <rect width="250" height="70" rx="8" fill="url(#opGrad)" stroke="#FDA4AF" stroke-width="2"/>
        <text x="125" y="32" fill="#FFFFFF" font-size="20" font-weight="800" text-anchor="middle">Opcode</text>
        <text x="125" y="55" fill="#FFE4E6" font-size="13" font-weight="400" text-anchor="middle">(Operation Code)</text>
        <line x1="125" y1="85" x2="125" y2="105" stroke="#94A3B8" stroke-width="2"/>
        <text x="125" y="125" fill="#94A3B8" font-size="14" font-weight="600" text-anchor="middle">What to do (e.g. ADD)</text>
    </g>

    <!-- Operand 1 Block -->
    <g transform="translate(360, 130)" filter="url(#shadow)">
        <rect width="250" height="70" rx="8" fill="url(#opndGrad1)" stroke="#5EEAD4" stroke-width="2"/>
        <text x="125" y="32" fill="#FFFFFF" font-size="20" font-weight="800" text-anchor="middle">Operand 1</text>
        <text x="125" y="55" fill="#CCFBF1" font-size="13" font-weight="400" text-anchor="middle">(Register/Address)</text>
        <line x1="125" y1="85" x2="125" y2="105" stroke="#94A3B8" stroke-width="2"/>
        <text x="125" y="125" fill="#94A3B8" font-size="14" font-weight="600" text-anchor="middle">Target/Source Data</text>
    </g>

    <!-- Operand 2 Block -->
    <g transform="translate(620, 130)" filter="url(#shadow)">
        <rect width="180" height="70" rx="8" fill="url(#opndGrad2)" stroke="#A5B4FC" stroke-width="2"/>
        <text x="90" y="32" fill="#FFFFFF" font-size="20" font-weight="800" text-anchor="middle">Operand 2</text>
        <text x="90" y="55" fill="#E0E7FF" font-size="13" font-weight="400" text-anchor="middle">(Immediate/Data)</text>
        <line x1="90" y1="85" x2="90" y2="105" stroke="#94A3B8" stroke-width="2"/>
        <text x="90" y="125" fill="#94A3B8" font-size="14" font-weight="600" text-anchor="middle">Additional Data</text>
    </g>

    <path d="M 100 110 L 100 100 L 800 100 L 800 110" fill="none" stroke="#64748B" stroke-width="2"/>
    <text x="450" y="90" fill="#64748B" font-size="12" font-weight="600" text-anchor="middle">Total Instruction Width (e.g., 32-bit)</text>
</svg>
