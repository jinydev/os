<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { stroke: #cbd5e1; stroke-width: 2; rx: 4; }
      .box-src { fill: #14b8a6; stroke: #0f766e; }
      .box-cpp { fill: #475569; stroke: #334155; }
      .box-out { fill: #0284c7; stroke: #0369a1; }
      
      .text-title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
      .text-sub { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; fill: #475569; }
      .text-node { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600; fill: #ffffff; text-anchor: middle; }
      .text-desc { font-family: 'Inter', sans-serif; font-size: 14px; fill: #0f172a; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow-md); }
      
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .text-title { fill: #f8fafc; }
        .text-sub { fill: #94a3b8; }
        .text-desc { fill: #cbd5e1; }
        .arrow { stroke: #94a3b8; }
      }
    </style>
    <marker id="arrow-md" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="currentColor"/>
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" />

  <!-- Title -->
  <text x="50" y="50" class="text-title">1. 전처리 (preprocess) 단계</text>

  <!-- Descriptions -->
  <circle cx="60" cy="100" r="4" fill="#3b82f6" />
  <text x="80" y="105" class="text-desc" style="font-size:16px;">소스파일의 <tspan font-weight="bold">#include</tspan>와 <tspan font-weight="bold">#define</tspan> 같은 전처리 문맥 수행</text>

  <circle cx="60" cy="140" r="4" fill="#3b82f6" />
  <text x="80" y="145" class="text-desc" style="font-size:16px;">필요한 헤더 파일 삽입 및 매크로를 상수나 코드로 변환</text>

  <!-- Flow -->
  <rect class="box box-src" x="50" y="200" width="150" height="80" />
  <text x="125" y="235" class="text-node">소스파일</text>
  <text x="125" y="260" class="text-node">File.c</text>

  <path class="arrow" d="M 200 240 L 250 240" />

  <rect class="box box-cpp" x="250" y="200" width="150" height="80" />
  <text x="325" y="235" class="text-node">전처리기</text>
  <text x="325" y="260" class="text-node">cpp</text>

  <path class="arrow" d="M 400 240 L 450 240" />

  <rect class="box box-out" x="450" y="200" width="300" height="80" />
  <text x="600" y="235" class="text-node">전처리 파일 삽입 &amp; 매크로 변환</text>
  <text x="600" y="260" class="text-node">File.i</text>

</svg>
