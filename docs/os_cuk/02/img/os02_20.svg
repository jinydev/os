<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 4; ry: 4; }
      .box-cpu { fill: #f0fdf4; stroke: #16a34a; }
      .box-cache { fill: #fff7ed; stroke: #f97316; }
      .box-mem { fill: #eff6ff; stroke: #2563eb; }
      .text-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .text-sub { font-family: 'Inter', sans-serif; font-size: 14px; fill: #475569; text-anchor: middle; }
      .text-node { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; fill: #1e293b; text-anchor: middle; }
      .path { fill: none; stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow); }
      
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .box { fill: #1e293b; stroke: #334155; }
        .box-cpu { fill: #14532d; stroke: #16a34a; }
        .box-cache { fill: #7c2d12; stroke: #f97316; }
        .box-mem { fill: #1e3a8a; stroke: #2563eb; }
        .text-title, .text-node { fill: #f8fafc; }
        .text-sub { fill: #94a3b8; }
        .path { stroke: #64748b; }
      }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="currentColor" class="text-sub"/>
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" />
  
  <text x="400" y="40" class="text-title">캐시 메모리의 동작 원리</text>
  <text x="400" y="65" class="text-sub">CPU와 메인 메모리의 속도 차이 극복 (지역성의 원리)</text>

  <!-- CPU -->
  <rect class="box box-cpu" x="100" y="160" width="120" height="80" />
  <text x="160" y="205" class="text-node">CPU</text>

  <!-- Cache -->
  <rect class="box box-cache" x="340" y="140" width="120" height="120" />
  <text x="400" y="195" class="text-node">Cache Memory</text>
  <text x="400" y="220" class="text-sub" style="font-size: 12px">SRAM</text>
  <text x="400" y="240" class="text-sub" style="font-size: 12px">(빠르고 용량 작음)</text>

  <!-- Main Memory -->
  <rect class="box box-mem" x="580" y="120" width="150" height="160" />
  <text x="655" y="190" class="text-node">Main Memory</text>
  <text x="655" y="215" class="text-sub" style="font-size: 12px">DRAM</text>
  <text x="655" y="235" class="text-sub" style="font-size: 12px">(느리고 용량 큼)</text>

  <!-- Data Flow / Lines -->
  <!-- 1. CPU requests data -->
  <path class="path" d="M 220 180 L 330 180" />
  <text x="275" y="170" class="text-sub" style="font-size: 13px; font-weight: bold;">(1) 데이터 요청</text>

  <!-- 2. CPU Receives Data from Cache (Hit) -->
  <path class="path" d="M 330 220 L 220 220" />
  <text x="275" y="240" class="text-sub" style="font-size: 13px; fill: #16a34a; font-weight: bold;">Cache Hit!</text>

  <!-- 3. Cache Miss - Request to Main Memory -->
  <path class="path" d="M 460 170 L 570 170" />
  <text x="515" y="160" class="text-sub" style="font-size: 13px;">Cache Miss</text>
  
  <!-- 4. Data fetched from Main Memory to Cache -->
  <path class="path" d="M 570 200 L 460 200" />
  <text x="515" y="225" class="text-sub" style="font-size: 13px;">블록 인출</text>

  <!-- Locality principles -->
  <rect class="box" x="200" y="330" width="400" height="80" fill="#f8fafc" />
  <text x="400" y="355" class="text-node">지역성의 원리 (Principle of Locality)</text>
  <text x="400" y="375" class="text-sub" style="font-size: 13px">- 시간적 지역성: 한 번 참조된 데이터는 곧 다시 참조될 확률이 높음</text>
  <text x="400" y="395" class="text-sub" style="font-size: 13px">- 공간적 지역성: 참조된 데이터의 인접 데이터가 참조될 확률이 높음</text>

</svg>
