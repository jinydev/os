<svg width="100%" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>

  <!-- Users -->
  <rect x="150" y="30" width="500" height="30" fill="#20B2AA"/>
  <text x="400" y="52" fill="white" font-size="18" font-family="sans-serif" text-anchor="middle">사용자들</text>

  <!-- User Level Programs -->
  <rect x="150" y="65" width="500" height="60" fill="#4682B4"/>
  <text x="400" y="85" fill="white" font-size="16" font-family="sans-serif" text-anchor="middle">• 셸</text>
  <text x="400" y="105" fill="white" font-size="16" font-family="sans-serif" text-anchor="middle">• 컴파일러와 인터프리터, 시스템 라이브러리</text>

  <!-- Syscall Interface -->
  <rect x="150" y="130" width="500" height="30" fill="#005A9E"/>
  <text x="400" y="152" fill="white" font-size="16" font-weight="bold" font-family="sans-serif" text-anchor="middle">커널에 대한 시스템 호출 인터페이스</text>

  <!-- Kernel Blob -->
  <rect x="150" y="165" width="500" height="150" fill="#2E4A62"/>
  
  <rect x="160" y="175" width="150" height="130" fill="white" rx="3"/>
  <text x="170" y="200" fill="black" font-size="14" font-family="sans-serif">• 신호</text>
  <text x="170" y="225" fill="black" font-size="14" font-family="sans-serif">• 단말기 처리</text>
  <text x="170" y="250" fill="black" font-size="14" font-family="sans-serif">• 문자 입출력 시스템</text>
  <text x="170" y="275" fill="black" font-size="14" font-family="sans-serif">• 단말기 구동기</text>

  <rect x="325" y="175" width="150" height="130" fill="white" rx="3"/>
  <text x="335" y="200" fill="black" font-size="14" font-family="sans-serif">• 파일 시스템</text>
  <text x="335" y="225" fill="black" font-size="14" font-family="sans-serif">• 스와핑</text>
  <text x="335" y="250" fill="black" font-size="14" font-family="sans-serif">• 블록 입출력 시스템</text>
  <text x="335" y="275" fill="black" font-size="14" font-family="sans-serif">• 디스크와 테이프 구동기</text>

  <rect x="490" y="175" width="150" height="130" fill="white" rx="3"/>
  <text x="500" y="200" fill="black" font-size="14" font-family="sans-serif">• 프로세서 스케줄링</text>
  <text x="500" y="225" fill="black" font-size="14" font-family="sans-serif">• 페이지 대치</text>
  <text x="500" y="250" fill="black" font-size="14" font-family="sans-serif">• 요구 페이징</text>
  <text x="500" y="275" fill="black" font-size="14" font-family="sans-serif">• 가상 기억장치</text>
  
  <path d="M 140 165 C 120 165, 120 240, 100 240 C 120 240, 120 315, 140 315" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  <text x="80" y="245" fill="#FF6B6B" font-size="18" font-weight="bold" font-family="sans-serif" text-anchor="middle">커널</text>

  <!-- Hardware Interface -->
  <rect x="150" y="320" width="500" height="30" fill="#DAA520"/>
  <text x="400" y="342" fill="black" font-size="16" font-weight="bold" font-family="sans-serif" text-anchor="middle">하드웨어에 대한 커널 인터페이스</text>

  <!-- Controllers -->
  <rect x="150" y="355" width="500" height="60" fill="#EEE"/>
  <text x="170" y="375" fill="black" font-size="14" font-family="sans-serif">• 단말기 제어기</text>
  <text x="170" y="395" fill="black" font-size="14" font-family="sans-serif">• 단말기</text>
  
  <text x="335" y="375" fill="black" font-size="14" font-family="sans-serif">• 장치 제어기</text>
  <text x="335" y="395" fill="black" font-size="14" font-family="sans-serif">• 디스크와 테이프</text>
  
  <text x="500" y="375" fill="black" font-size="14" font-family="sans-serif">• 메모리 제어기</text>
  <text x="500" y="395" fill="black" font-size="14" font-family="sans-serif">• 실제 메모리</text>

</svg>
