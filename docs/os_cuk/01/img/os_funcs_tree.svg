<svg width="100%" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>

  <!-- Root -->
  <rect x="30" y="150" width="160" height="100" fill="#20B2AA" rx="5"/>
  <text x="110" y="195" fill="white" font-size="22" font-weight="bold" font-family="sans-serif" text-anchor="middle">운영체제의</text>
  <text x="110" y="225" fill="white" font-size="22" font-weight="bold" font-family="sans-serif" text-anchor="middle">기능</text>

  <!-- Main branches -->
  <path d="M 190 200 L 220 200" stroke="#FFF" stroke-width="2"/>
  <path d="M 220 100 L 220 300" stroke="#FFF" stroke-width="2"/>
  
  <path d="M 220 100 L 250 100" stroke="#FFF" stroke-width="2"/>
  <rect x="250" y="75" width="160" height="50" fill="#005A9E" rx="5"/>
  <text x="330" y="108" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">자원 관리</text>

  <path d="M 220 300 L 250 300" stroke="#FFF" stroke-width="2"/>
  <rect x="250" y="275" width="160" height="50" fill="#005A9E" rx="5"/>
  <text x="330" y="308" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">시스템 관리</text>

  <!-- Sub branches Resource -->
  <path d="M 410 100 L 440 100" stroke="#FFF" stroke-width="2"/>
  <path d="M 440 40 L 440 160" stroke="#FFF" stroke-width="2"/>

  <path d="M 440 40 L 470 40" stroke="#FFF" stroke-width="2"/>
  <rect x="470" y="20" width="300" height="40" fill="#333" rx="5" stroke="#555" stroke-width="2"/>
  <circle cx="490" cy="40" r="3" fill="#FFF"/><text x="510" y="46" fill="white" font-size="18" font-family="sans-serif">메모리 관리</text>

  <path d="M 440 80 L 470 80" stroke="#FFF" stroke-width="2"/>
  <rect x="470" y="60" width="300" height="40" fill="#333" rx="5" stroke="#555" stroke-width="2"/>
  <circle cx="490" cy="80" r="3" fill="#FFF"/><text x="510" y="86" fill="white" font-size="18" font-family="sans-serif">프로세스 관리</text>

  <path d="M 440 120 L 470 120" stroke="#FFF" stroke-width="2"/>
  <rect x="470" y="100" width="300" height="40" fill="#333" rx="5" stroke="#555" stroke-width="2"/>
  <circle cx="490" cy="120" r="3" fill="#FFF"/><text x="510" y="126" fill="white" font-size="18" font-family="sans-serif">주변장치(입출력장치) 관리</text>

  <path d="M 440 160 L 470 160" stroke="#FFF" stroke-width="2"/>
  <rect x="470" y="140" width="300" height="40" fill="#333" rx="5" stroke="#555" stroke-width="2"/>
  <circle cx="490" cy="160" r="3" fill="#FFF"/><text x="510" y="166" fill="white" font-size="18" font-family="sans-serif">파일(데이터) 관리</text>

  <!-- Sub branches System -->
  <path d="M 410 300 L 440 300" stroke="#FFF" stroke-width="2"/>
  <path d="M 440 240 L 440 360" stroke="#FFF" stroke-width="2"/>

  <path d="M 440 240 L 470 240" stroke="#FFF" stroke-width="2"/>
  <rect x="470" y="220" width="300" height="40" fill="#333" rx="5" stroke="#555" stroke-width="2"/>
  <circle cx="490" cy="240" r="3" fill="#FFF"/><text x="510" y="246" fill="white" font-size="18" font-family="sans-serif">시스템 보호(권한 부여)</text>

  <path d="M 440 300 L 470 300" stroke="#FFF" stroke-width="2"/>
  <rect x="470" y="280" width="300" height="40" fill="#333" rx="5" stroke="#555" stroke-width="2"/>
  <circle cx="490" cy="300" r="3" fill="#FFF"/><text x="510" y="306" fill="white" font-size="18" font-family="sans-serif">네트워킹(통신)</text>

  <path d="M 440 360 L 470 360" stroke="#FFF" stroke-width="2"/>
  <rect x="470" y="340" width="300" height="40" fill="#333" rx="5" stroke="#555" stroke-width="2"/>
  <circle cx="490" cy="360" r="3" fill="#FFF"/><text x="510" y="366" fill="white" font-size="18" font-family="sans-serif">명령 해석기</text>

</svg>
