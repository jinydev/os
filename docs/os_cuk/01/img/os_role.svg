<svg width="100%" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow marker for lines -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFD700" />
    </marker>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>

  <!-- User Section -->
  <circle cx="400" cy="50" r="20" fill="#FFB6C1"/>
  <path d="M 370 100 Q 400 60 430 100" fill="#4682B4"/>
  <text x="340" y="70" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="end">사용자 (User)</text>
  
  <line x1="400" y1="100" x2="400" y2="130" stroke="#888" stroke-width="4" marker-end="url(#arrow-down)"/>

  <!-- Software Layer Label -->
  <text x="100" y="200" fill="white" font-size="22" font-weight="bold" font-family="sans-serif">소프트웨어</text>
  
  <!-- Software Box Background -->
  <polygon points="180,140 680,140 760,260 100,260" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Application Program -->
  <rect x="420" y="150" width="230" height="50" fill="#005A9E" rx="5"/>
  <text x="535" y="180" fill="white" font-size="20" font-family="sans-serif" text-anchor="middle">응용 프로그램</text>

  <!-- Utility -->
  <rect x="200" y="150" width="150" height="50" fill="#005A9E" rx="5"/>
  <text x="275" y="180" fill="white" font-size="20" font-family="sans-serif" text-anchor="middle">유틸리티</text>

  <!-- OS -->
  <rect x="200" y="210" width="450" height="40" fill="#0078D7" rx="5"/>
  <text x="425" y="238" fill="white" font-size="22" font-weight="bold" font-family="sans-serif" text-anchor="middle">운영체제 (OS)</text>

  <!-- Interaction Arrows in Software Layer -->
  <line x1="360" y1="175" x2="410" y2="175" stroke="#FFD700" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="275" y1="205" x2="275" y2="255" stroke="#FFD700" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="535" y1="205" x2="535" y2="230" stroke="#FFD700" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Hardware Layer Label -->
  <text x="100" y="325" fill="white" font-size="22" font-weight="bold" font-family="sans-serif">하드웨어</text>

  <!-- Hardware Area -->
  <rect x="180" y="280" width="100" height="90" fill="#20B2AA" rx="5"/>
  <text x="230" y="330" fill="white" font-size="24" font-weight="bold" font-family="sans-serif" text-anchor="middle">CPU</text>

  <rect x="290" y="280" width="90" height="40" fill="#20B2AA" rx="5"/>
  <text x="335" y="307" fill="white" font-size="18" font-family="sans-serif" text-anchor="middle">장치</text>
  
  <rect x="390" y="280" width="90" height="40" fill="#20B2AA" rx="5"/>
  <text x="435" y="307" fill="white" font-size="18" font-family="sans-serif" text-anchor="middle">장치</text>
  
  <rect x="490" y="280" width="140" height="40" fill="#20B2AA" rx="5"/>
  <text x="560" y="307" fill="white" font-size="24" font-family="sans-serif" text-anchor="middle">...</text>

  <rect x="640" y="280" width="90" height="40" fill="#20B2AA" rx="5"/>
  <text x="685" y="307" fill="white" font-size="18" font-family="sans-serif" text-anchor="middle">장치</text>

  <rect x="290" y="330" width="440" height="40" fill="#2E8B57" rx="5"/>
  <text x="510" y="357" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">메모리 (Memory)</text>

  <!-- Interaction Arrows OS to Hardware -->
  <line x1="335" y1="250" x2="335" y2="275" stroke="#FFD700" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="435" y1="250" x2="435" y2="275" stroke="#FFD700" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

</svg>
