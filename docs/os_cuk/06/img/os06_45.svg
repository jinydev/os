<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --cell: #ecf0f1;
        --header: #34495e;
        --line: #bdc3c7;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --cell: #2c3e50;
          --header: #1a252f;
          --line: #7f8c8d;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .table-header { fill: var(--header); }
      .table-cell { fill: var(--cell); stroke: var(--line); }
      .text-light { fill: #fff; font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text" text-anchor="middle" font-size="26">은행원 알고리즘 - 다중 자원 할당 행렬 (시간 t0)</text>

  <!-- Table Core layout -->
  <!-- Headers -->
  <rect x="50" y="100" width="150" height="40" class="table-header"/>
  <text x="125" y="126" class="text-light" text-anchor="middle">프로세스</text>

  <rect x="200" y="100" width="180" height="40" class="table-header"/>
  <text x="290" y="126" class="text-light" text-anchor="middle">Allocation (할당됨)</text>

  <rect x="380" y="100" width="200" height="40" class="table-header"/>
  <text x="480" y="126" class="text-light" text-anchor="middle">Max (최대 요구량)</text>

  <rect x="580" y="100" width="200" height="40" class="table-header"/>
  <text x="680" y="126" class="text-light" text-anchor="middle">Need (추가 요구량)</text>

  <rect x="780" y="100" width="180" height="40" class="table-header"/>
  <text x="870" y="126" class="text-light" text-anchor="middle">Available (가용)</text>

  <!-- Subheaders (A B C D) -->
  <rect x="200" y="140" width="180" height="30" class="table-cell"/>
  <text x="290" y="162" class="text" text-anchor="middle">A B C D</text>

  <rect x="380" y="140" width="200" height="30" class="table-cell"/>
  <text x="480" y="162" class="text" text-anchor="middle">A B C D</text>

  <rect x="580" y="140" width="200" height="30" class="table-cell"/>
  <text x="680" y="162" class="text" text-anchor="middle">A B C D</text>

  <rect x="780" y="140" width="180" height="30" class="table-cell"/>
  <text x="870" y="162" class="text" text-anchor="middle">A B C D</text>

  <!-- Data Rows P0..P3 -->
  <!-- P0 -->
  <rect x="50" y="170" width="150" height="40" class="table-cell"/><text x="125" y="196" class="text" text-anchor="middle">P0</text>
  <rect x="200" y="170" width="180" height="40" class="table-cell"/><text x="290" y="196" class="text" text-anchor="middle">2 0 1 1</text>
  <rect x="380" y="170" width="200" height="40" class="table-cell"/><text x="480" y="196" class="text" text-anchor="middle">3 2 1 4</text>
  <rect x="580" y="170" width="200" height="40" class="table-cell"/><text x="680" y="196" class="text" text-anchor="middle">1 2 0 3</text>
  <rect x="780" y="170" width="180" height="40" class="table-cell"/><text x="870" y="196" class="text" text-anchor="middle">1 2 2 2</text>

  <!-- P1 -->
  <rect x="50" y="210" width="150" height="40" class="table-cell"/><text x="125" y="236" class="text" text-anchor="middle">P1</text>
  <rect x="200" y="210" width="180" height="40" class="table-cell"/><text x="290" y="236" class="text" text-anchor="middle">0 1 2 1</text>
  <rect x="380" y="210" width="200" height="40" class="table-cell"/><text x="480" y="236" class="text" text-anchor="middle">0 2 5 2</text>
  <rect x="580" y="210" width="200" height="40" class="table-cell"/><text x="680" y="236" class="text" text-anchor="middle">0 1 3 1</text>

  <!-- P2 -->
  <rect x="50" y="250" width="150" height="40" class="table-cell"/><text x="125" y="276" class="text" text-anchor="middle">P2</text>
  <rect x="200" y="250" width="180" height="40" class="table-cell"/><text x="290" y="276" class="text" text-anchor="middle">4 0 0 3</text>
  <rect x="380" y="250" width="200" height="40" class="table-cell"/><text x="480" y="276" class="text" text-anchor="middle">5 1 0 5</text>
  <rect x="580" y="250" width="200" height="40" class="table-cell"/><text x="680" y="276" class="text" text-anchor="middle">1 1 0 2</text>

  <!-- P3 -->
  <rect x="50" y="290" width="150" height="40" class="table-cell"/><text x="125" y="316" class="text" text-anchor="middle">P3</text>
  <rect x="200" y="290" width="180" height="40" class="table-cell"/><text x="290" y="316" class="text" text-anchor="middle">0 2 1 0</text>
  <rect x="380" y="290" width="200" height="40" class="table-cell"/><text x="480" y="316" class="text" text-anchor="middle">1 5 3 0</text>
  <rect x="580" y="290" width="200" height="40" class="table-cell"/><text x="680" y="316" class="text" text-anchor="middle">1 3 2 0</text>

</svg>
