<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #3498db;
        --box-title: #ffffff;
        --line: #2d3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #2980b9;
          --box-title: #ffffff;
          --line: #dfe6e9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; }
      .title { font-size: 26px; font-weight: bold; }
      .box { fill: var(--bg); stroke: var(--line); stroke-width: 3; rx: 8; }
      .box-head { fill: var(--box); rx: 8; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">운영체제의 4가지 교착 상태 해결 및 접근 전략</text>

  <rect x="400" y="80" width="200" height="50" class="box-head"/>
  <text x="500" y="112" class="text title" fill="var(--box-title)" text-anchor="middle">해결 전략 분류</text>

  <!-- Horizontal lines -->
  <path d="M 500 130 L 500 180" class="arrow"/>
  <path d="M 200 180 L 800 180" stroke="var(--line)" stroke-width="3"/>
  <path d="M 200 180 L 200 220" class="arrow"/>
  <path d="M 400 180 L 400 220" class="arrow"/>
  <path d="M 600 180 L 600 220" class="arrow"/>
  <path d="M 800 180 L 800 220" class="arrow"/>


  <!-- 1. Prevention -->
  <rect x="100" y="220" width="180" height="200" class="box"/>
  <rect x="100" y="220" width="180" height="40" class="box-head"/>
  <text x="190" y="248" class="text title" font-size="20" fill="var(--box-title)" text-anchor="middle">1. 예방 (Prevention)</text>
  <text x="190" y="300" class="text" text-anchor="middle" font-weight="bold">발생 조건 사전 차단</text>
  <text x="110" y="330" class="text" font-size="16">· 상호배제 부정</text>
  <text x="110" y="355" class="text" font-size="16">· 점유대기 부정</text>
  <text x="110" y="380" class="text" font-size="16">· 비선점 부정</text>
  <text x="110" y="405" class="text" font-size="16">· 순환대기 부정 (주로활용)</text>


  <!-- 2. Avoidance -->
  <rect x="310" y="220" width="180" height="200" class="box"/>
  <rect x="310" y="220" width="180" height="40" class="box-head" fill="#2ecc71"/>
  <text x="400" y="248" class="text title" font-size="20" fill="var(--box-title)" text-anchor="middle">2. 회피 (Avoidance)</text>
  <text x="400" y="300" class="text" text-anchor="middle" font-weight="bold">안전 상태 검사 후 할당</text>
  <text x="320" y="330" class="text" font-size="16">· 다익스트라(Dijkstra) 제안</text>
  <text x="320" y="355" class="text" font-size="16">· 은행원 알고리즘 (Banker's)</text>
  <text x="320" y="380" class="text" font-size="16">· 불안정 상태 진입 원천 거부</text>
  <text x="320" y="405" class="text" font-size="16" fill="#e74c3c">· 비용 및 제약사항 많음</text>

  <!-- 3. Detection -> Recovery -->
  <rect x="520" y="220" width="180" height="200" class="box"/>
  <rect x="520" y="220" width="180" height="40" class="box-head" fill="#e67e22"/>
  <text x="610" y="248" class="text title" font-size="20" fill="var(--box-title)" text-anchor="middle">3. 탐지/복구 (Detect)</text>
  <text x="610" y="300" class="text" text-anchor="middle" font-weight="bold">발생 허용 후 롤백</text>
  <text x="530" y="330" class="text" font-size="16">· 자원 할당 그래프 사용</text>
  <text x="530" y="355" class="text" font-size="16">· 사이클 검출 시 조치 방안:</text>
  <text x="550" y="380" class="text" font-size="16">- 프로세스 전체 강제 종료</text>
  <text x="550" y="405" class="text" font-size="16">- 자원 선점 및 상태 롤백</text>

  <!-- 4. Ignorance -->
  <rect x="730" y="220" width="180" height="200" class="box"/>
  <rect x="730" y="220" width="180" height="40" class="box-head" fill="#95a5a6"/>
  <text x="820" y="248" class="text title" font-size="20" fill="var(--box-title)" text-anchor="middle">4. 무시 (Ignorance)</text>
  <text x="820" y="300" class="text" text-anchor="middle" font-weight="bold">타조 알고리즘 (Ostrich)</text>
  <text x="740" y="330" class="text" font-size="16">· 데드락 발생 확률 희박 간주</text>
  <text x="740" y="355" class="text" font-size="16">· 처리에 드는 OS 부하 회피</text>
  <text x="740" y="380" class="text" font-size="16">· 해결은 응용 프로그래머 몫</text>
  <text x="740" y="405" class="text" font-size="16" fill="#3498db">· UNIX, Linux, Windows 기본</text>

</svg>
