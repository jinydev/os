<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --proc: #1abc9c;
        --res: #2980b9;
        --line: #2d3436;
        --claim: #95a5a6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --proc: #16a085;
          --res: #3498db;
          --line: #dfe6e9;
          --claim: #7f8c8d;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .desc { font-size: 18px; font-weight: normal; }
      .proc { fill: var(--proc); stroke: var(--bg); stroke-width: 2; }
      .res { fill: var(--res); stroke: var(--bg); stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow-claim { stroke: var(--claim); stroke-width: 4; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowhead-claim); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
    <marker id="arrowhead-claim" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--claim)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text" text-anchor="middle" font-size="26">자원 할당 그래프 알고리즘 (요구선-Claim Edge의 활용)</text>

  <!-- Left Side: Avoidance State -->
  <text x="250" y="320" class="text" text-anchor="middle">(a) 교착상태 회피를 위한 자원 할당 그래프</text>
  <!-- Resources -->
  <rect x="210" y="90" width="80" height="50" class="res"/>
  <text x="250" y="80" class="text" text-anchor="middle">R1</text>
  
  <rect x="210" y="230" width="80" height="50" class="res"/>
  <text x="250" y="305" class="text" text-anchor="middle">R2</text>

  <!-- Processes -->
  <circle cx="120" cy="180" r="40" class="proc"/>
  <text x="120" y="188" class="text" fill="#fff" text-anchor="middle">P1</text>

  <circle cx="380" cy="180" r="40" class="proc"/>
  <text x="380" y="188" class="text" fill="#fff" text-anchor="middle">P2</text>

  <!-- Edges -->
  <path d="M 150 155 L 210 120" class="arrow"/>  <!-- P1 -> R1 -->
  <path d="M 290 120 L 350 155" class="arrow"/>  <!-- R1 -> P2 -->
  <path d="M 150 205 L 210 240" class="arrow-claim"/> <!-- P1 -claim-> R2 -->
  <path d="M 350 205 L 290 240" class="arrow-claim"/> <!-- P2 -claim-> R2 -->
  <text x="250" y="185" class="desc" fill="var(--claim)" text-anchor="middle">점선: 미래 요구선 (Claim Edge)</text>


  <!-- Divider -->
  <path d="M 500 80 L 500 340" stroke="var(--line)" stroke-width="2" stroke-dasharray="10 10"/>

  <!-- Right Side: Unsafe State -->
  <text x="750" y="320" class="text" text-anchor="middle">(b) 불안정 상태의 자원 할당 그래프</text>

  <rect x="710" y="90" width="80" height="50" class="res"/>
  <text x="750" y="80" class="text" text-anchor="middle">R1</text>
  
  <rect x="710" y="230" width="80" height="50" class="res"/>
  <text x="750" y="305" class="text" text-anchor="middle">R2</text>

  <!-- Processes -->
  <circle cx="620" cy="180" r="40" class="proc"/>
  <text x="620" y="188" class="text" fill="#fff" text-anchor="middle">P1</text>

  <circle cx="880" cy="180" r="40" class="proc"/>
  <text x="880" y="188" class="text" fill="#fff" text-anchor="middle">P2</text>

  <!-- Edges -->
  <path d="M 650 155 L 710 120" class="arrow"/>  <!-- P1 -> R1 Request -->
  <path d="M 790 120 L 850 155" class="arrow"/>  <!-- R1 -> P2 Assignment -->
  <path d="M 650 205 L 710 240" class="arrow-claim"/> <!-- P1 -claim-> R2 -->
  
  <path d="M 790 255 L 850 205" class="arrow"/> <!-- R2 -> P2 Assignment (turned solid) -->
  <text x="750" y="200" class="text" text-anchor="middle" fill="#e74c3c">P2에 R2 할당 시 사이클 위험 발생</text>

</svg>
