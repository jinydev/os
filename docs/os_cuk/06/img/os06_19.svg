<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --river: #74b9ff;
        --stone: #636e72;
        --person1: #e17055;
        --person2: #0984e3;
        --line: #2d3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --river: #0984e3;
          --stone: #b2bec3;
          --person1: #ff7675;
          --person2: #74b9ff;
          --line: #dfe6e9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; }
      .title { font-size: 24px; font-weight: bold; }
      .river { fill: var(--river); opacity: 0.3; }
      .stone { fill: var(--stone); rx: 5; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  
  <rect x="0" y="80" width="1000" height="150" class="river"/>
  <text x="500" y="40" class="text title" text-anchor="middle">강 건너기 예시로 살펴보는 교착 상태 역학</text>

  <!-- Stones -->
  <!-- Left Side setup -->
  <rect x="250" y="160" width="80" height="30" class="stone"/>
  <rect x="350" y="160" width="80" height="30" class="stone"/>
  <rect x="450" y="160" width="80" height="30" class="stone"/>
  
  <!-- Right Side setup -->
  <rect x="550" y="160" width="80" height="30" class="stone"/>
  <rect x="650" y="160" width="80" height="30" class="stone"/>
  
  <!-- Person 1 (Moving Right) -->
  <circle cx="490" cy="110" r="15" fill="var(--person1)"/>
  <rect x="480" y="125" width="20" height="35" fill="var(--person1)"/>
  <path d="M 380 200 L 480 200" class="arrow"/>
  <text x="430" y="225" class="text" text-anchor="middle">오른쪽으로 이동</text>

  <!-- Person 2 (Moving Left) -->
  <circle cx="590" cy="110" r="15" fill="var(--person2)"/>
  <rect x="580" y="125" width="20" height="35" fill="var(--person2)"/>
  <path d="M 700 200 L 600 200" class="arrow"/>
  <text x="650" y="225" class="text" text-anchor="middle">왼쪽으로 이동</text>

  <!-- Explanation Texts -->
  <text x="100" y="280" class="text" font-weight="bold">교착 상태의 4가지 조건 비유:</text>
  <text x="120" y="310" class="text">1. 상호배제: 돌 하나는 한 번에 한 사람만 밟을 수 있음.</text>
  <text x="120" y="340" class="text">2. 점유와 대기: 각 사람은 현재의 돌을 밟고 다음 돌을 요구함.</text>
  <text x="120" y="370" class="text">3. 비선점: 다른 사람이 밟고 있는 돌을 강제로 뺏어서 사람을 밀어낼 수 없음.</text>
  <text x="120" y="400" class="text">4. 순환 대기: 두 사람이 마주보고 서로가 비켜주기를 기다림.</text>

</svg>
