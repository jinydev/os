<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --proc: #1abc9c;
        --res: #2980b9;
        --line: #34495e;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --proc: #16a085;
          --res: #3498db;
          --line: #95a5a6;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 22px; font-weight: bold; }
      .proc { fill: var(--proc); stroke: var(--bg); stroke-width: 2; }
      .res { fill: var(--res); stroke: var(--bg); stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow-req { stroke: var(--line); stroke-width: 4; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text" text-anchor="middle" font-size="26">순환 대기 (Circular Wait)의 교착 상태 조건</text>

  <!-- Processes -->
  <circle cx="150" cy="150" r="40" class="proc"/>
  <text x="150" y="158" class="text" fill="#fff" text-anchor="middle">P0</text>

  <circle cx="380" cy="150" r="40" class="proc"/>
  <text x="380" y="158" class="text" fill="#fff" text-anchor="middle">P1</text>

  <circle cx="610" cy="150" r="40" class="proc"/>
  <text x="610" y="158" class="text" fill="#fff" text-anchor="middle">P2</text>

  <circle cx="840" cy="150" r="40" class="proc"/>
  <text x="840" y="158" class="text" fill="#fff" text-anchor="middle">P3</text>

  <!-- Resources -->
  <rect x="70" y="250" width="160" height="60" class="res"/>
  <text x="150" y="288" class="text" fill="#fff" text-anchor="middle">R0</text>

  <rect x="300" y="250" width="160" height="60" class="res"/>
  <text x="380" y="288" class="text" fill="#fff" text-anchor="middle">R1</text>

  <rect x="530" y="250" width="160" height="60" class="res"/>
  <text x="610" y="288" class="text" fill="#fff" text-anchor="middle">R2</text>

  <rect x="760" y="250" width="160" height="60" class="res"/>
  <text x="840" y="288" class="text" fill="#fff" text-anchor="middle">R3</text>

  <!-- Edges -->
  <!-- Hold (R -> P) -->
  <path d="M 150 250 L 150 190" class="arrow"/>
  <text x="110" y="210" class="text" font-size="16">점유</text>

  <path d="M 380 250 L 380 190" class="arrow"/>
  <path d="M 610 250 L 610 190" class="arrow"/>
  <path d="M 840 250 L 840 190" class="arrow"/>

  <!-- Request (P -> R) -->
  <path d="M 175 180 L 300 250" class="arrow-req"/>
  <text x="250" y="200" class="text" font-size="16">요청</text>

  <path d="M 405 180 L 530 250" class="arrow-req"/>
  <path d="M 635 180 L 760 250" class="arrow-req"/>
  
  <!-- Back to start (Circular) -->
  <path d="M 810 180 L 230 260" class="arrow-req"/>

</svg>
