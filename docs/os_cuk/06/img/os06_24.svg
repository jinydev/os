<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --proc: #1abc9c;
        --res: #2980b9;
        --line: #34495e;
        --cycle: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --proc: #16a085;
          --res: #3498db;
          --line: #95a5a6;
          --cycle: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .proc { fill: var(--proc); stroke: var(--bg); stroke-width: 2; }
      .res { fill: var(--res); stroke: var(--bg); stroke-width: 2; }
      .dot { fill: #fff; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow-cycle { stroke: var(--cycle); stroke-width: 4; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 6 6; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text" text-anchor="middle" font-size="26">사이클이 존재하지만 교착 상태가 아닌 자원 할당 그래프</text>

  <!-- Resources -->
  <!-- R1 -->
  <rect x="350" y="100" width="80" height="80" class="res"/>
  <text x="390" y="90" class="text" text-anchor="middle">R1</text>
  <circle cx="390" cy="125" r="8" class="dot"/>
  <circle cx="390" cy="155" r="8" class="dot"/>

  <!-- R2 -->
  <rect x="350" y="300" width="80" height="80" class="res"/>
  <text x="390" y="415" class="text" text-anchor="middle">R2</text>
  <circle cx="390" cy="325" r="8" class="dot"/>
  <circle cx="390" cy="355" r="8" class="dot"/>

  <!-- Processes -->
  <!-- P1 -->
  <circle cx="200" cy="240" r="45" class="proc"/>
  <text x="200" y="248" class="text" fill="#fff" text-anchor="middle">P1</text>

  <!-- P3 -->
  <circle cx="580" cy="240" r="45" class="proc"/>
  <text x="580" y="248" class="text" fill="#fff" text-anchor="middle">P3</text>

  <!-- P2 -->
  <circle cx="580" cy="100" r="45" class="proc"/>
  <text x="580" y="108" class="text" fill="#fff" text-anchor="middle">P2</text>

  <!-- P4 -->
  <circle cx="580" cy="380" r="45" class="proc"/>
  <text x="580" y="388" class="text" fill="#fff" text-anchor="middle">P4</text>

  <!-- Edges -->
  <!-- P1 -> R1 -->
  <path d="M 235 210 L 350 160" class="arrow"/>
  
  <!-- R1 -> P2 -->
  <path d="M 430 125 L 535 110" class="arrow"/>
  
  <!-- R1 -> P3 -->
  <path d="M 430 155 L 545 220" class="arrow"/>
  
  <!-- P3 -> R2 -->
  <path d="M 545 265 L 430 310" class="arrow"/>
  
  <!-- R2 -> P4 -->
  <path d="M 430 355 L 545 375" class="arrow"/>

  <!-- R2 -> P1 (Cycle complete) -->
  <path d="M 350 325 L 235 270" class="arrow"/>

  <!-- Explanations -->
  <text x="800" y="220" class="text" font-size="22">P1 → R1 → P3 → R2 → P1</text>
  <text x="800" y="250" class="text" font-size="16" fill="var(--cycle)">그래프 내에 사이클이 존재함.</text>

  <rect x="730" y="280" width="250" height="90" fill="var(--bg)" stroke="var(--line)" rx="8"/>
  <text x="855" y="310" class="text" font-size="16" text-anchor="middle">하지만 P2와 P4가 사이클 밖에서</text>
  <text x="855" y="335" class="text" font-size="16" text-anchor="middle">자원을 확보 중이므로 작업 종료 후</text>
  <text x="855" y="360" class="text" font-size="16" text-anchor="middle">자원을 반해 사이클이 깨짐(데드락 아님)</text>

</svg>
