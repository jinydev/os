<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --cell: #ecf0f1;
        --header: #34495e;
        --safe: #2ecc71;
        --unsafe: #e74c3c;
        --line: #bdc3c7;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --cell: #2c3e50;
          --header: #1a252f;
          --safe: #27ae60;
          --unsafe: #c0392b;
          --line: #7f8c8d;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .table-header { fill: var(--header); }
      .table-cell { fill: var(--cell); stroke: var(--line); }
      .text-light { fill: #fff; font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text" text-anchor="middle" font-size="26">은행원 알고리즘: 시스템의 상태 비교 (안정 vs 불안정)</text>

  <!-- Left Table: Safe State -->
  <text x="250" y="100" class="text" text-anchor="middle" fill="var(--safe)">[ 안정 상태 (Safe State) 예시 ]</text>
  
  <rect x="50" y="120" width="120" height="40" class="table-header"/>
  <text x="110" y="146" class="text-light" text-anchor="middle">프로세스</text>
  <rect x="170" y="120" width="140" height="40" class="table-header"/>
  <text x="240" y="146" class="text-light" text-anchor="middle">현재 사용량</text>
  <rect x="310" y="120" width="140" height="40" class="table-header"/>
  <text x="380" y="146" class="text-light" text-anchor="middle">최대 사용량</text>

  <rect x="50" y="160" width="120" height="40" class="table-cell"/>
  <text x="110" y="186" class="text" text-anchor="middle">P0</text>
  <rect x="170" y="160" width="140" height="40" class="table-cell"/>
  <text x="240" y="186" class="text" text-anchor="middle">2</text>
  <rect x="310" y="160" width="140" height="40" class="table-cell"/>
  <text x="380" y="186" class="text" text-anchor="middle">7</text>

  <rect x="50" y="200" width="120" height="40" class="table-cell"/>
  <text x="110" y="226" class="text" text-anchor="middle">P1</text>
  <rect x="170" y="200" width="140" height="40" class="table-cell"/>
  <text x="240" y="226" class="text" text-anchor="middle">1</text>
  <rect x="310" y="200" width="140" height="40" class="table-cell"/>
  <text x="380" y="226" class="text" text-anchor="middle">8</text>

  <rect x="50" y="240" width="120" height="40" class="table-cell"/>
  <text x="110" y="266" class="text" text-anchor="middle">P2</text>
  <rect x="170" y="240" width="140" height="40" class="table-cell"/>
  <text x="240" y="266" class="text" text-anchor="middle">2</text>
  <rect x="310" y="240" width="140" height="40" class="table-cell"/>
  <text x="380" y="266" class="text" text-anchor="middle">4</text>

  <rect x="50" y="280" width="260" height="40" class="table-cell"/>
  <text x="180" y="306" class="text" text-anchor="middle">가용 자원 수 (Available)</text>
  <rect x="310" y="280" width="140" height="40" class="table-cell"/>
  <text x="380" y="306" class="text" text-anchor="middle" fill="var(--safe)">3</text>
  
  <text x="250" y="355" class="text" text-anchor="middle" fill="var(--text)" font-size="16">가용 자원 3개로 P2(추가 요구 2)를 먼저 처리 가능하므로 안전.</text>


  <!-- Right Table: Unsafe State -->
  <text x="750" y="100" class="text" text-anchor="middle" fill="var(--unsafe)">[ 불안정 상태 (Unsafe State) 예시 ]</text>
  
  <rect x="550" y="120" width="120" height="40" class="table-header"/>
  <text x="610" y="146" class="text-light" text-anchor="middle">프로세스</text>
  <rect x="670" y="120" width="140" height="40" class="table-header"/>
  <text x="740" y="146" class="text-light" text-anchor="middle">현재 사용량</text>
  <rect x="810" y="120" width="140" height="40" class="table-header"/>
  <text x="880" y="146" class="text-light" text-anchor="middle">최대 사용량</text>

  <rect x="550" y="160" width="120" height="40" class="table-cell"/>
  <text x="610" y="186" class="text" text-anchor="middle">P0</text>
  <rect x="670" y="160" width="140" height="40" class="table-cell"/>
  <text x="740" y="186" class="text" text-anchor="middle">5 (증가)</text>
  <rect x="810" y="160" width="140" height="40" class="table-cell"/>
  <text x="880" y="186" class="text" text-anchor="middle">7</text>

  <rect x="550" y="200" width="120" height="40" class="table-cell"/>
  <text x="610" y="226" class="text" text-anchor="middle">P1</text>
  <rect x="670" y="200" width="140" height="40" class="table-cell"/>
  <text x="740" y="226" class="text" text-anchor="middle">1</text>
  <rect x="810" y="200" width="140" height="40" class="table-cell"/>
  <text x="880" y="226" class="text" text-anchor="middle">8</text>

  <rect x="550" y="240" width="120" height="40" class="table-cell"/>
  <text x="610" y="266" class="text" text-anchor="middle">P2</text>
  <rect x="670" y="240" width="140" height="40" class="table-cell"/>
  <text x="740" y="266" class="text" text-anchor="middle">2</text>
  <rect x="810" y="240" width="140" height="40" class="table-cell"/>
  <text x="880" y="266" class="text" text-anchor="middle">4</text>

  <rect x="550" y="280" width="260" height="40" class="table-cell"/>
  <text x="680" y="306" class="text" text-anchor="middle">가용 자원 수 (Available)</text>
  <rect x="810" y="280" width="140" height="40" class="table-cell"/>
  <text x="880" y="306" class="text" text-anchor="middle" fill="var(--unsafe)">1</text>

  <text x="750" y="355" class="text" text-anchor="middle" fill="var(--text)" font-size="16">가용 자원이 1개뿐이므로 P0(필요2), P1(필요7), P2(필요2) 모두 대기. 데드락 위험.</text>

</svg>
