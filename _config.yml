title: "소프트웨어 엔지니어링: 운영체제 (OS Curriculum)"
description: "개발자를 위한 현대 운영체제 심화 지식: 리눅스 커널, 스레드, Docker, 컨테이너"
author: "Hojin"
email: infohojin@naver.com
baseurl: ""
url: "https://os.jiny.dev"
twitter_username: infohojin

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-gist

# Navigation
nav_sort: 'priorities'

# Build Settings
destination: docs
source: src
markdown: kramdown
kramdown:
  math_engine: mathjax

defaults:
  - scope:
      path: ""
    values:
      layout: "docs"

# Sass 설정
sass:
  load_paths:
    - _sass
    - ../node_modules/bootstrap/scss

# GitHub Pages 호환성을 위한 설정
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - .github/
  - .git/
  - README.md
  - package.json
  - package-lock.json
  - AI_GUIDE.md
  - "**/*_src.md"
