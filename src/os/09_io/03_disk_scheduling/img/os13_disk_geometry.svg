<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --platter: #bdc3c7;
        --track: #3498db;
        --sector: #e74c3c;
        --head: #27ae60;
        --arm: #7f8c8d;
        --line: #95a5a6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --platter: #34495e;
          --track: #2980b9;
          --sector: #ff7675;
          --head: #2ecc71;
          --arm: #7f8c8d;
          --line: #4a6278;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 18px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: normal; }
      .title { font-size: 26px; }
      .platter { fill: transparent; stroke: var(--platter); stroke-width: 4; }
      .arm { fill: var(--arm); }
      .head { fill: var(--head); }
      .arrow { stroke: var(--text); stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="var(--text)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">자기 디스크 물리적 메커니즘 (Disk Geometry)</text>
  
  <!-- Left: 3D Stack View Approximation -->
  <!-- Back arc of Platters -->
  <path d="M 200 150 A 120 40 0 0 1 440 150" fill="none" class="platter" stroke-dasharray="4"/>
  <path d="M 200 230 A 120 40 0 0 1 440 230" fill="none" class="platter" stroke-dasharray="4"/>
  <path d="M 200 310 A 120 40 0 0 1 440 310" fill="none" class="platter" stroke-dasharray="4"/>
  
  <!-- Front arc of Platters -->
  <path d="M 200 150 A 120 40 0 0 0 440 150" fill="none" class="platter"/>
  <path d="M 200 230 A 120 40 0 0 0 440 230" fill="none" class="platter"/>
  <path d="M 200 310 A 120 40 0 0 0 440 310" fill="none" class="platter"/>

  <!-- Spindle -->
  <rect x="310" y="100" width="20" height="240" fill="var(--arm)"/>

  <!-- Arms & Heads -->
  <!-- Top Arm -->
  <path d="M 120 140 L 250 145 L 250 150 L 120 155 Z" class="arm"/>
  <!-- Top Head -->
  <polygon points="250,145 270,145 260,150" class="head"/>

  <!-- Mid Arm -->
  <path d="M 120 220 L 250 225 L 250 230 L 120 235 Z" class="arm"/>
  <polygon points="250,225 270,225 260,230" class="head"/>

  <!-- Bot Arm -->
  <path d="M 120 300 L 250 305 L 250 310 L 120 315 Z" class="arm"/>
  <polygon points="250,305 270,305 260,310" class="head"/>

  <!-- Cylinder outline (Connecting all tracks vertically) -->
  <path d="M 270 145 L 270 305" fill="none" stroke="var(--track)" stroke-width="4" stroke-dasharray="10 5"/>
  <path d="M 370 145 L 370 305" fill="none" stroke="var(--track)" stroke-width="4" stroke-dasharray="10 5"/>

  <!-- Labels for 3D View -->
  <text x="50" y="235" class="text">읽기/쓰기 헤드</text>
  <path d="M 50 220 L 110 225" class="arrow"/>
  
  <text x="450" y="235" class="text" fill="var(--track)">원통 (실린더, Cylinder)</text>
  <path d="M 445 220 L 375 225" class="arrow"/>


  <!-- Right: Top Down View -->
  <text x="750" y="100" class="text" text-anchor="middle">플래터 단면 (Sector & Track)</text>

  <!-- Base Circle -->
  <circle cx="750" cy="270" r="140" fill="transparent" stroke="var(--platter)" stroke-width="4"/>
  <circle cx="750" cy="270" r="100" fill="transparent" stroke="var(--platter)" stroke-width="2"/>
  <circle cx="750" cy="270" r="60" fill="transparent" stroke="var(--platter)" stroke-width="2"/>
  <circle cx="750" cy="270" r="20" fill="var(--arm)"/>

  <!-- Spoke Lines (Sectors) -->
  <line x1="750" y1="270" x2="750" y2="130" stroke="var(--line)" stroke-width="2"/>
  <line x1="750" y1="270" x2="750" y2="410" stroke="var(--line)" stroke-width="2"/>
  <line x1="750" y1="270" x2="610" y2="270" stroke="var(--line)" stroke-width="2"/>
  <line x1="750" y1="270" x2="890" y2="270" stroke="var(--line)" stroke-width="2"/>
  <line x1="750" y1="270" x2="651" y2="171" stroke="var(--line)" stroke-width="2"/>
  <line x1="750" y1="270" x2="849" y2="369" stroke="var(--line)" stroke-width="2"/>
  <line x1="750" y1="270" x2="849" y2="171" stroke="var(--line)" stroke-width="2"/>
  <line x1="750" y1="270" x2="651" y2="369" stroke="var(--line)" stroke-width="2"/>

  <!-- Highlight a Track (Yellowish / Track color) -->
  <path d="M 750 170 A 100 100 0 0 1 850 270" fill="none" stroke="var(--track)" stroke-width="8"/>
  <text x="910" y="190" class="text" fill="var(--track)">트랙 (Track)</text>
  <path d="M 890 200 L 830 220" class="arrow"/>

  <!-- Highlight a Sector block (Reddish) -->
  <path d="M 610 270 A 140 140 0 0 1 651 171 L 679 199 A 100 100 0 0 0 650 270 Z" fill="var(--sector)"/>
  <text x="590" y="160" class="text" fill="var(--sector)">섹터 (Sector, 512B지점)</text>
  <path d="M 600 170 L 630 210" class="arrow"/>

  <!-- Timeline equation at bottom -->
  <rect x="250" y="420" width="500" height="60" fill="transparent" stroke="var(--line)" stroke-width="2" rx="10"/>
  <text x="500" y="455" class="text" text-anchor="middle">접근 시간 = 탐색 시간(Seek) + 회전 지연 시간(Rotational) + 전송 시간(Transfer)</text>

</svg>
