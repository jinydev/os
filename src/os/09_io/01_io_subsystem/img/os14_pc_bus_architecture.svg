<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --core: #e74c3c;
        --fast-bus: #3498db;
        --slow-bus: #95a5a6;
        --device: #2ecc71;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --core: #ff7675;
          --fast-bus: #2980b9;
          --slow-bus: #7f8c8d;
          --device: #27ae60;
          --line: #bdc3c7;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 18px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: normal; }
      .title { font-size: 26px; }
      
      .core-box { fill: var(--core); rx: 5; }
      .bridge-box { fill: var(--fast-bus); rx: 5; }
      .device-box { fill: var(--device); rx: 5; }
      
      .sys-bus { stroke: var(--core); stroke-width: 6; }
      .pci-bus { stroke: var(--fast-bus); stroke-width: 12; stroke-linecap: round; }
      .exp-bus { stroke: var(--slow-bus); stroke-width: 12; stroke-linecap: round; }
      
      .conn { stroke: var(--line); stroke-width: 3; fill: none; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">컴퓨터 I/O 계층형 버스 아키텍처 (Bus Architecture)</text>
  <text x="500" y="70" class="text-sm" text-anchor="middle">장치의 처리 속도(대역폭) 격차에 따라 고속/저속 버스를 분리하여 병목을 방지하는 브릿지 구조</text>

  <!-- Core Components -->
  <rect x="350" y="100" width="120" height="40" class="core-box"/>
  <text x="410" y="126" class="text" fill="#fff" text-anchor="middle">CPU 코어</text>

  <rect x="530" y="100" width="120" height="40" class="core-box"/>
  <text x="590" y="126" class="text" fill="#fff" text-anchor="middle">메인 메모리</text>
  
  <line x1="470" y1="120" x2="530" y2="120" class="sys-bus"/>
  <text x="500" y="110" font-size="12" fill="var(--core)" text-anchor="middle">System Bus</text>

  <!-- Bridge -->
  <rect x="400" y="180" width="200" height="40" class="bridge-box"/>
  <text x="500" y="206" class="text" fill="#fff" text-anchor="middle">브리지 / 메모리 제어기</text>

  <path d="M 410 140 L 410 180" class="conn"/>
  <path d="M 590 140 L 590 180" class="conn"/>

  <!-- High-Speed PCI Bus -->
  <line x1="100" y1="260" x2="900" y2="260" class="pci-bus"/>
  <text x="850" y="245" class="text" fill="var(--fast-bus)">PCI Bus (고속)</text>
  <path d="M 500 220 L 500 254" class="conn"/>

  <!-- PCI Devices -->
  <rect x="150" y="300" width="120" height="40" class="device-box"/>
  <text x="210" y="326" class="text" fill="#fff" text-anchor="middle">그래픽 제어기</text>
  <path d="M 210 266 L 210 300" class="conn"/>

  <rect x="300" y="300" width="120" height="40" class="device-box"/>
  <text x="360" y="326" class="text" fill="#fff" text-anchor="middle">SCSI / NVMe</text>
  <path d="M 360 266 L 360 300" class="conn"/>

  <!-- Expansion Bus Bridge -->
  <rect x="520" y="300" width="160" height="40" class="bridge-box"/>
  <text x="600" y="326" class="text" fill="#fff" text-anchor="middle">하위 확장 버스 브리지</text>
  <path d="M 600 266 L 600 300" class="conn"/>

  <!-- Expansion Bus -->
  <line x1="450" y1="380" x2="850" y2="380" class="exp-bus"/>
  <text x="780" y="365" class="text" fill="var(--slow-bus)">Expansion Bus (저속)</text>
  <path d="M 600 340 L 600 374" class="conn"/>

  <!-- Slow Devices -->
  <rect x="470" y="420" width="100" height="30" class="device-box"/>
  <text x="520" y="441" class="text-sm" fill="#fff" text-anchor="middle">키보드/마우스</text>
  <path d="M 520 386 L 520 420" class="conn"/>

  <rect x="600" y="420" width="100" height="30" class="device-box"/>
  <text x="650" y="441" class="text-sm" fill="#fff" text-anchor="middle">Serial Port</text>
  <path d="M 650 386 L 650 420" class="conn"/>
  
  <rect x="730" y="420" width="100" height="30" class="device-box"/>
  <text x="780" y="441" class="text-sm" fill="#fff" text-anchor="middle">USB 허브</text>
  <path d="M 780 386 L 780 420" class="conn"/>

</svg>
