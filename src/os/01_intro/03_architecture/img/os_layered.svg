<svg width="100%" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-both" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 5 L 0 0 L 0 10 z" fill="#DAA520"/>
    </marker>
    <marker id="arrow-start" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 5 L 10 0 L 10 10 z" fill="#DAA520"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>

  <g transform="translate(300, 50)">
    <!-- Layers from Top to Bottom -->
    <!-- Layer 5 -->
    <rect x="-100" y="0" width="60" height="30" fill="#FDF5E6" rx="5"/>
    <text x="-70" y="20" fill="black" font-size="16" font-weight="bold" font-family="sans-serif" text-anchor="middle">계층 5</text>
    <rect x="0" y="0" width="300" height="40" fill="#005A9E" rx="3" stroke="#FFF" stroke-width="1"/>
    <text x="150" y="28" fill="white" font-size="22" font-family="sans-serif" text-anchor="middle">응용 프로그램</text>
    <line x1="260" y1="40" x2="260" y2="70" stroke="#DAA520" stroke-width="3" marker-end="url(#arrow-both)" marker-start="url(#arrow-start)"/>

    <!-- Layer 4 -->
    <rect x="-100" y="70" width="60" height="30" fill="#FDF5E6" rx="5"/>
    <text x="-70" y="90" fill="black" font-size="16" font-weight="bold" font-family="sans-serif" text-anchor="middle">계층 4</text>
    <rect x="0" y="70" width="300" height="40" fill="#1864A4" rx="3" stroke="#FFF" stroke-width="1"/>
    <text x="150" y="98" fill="white" font-size="22" font-family="sans-serif" text-anchor="middle">입출력 관리</text>
    <line x1="260" y1="110" x2="260" y2="140" stroke="#DAA520" stroke-width="3" marker-end="url(#arrow-both)" marker-start="url(#arrow-start)"/>

    <!-- Layer 3 -->
    <rect x="-100" y="140" width="60" height="30" fill="#FDF5E6" rx="5"/>
    <text x="-70" y="160" fill="black" font-size="16" font-weight="bold" font-family="sans-serif" text-anchor="middle">계층 3</text>
    <rect x="0" y="140" width="300" height="40" fill="#2074B0" rx="3" stroke="#FFF" stroke-width="1"/>
    <text x="150" y="168" fill="white" font-size="22" font-family="sans-serif" text-anchor="middle">메시지 해석기</text>
    <line x1="260" y1="180" x2="260" y2="210" stroke="#DAA520" stroke-width="3" marker-end="url(#arrow-both)" marker-start="url(#arrow-start)"/>

    <!-- Layer 2 -->
    <rect x="-100" y="210" width="60" height="30" fill="#FDF5E6" rx="5"/>
    <text x="-70" y="230" fill="black" font-size="16" font-weight="bold" font-family="sans-serif" text-anchor="middle">계층 2</text>
    <rect x="0" y="210" width="300" height="40" fill="#2885BC" rx="3" stroke="#FFF" stroke-width="1"/>
    <text x="150" y="238" fill="white" font-size="22" font-family="sans-serif" text-anchor="middle">메모리 관리</text>
    <line x1="260" y1="250" x2="260" y2="280" stroke="#DAA520" stroke-width="3" marker-end="url(#arrow-both)" marker-start="url(#arrow-start)"/>

    <!-- Layer 1 -->
    <rect x="-100" y="280" width="60" height="30" fill="#FDF5E6" rx="5"/>
    <text x="-70" y="300" fill="black" font-size="16" font-weight="bold" font-family="sans-serif" text-anchor="middle">계층 1</text>
    <rect x="0" y="280" width="300" height="40" fill="#3095C8" rx="3" stroke="#FFF" stroke-width="1"/>
    <text x="150" y="308" fill="white" font-size="22" font-family="sans-serif" text-anchor="middle">프로세서 스케줄링</text>
    <line x1="260" y1="320" x2="260" y2="350" stroke="#DAA520" stroke-width="3" marker-end="url(#arrow-both)" marker-start="url(#arrow-start)"/>

    <!-- Layer 0 -->
    <rect x="-100" y="350" width="60" height="30" fill="#FDF5E6" rx="5"/>
    <text x="-70" y="370" fill="black" font-size="16" font-weight="bold" font-family="sans-serif" text-anchor="middle">계층 0</text>
    <rect x="0" y="350" width="300" height="40" fill="#38A6D4" rx="3" stroke="#FFF" stroke-width="1"/>
    <text x="150" y="378" fill="white" font-size="22" font-family="sans-serif" text-anchor="middle">하드웨어</text>

    <!-- Side Annotations -->
    <line x1="-200" y1="50" x2="-20" y2="50" stroke="#999" stroke-width="3"/>
    <text x="-110" y="30" fill="#FF6B6B" font-size="24" font-weight="bold" font-family="sans-serif" text-anchor="middle">사용자 영역</text>
    <text x="-110" y="80" fill="#FF8C8C" font-size="24" font-weight="bold" font-family="sans-serif" text-anchor="middle">커널 영역</text>
  </g>

</svg>
