<svg width="100%" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>
  
  <!-- Left Column -->
  <rect x="50" y="30" width="300" height="50" fill="#2E8B57" rx="25"/>
  <circle cx="75" cy="55" r="20" fill="white"/>
  <text x="75" y="62" fill="#2E8B57" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">1</text>
  <text x="210" y="62" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">일괄 처리 시스템</text>

  <rect x="50" y="100" width="300" height="50" fill="#2E8B57" rx="25"/>
  <circle cx="75" cy="125" r="20" fill="white"/>
  <text x="75" y="132" fill="#2E8B57" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">2</text>
  <text x="210" y="132" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">다중 프로그래밍 시스템</text>

  <rect x="50" y="170" width="300" height="50" fill="#2E8B57" rx="25"/>
  <circle cx="75" cy="195" r="20" fill="white"/>
  <text x="75" y="202" fill="#2E8B57" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">3</text>
  <text x="210" y="202" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">시분할 시스템</text>

  <!-- Right Column -->
  <rect x="450" y="30" width="300" height="50" fill="#4682B4" rx="25"/>
  <circle cx="475" cy="55" r="20" fill="white"/>
  <text x="475" y="62" fill="#4682B4" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">4</text>
  <text x="610" y="62" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">다중 처리 시스템</text>

  <rect x="450" y="100" width="300" height="50" fill="#4682B4" rx="25"/>
  <circle cx="475" cy="125" r="20" fill="white"/>
  <text x="475" y="132" fill="#4682B4" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">5</text>
  <text x="610" y="132" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">실시간 처리 시스템</text>

  <rect x="450" y="170" width="300" height="50" fill="#4682B4" rx="25"/>
  <circle cx="475" cy="195" r="20" fill="white"/>
  <text x="475" y="202" fill="#4682B4" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">6</text>
  <text x="610" y="202" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">분산 처리 시스템</text>
