<svg width="100%" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 L 2 5 z" fill="#AAA"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>

  <!-- Memory block -->
  <text x="130" y="40" fill="#20B2AA" font-size="24" font-weight="bold" font-family="sans-serif" text-anchor="middle">메모리</text>
  
  <!-- OS -->
  <rect x="50" y="230" width="160" height="40" fill="#005A9E" rx="3"/>
  <text x="130" y="258" fill="#FFD700" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">운영체제</text>

  <!-- Job 1 -->
  <rect x="50" y="180" width="160" height="40" fill="#4682B4" rx="3"/>
  <text x="130" y="208" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">작업 1</text>
  
  <!-- Job 2 -->
  <rect x="50" y="130" width="160" height="40" fill="#4682B4" rx="3"/>
  <text x="130" y="158" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">작업 2</text>

  <!-- Job 3 -->
  <rect x="50" y="80" width="160" height="40" fill="#4682B4" rx="3"/>
  <text x="130" y="108" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">작업 3</text>

  <!-- Arrows and States -->
  <!-- Job 3 waiting -->
  <text x="240" y="105" fill="#DDD" font-size="18" font-family="sans-serif">CPU 시간 대기 중</text>

  <!-- Job 2 I/O -->
  <line x1="210" y1="150" x2="570" y2="150" stroke="#AAA" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="330" y="130" width="160" height="40" fill="#1E1E1E"/> <!-- masking the line text area -->
  <text x="410" y="155" fill="#DDD" font-size="18" font-family="sans-serif" text-anchor="middle">입출력 동작 중</text>
  
  <!-- Disk Cylinder -->
  <ellipse cx="650" cy="130" rx="60" ry="15" fill="#DAA520"/>
  <path d="M 590 130 L 590 170 A 60 15 0 0 0 710 170 L 710 130 Z" fill="#B8860B"/>
  <text x="650" y="160" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">디스크</text>

  <!-- Job 1 CPU -->
  <polyline points="210,200 400,200 400,240" fill="none" stroke="#AAA" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="400" y="190" fill="#DDD" font-size="18" font-family="sans-serif" text-anchor="middle">CPU에서 실행 중</text>

  <rect x="340" y="250" width="120" height="40" fill="#20B2AA" rx="5"/>
  <text x="400" y="278" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">CPU</text>

</svg>
