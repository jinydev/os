<svg width="100%" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradUnix" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>

  <text x="400" y="40" fill="white" font-size="26" font-weight="bold" font-family="sans-serif" text-anchor="middle">유닉스 (UNIX) 및 리눅스 계보도</text>

  <!-- Root -->
  <rect x="300" y="70" width="200" height="40" fill="url(#gradUnix)" rx="5"/>
  <text x="400" y="96" fill="black" font-size="18" font-weight="bold" font-family="sans-serif" text-anchor="middle">UNIX (1969, Bell Labs)</text>
  <line x1="400" y1="110" x2="400" y2="150" stroke="#FFF" stroke-width="2"/>

  <!-- Split lines -->
  <line x1="250" y1="150" x2="550" y2="150" stroke="#FFF" stroke-width="2"/>
  <line x1="250" y1="150" x2="250" y2="180" stroke="#FFF" stroke-width="2"/>
  <line x1="550" y1="150" x2="550" y2="180" stroke="#FFF" stroke-width="2"/>

  <!-- BSD Branch -->
  <rect x="180" y="180" width="140" height="40" fill="#20B2AA" rx="5"/>
  <text x="250" y="206" fill="white" font-size="18" font-weight="bold" font-family="sans-serif" text-anchor="middle">BSD 계열</text>
  <text x="250" y="250" fill="#CCC" font-size="14" font-family="sans-serif" text-anchor="middle">학술, 오픈소스 중심</text>
  
  <line x1="250" y1="220" x2="250" y2="280" stroke="#FFF" stroke-width="2"/>
  <line x1="170" y1="280" x2="330" y2="280" stroke="#FFF" stroke-width="2"/>
  
  <line x1="170" y1="280" x2="170" y2="310" stroke="#FFF" stroke-width="2"/>
  <rect x="120" y="310" width="100" height="30" fill="#4682B4" rx="3"/>
  <text x="170" y="332" fill="white" font-size="14" font-weight="bold" font-family="sans-serif" text-anchor="middle">FreeBSD</text>

  <line x1="250" y1="280" x2="250" y2="310" stroke="#FFF" stroke-width="2"/>
  <rect x="200" y="310" width="100" height="30" fill="#4682B4" rx="3"/>
  <text x="250" y="332" fill="white" font-size="14" font-weight="bold" font-family="sans-serif" text-anchor="middle">Net/OpenBSD</text>

  <line x1="330" y1="280" x2="330" y2="310" stroke="#FFF" stroke-width="2"/>
  <rect x="280" y="310" width="100" height="40" fill="#DAA520" rx="3"/>
  <text x="330" y="335" fill="black" font-size="16" font-weight="bold" font-family="sans-serif" text-anchor="middle">Mac OS X</text>

  <!-- System V Branch -->
  <rect x="480" y="180" width="140" height="40" fill="#C71585" rx="5"/>
  <text x="550" y="206" fill="white" font-size="18" font-weight="bold" font-family="sans-serif" text-anchor="middle">System V 계열</text>
  <text x="550" y="250" fill="#CCC" font-size="14" font-family="sans-serif" text-anchor="middle">상용 엔터프라이즈 중심</text>

  <line x1="550" y1="220" x2="550" y2="280" stroke="#FFF" stroke-width="2"/>
  <line x1="470" y1="280" x2="630" y2="280" stroke="#FFF" stroke-width="2"/>

  <line x1="470" y1="280" x2="470" y2="310" stroke="#FFF" stroke-width="2"/>
  <rect x="420" y="310" width="100" height="30" fill="#8B008B" rx="3"/>
  <text x="470" y="332" fill="white" font-size="14" font-weight="bold" font-family="sans-serif" text-anchor="middle">Solaris</text>

  <line x1="550" y1="280" x2="550" y2="310" stroke="#FFF" stroke-width="2"/>
  <rect x="500" y="310" width="100" height="30" fill="#8B008B" rx="3"/>
  <text x="550" y="332" fill="white" font-size="14" font-weight="bold" font-family="sans-serif" text-anchor="middle">HP-UX</text>

  <line x1="630" y1="280" x2="630" y2="310" stroke="#FFF" stroke-width="2"/>
  <rect x="580" y="310" width="100" height="30" fill="#8B008B" rx="3"/>
  <text x="630" y="332" fill="white" font-size="14" font-weight="bold" font-family="sans-serif" text-anchor="middle">AIX</text>


  <!-- Linux Branch -->
  <line x1="400" y1="360" x2="400" y2="480" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="330" y="420" width="140" height="50" fill="#2E8B57" rx="5"/>
  <text x="400" y="445" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">리눅스 (Linux)</text>
  <text x="400" y="465" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">1991 (Linus Torvalds)</text>

  <line x1="100" y1="445" x2="330" y2="445" stroke="#2E8B57" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="215" y="435" fill="#CCC" font-size="14" font-family="sans-serif" text-anchor="middle">UNIX 호환 (외형)</text>
  
  <text x="100" y="480" fill="#999" font-size="12" font-family="sans-serif">독자적인 오픈소스 커널로 발전</text>

</svg>
