<svg width="100%" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#AAA"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>

  <rect x="50" y="220" width="160" height="50" fill="#336699" rx="5"/>
  <text x="130" y="252" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">부팅 과정</text>

  <rect x="290" y="90" width="160" height="50" fill="#DAA520" rx="5"/>
  <text x="370" y="122" fill="white" font-size="22" font-weight="bold" font-family="sans-serif" text-anchor="middle">ROM BIOS</text>

  <ellipse cx="600" cy="120" rx="80" ry="20" fill="#0078D7"/>
  <path d="M 520 120 L 520 180 A 80 20 0 0 0 680 180 L 680 120 Z" fill="#005A9E"/>
  <text x="600" y="140" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">HDD</text>
  <text x="600" y="165" fill="#FFD700" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">운영체제</text>

  <rect x="290" y="220" width="160" height="60" fill="#20B2AA" rx="5"/>
  <text x="370" y="245" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">RAM</text>
  <text x="370" y="270" fill="#FFD700" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">운영체제</text>

  <rect x="80" y="120" width="140" height="50" fill="#4682B4" rx="5"/>
  <text x="150" y="152" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">프로세서</text>

  <!-- Lines connecting components -->
  <!-- ROM BIOS right arrow to description -->
  <line x1="450" y1="115" x2="490" y2="115" stroke="#AAA" stroke-width="2" marker-start="url(#arrowhead)"/>
  
  <text x="480" y="75" fill="#CCC" font-size="16" font-family="sans-serif">1. 컴퓨터 작동 시작</text>
  <text x="480" y="95" fill="#CCC" font-size="16" font-family="sans-serif">ROM의 부트로더 실행</text>

  <!-- ROM BIOS down to RAM, RAM to HDD -->
  <line x1="370" y1="140" x2="370" y2="220" stroke="#AAA" stroke-width="2"/>
  <line x1="370" y1="160" x2="520" y2="160" stroke="#AAA" stroke-width="2"/>
  
  <rect x="400" y="180" width="340" height="40" fill="#222" rx="5"/>
  <text x="410" y="205" fill="#CCC" font-size="16" font-family="sans-serif">2. 부트로더가 HDD의 커널을 RAM에 적재</text>

  <!-- RAM to Processor -->
  <line x1="220" y1="145" x2="370" y2="145" stroke="#AAA" stroke-width="2"/>
  <rect x="180" y="170" width="160" height="40" fill="#222" rx="5"/>
  <text x="260" y="195" fill="#CCC" font-size="14" font-family="sans-serif" text-anchor="middle">3. 특정 프로그램 시작</text>

</svg>
