<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --queue: #5c6bc0;
        --cpu: #2980b9;
        --head: #bdc3c7;
        --line: #34495e;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --queue: #3f51b5;
          --cpu: #3498db;
          --head: #636e72;
          --line: #b2bec3;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .title { font-size: 24px; }
      .head-box { fill: var(--head); stroke: var(--text); stroke-width: 2; rx: 4; }
      .pcb-box { fill: transparent; stroke: var(--text); stroke-width: 2; rx: 4; }
      .new-box { fill: var(--queue); stroke: none; rx: 4; }
      .cpu-ellipse { fill: var(--cpu); stroke: none; }
      .border-dash { stroke: var(--cpu); stroke-width: 3; stroke-dasharray: 8 8; fill: none; rx: 10; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-blue { stroke: var(--cpu); stroke-width: 4; fill: none; marker-end: url(#arrowhead-blue); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--cpu)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">선입선처리 스케줄링 (FCFS)</text>
  <text x="500" y="80" class="text" text-anchor="middle">준비 큐 꼬리에 프로세스 추가</text>

  <!-- Dashed Box for Ready Queue -->
  <rect x="150" y="120" width="700" height="130" class="border-dash"/>
  <text x="500" y="110" class="text" text-anchor="middle">준비 큐</text>

  <!-- Ready Queue Header -->
  <rect x="170" y="150" width="100" height="70" class="head-box"/>
  <path d="M 170 185 L 270 185" stroke="var(--text)" stroke-width="2"/>
  <text x="220" y="140" class="text" text-anchor="middle">큐 헤더</text>
  <text x="220" y="175" class="text" text-anchor="middle">head</text>
  <text x="220" y="210" class="text" text-anchor="middle">tail</text>

  <!-- PCBs -->
  <text x="350" y="150" class="text" text-anchor="middle">PCB</text>
  <rect x="300" y="160" width="100" height="40" class="pcb-box"/>
  
  <text x="480" y="150" class="text" text-anchor="middle">PCB</text>
  <rect x="430" y="160" width="100" height="40" class="pcb-box"/>

  <text x="610" y="150" class="text" text-anchor="middle">PCB</text>
  <rect x="560" y="160" width="100" height="40" class="pcb-box"/>

  <text x="740" y="150" class="text" text-anchor="middle">PCB</text>
  <rect x="690" y="160" width="100" height="40" class="pcb-box"/>


  <!-- Internal Edges -->
  <path d="M 270 165 L 290 165" class="arrow"/>
  <path d="M 400 180 L 420 180" class="arrow-blue"/>
  <path d="M 530 180 L 550 180" class="arrow-blue"/>
  <path d="M 660 180 L 680 180" class="arrow-blue"/>
  
  <!-- Null Tail -->
  <path d="M 790 180 L 820 180 L 820 190" stroke="var(--text)" stroke-width="2" fill="none"/>
  <path d="M 810 190 L 830 190" stroke="var(--text)" stroke-width="2"/>
  <path d="M 815 195 L 825 195" stroke="var(--text)" stroke-width="2"/>

  <!-- Global Tail Pointer -->
  <path d="M 270 200 L 740 200 L 740 210" class="arrow"/>


  <!-- New Process Injection -->
  <rect x="680" y="30" width="150" height="40" class="new-box"/>
  <text x="755" y="58" class="text" fill="#fff" text-anchor="middle">새로운 프로세스</text>
  
  <path d="M 755 70 L 755 140" class="arrow-blue"/>
  <text x="860" y="110" class="text" fill="var(--cpu)" text-anchor="middle">준비 큐의 꼬리에 추가</text>


  <!-- CPU Target -->
  <ellipse cx="220" cy="330" rx="60" ry="50" class="cpu-ellipse"/>
  <text x="220" y="325" class="text" fill="#fff" text-anchor="middle" font-size="24">CPU</text>
  <text x="220" y="355" class="text" fill="#fff" text-anchor="middle">프로세서</text>

  <path d="M 220 250 L 220 270" class="arrow-blue"/>

</svg>
