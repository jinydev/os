<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --queue: #5c6bc0;
        --cpu: #2980b9;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --queue: #3f51b5;
          --cpu: #3498db;
          --line: #b2bec3;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .desc { font-weight: normal; font-size: 16px; fill: var(--text); }
      .title { font-size: 24px; }
      .queue-box { fill: var(--queue); stroke: #fff; stroke-width: 2; }
      .cpu-ellipse { fill: var(--cpu); stroke: #fff; stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">스케줄링 큐 (Queue) 연결도</text>

  <text x="300" y="100" class="text" text-anchor="middle">CPU를 할당 받아 실행하려고 기다리는</text>
  <text x="300" y="125" class="text" text-anchor="middle">프로세스들이 대기</text>

  <!-- Ready Queue -->
  <rect x="200" y="160" width="200" height="50" class="queue-box"/>
  <text x="300" y="193" class="text" fill="#fff" text-anchor="middle">준비 큐</text>

  <!-- CPU -->
  <ellipse cx="600" cy="185" rx="70" ry="60" class="cpu-ellipse"/>
  <text x="600" y="180" class="text" fill="#fff" text-anchor="middle" font-size="28">CPU</text>
  <text x="600" y="210" class="text" fill="#fff" text-anchor="middle">프로세서</text>

  <!-- Device Queue -->
  <rect x="180" y="280" width="140" height="100" rx="70" class="cpu-ellipse" fill="var(--cpu)"/>
  <text x="250" y="325" class="text" fill="#fff" text-anchor="middle">입출력장치</text>

  <rect x="500" y="300" width="200" height="50" class="queue-box"/>
  <text x="600" y="333" class="text" fill="#fff" text-anchor="middle">입출력장치 큐</text>
  
  <text x="650" y="390" class="text" text-anchor="middle">입출력장치를 사용하려는 프로세스들이 대기</text>

  <!-- Edges -->
  <path d="M 400 185 L 520 185" class="arrow"/>
  
  <!-- CPU -> End -->
  <path d="M 670 185 L 850 185" class="arrow"/>
  <text x="880" y="193" class="text" text-anchor="middle">종료</text>

  <!-- CPU -> IO Queue -->
  <path d="M 670 185 L 750 185 L 750 325 L 710 325" class="arrow"/>

  <!-- IO Queue -> IO Device -->
  <path d="M 500 325 L 330 325" class="arrow"/>

  <!-- IO Device -> Ready Queue -->
  <path d="M 180 325 L 100 325 L 100 185 L 190 185" class="arrow"/>

</svg>
