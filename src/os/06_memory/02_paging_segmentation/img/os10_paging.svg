<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #34495e;
        --page: #3498db;
        --frame: #27ae60;
        --table: #f39c12;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #4a6278;
          --page: #2980b9;
          --frame: #2ecc71;
          --table: #f1c40f;
          --line: #bdc3c7;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; }
      .title { font-size: 28px; }
      .page-box { fill: var(--page); stroke: var(--bg); stroke-width: 2; }
      .frame-box { fill: var(--frame); stroke: var(--bg); stroke-width: 2; }
      .empty-box { fill: transparent; stroke: var(--line); stroke-width: 2; }
      .table-hdr { fill: var(--table); }
      .table-row { fill: var(--bg); stroke: var(--line); stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">페이징 (Paging) 시스템 아키텍처</text>

  <!-- Logical Memory (Pages) -->
  <text x="200" y="110" class="text" text-anchor="middle">논리 메모리 (CPU 생성)</text>
  <rect x="130" y="130" width="140" height="200" class="empty-box"/>
  
  <rect x="130" y="130" width="140" height="40" class="page-box"/>
  <text x="200" y="156" class="text" fill="#fff" text-anchor="middle">Page 0</text>
  
  <rect x="130" y="170" width="140" height="40" class="page-box"/>
  <text x="200" y="196" class="text" fill="#fff" text-anchor="middle">Page 1</text>
  
  <rect x="130" y="210" width="140" height="40" class="page-box"/>
  <text x="200" y="236" class="text" fill="#fff" text-anchor="middle">Page 2</text>
  
  <rect x="130" y="250" width="140" height="40" class="page-box"/>
  <text x="200" y="276" class="text" fill="#fff" text-anchor="middle">Page 3</text>

  <!-- Page Table -->
  <text x="500" y="160" class="text" text-anchor="middle">페이지 테이블</text>
  <rect x="420" y="180" width="160" height="30" class="table-hdr"/>
  <text x="460" y="202" class="text" fill="#fff" text-anchor="middle">P#</text>
  <text x="540" y="202" class="text" fill="#fff" text-anchor="middle">Frame#</text>

  <rect x="420" y="210" width="80" height="30" class="table-row"/>
  <rect x="500" y="210" width="80" height="30" class="table-row"/>
  <text x="460" y="232" class="text" text-anchor="middle">0</text>
  <text x="540" y="232" class="text" text-anchor="middle">1</text>

  <rect x="420" y="240" width="80" height="30" class="table-row"/>
  <rect x="500" y="240" width="80" height="30" class="table-row"/>
  <text x="460" y="262" class="text" text-anchor="middle">1</text>
  <text x="540" y="262" class="text" text-anchor="middle">4</text>

  <rect x="420" y="270" width="80" height="30" class="table-row"/>
  <rect x="500" y="270" width="80" height="30" class="table-row"/>
  <text x="460" y="292" class="text" text-anchor="middle">2</text>
  <text x="540" y="292" class="text" text-anchor="middle">3</text>

  <rect x="420" y="300" width="80" height="30" class="table-row"/>
  <rect x="500" y="300" width="80" height="30" class="table-row"/>
  <text x="460" y="322" class="text" text-anchor="middle">3</text>
  <text x="540" y="322" class="text" text-anchor="middle">7</text>

  <!-- Physical Memory (Frames) -->
  <text x="800" y="110" class="text" text-anchor="middle">물리 메모리 (RAM)</text>
  <rect x="730" y="130" width="140" height="320" class="empty-box"/>
  
  <text x="690" y="156" class="text-sm" text-anchor="middle">F0</text>
  <rect x="730" y="130" width="140" height="40" fill="transparent" stroke="var(--line)"/>
  
  <text x="690" y="196" class="text-sm" text-anchor="middle">F1</text>
  <rect x="730" y="170" width="140" height="40" class="frame-box"/>
  <text x="800" y="196" class="text" fill="#fff" text-anchor="middle">Page 0</text>
  
  <text x="690" y="236" class="text-sm" text-anchor="middle">F2</text>
  <rect x="730" y="210" width="140" height="40" fill="transparent" stroke="var(--line)"/>

  <text x="690" y="276" class="text-sm" text-anchor="middle">F3</text>
  <rect x="730" y="250" width="140" height="40" class="frame-box"/>
  <text x="800" y="276" class="text" fill="#fff" text-anchor="middle">Page 2</text>

  <text x="690" y="316" class="text-sm" text-anchor="middle">F4</text>
  <rect x="730" y="290" width="140" height="40" class="frame-box"/>
  <text x="800" y="316" class="text" fill="#fff" text-anchor="middle">Page 1</text>

  <text x="690" y="356" class="text-sm" text-anchor="middle">F5...</text>
  
  <text x="690" y="396" class="text-sm" text-anchor="middle">F7</text>
  <rect x="730" y="370" width="140" height="40" class="frame-box"/>
  <text x="800" y="396" class="text" fill="#fff" text-anchor="middle">Page 3</text>

  <!-- Pointers -->
  <path d="M 280 150 Q 350 150 410 220" class="arrow"/>
  <path d="M 590 225 Q 660 225 720 190" class="arrow"/>

</svg>
