<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;family=Fira+Code&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .code { font-family: 'Fira Code', monospace; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
        </marker>
        <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#38BDF8"/>
        </marker>
    </defs>
    <rect width="900" height="600" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#F8FAFC" font-size="28" font-weight="800" text-anchor="middle">프로세스의 일반적인 메모리 구조</text>

    <!-- Pointer Arrows -->
    <line x1="600" y1="120" x2="600" y2="480" stroke="#E2E8F0" stroke-width="4" marker-start="url(#arrow)"/>
    <text x="640" y="130" fill="#E2E8F0" font-size="22" font-weight="800">0xFF...FF (High)</text>
    <text x="640" y="490" fill="#E2E8F0" font-size="22" font-weight="800">0x00...00 (Low)</text>

    <!-- Memory Layout Box -->
    <rect x="400" y="120" width="160" height="360" fill="#1E293B" stroke="#0EA5E9" stroke-width="4"/>

    <!-- Stack -->
    <rect x="400" y="120" width="160" height="60" fill="#0C4A6E" stroke="#0EA5E9" stroke-width="2"/>
    <text x="480" y="157" fill="#BAE6FD" font-size="20" font-weight="800" text-anchor="middle">스택 (Stack)</text>

    <!-- Heap -->
    <rect x="400" y="320" width="160" height="50" fill="#082F49" stroke="#0EA5E9" stroke-width="2"/>
    <text x="480" y="352" fill="#BAE6FD" font-size="20" font-weight="800" text-anchor="middle">힙 (Heap)</text>

    <!-- Data -->
    <rect x="400" y="370" width="160" height="50" fill="#1E3A8A" stroke="#0EA5E9" stroke-width="2"/>
    <text x="480" y="402" fill="#DBEAFE" font-size="20" font-weight="800" text-anchor="middle">데이터 (Data)</text>

    <!-- Code -->
    <rect x="400" y="420" width="160" height="60" fill="#172554" stroke="#0EA5E9" stroke-width="2"/>
    <text x="480" y="457" fill="#BFDBFE" font-size="20" font-weight="800" text-anchor="middle">코드 (Text)</text>

    <!-- Growth arrows -->
    <path d="M 440 180 L 440 250" stroke="#38BDF8" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M 520 320 L 520 250" stroke="#38BDF8" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>

    <!-- Code Display -->
    <g transform="translate(60, 160)">
        <rect x="0" y="0" width="280" height="240" fill="#0F172A" stroke="#334155" rx="8" stroke-width="2"/>
        <text x="15" y="30" fill="#F8B400" font-size="14" class="code">int global_data = 10;</text>
        <text x="15" y="50" fill="#A78BFA" font-size="14" class="code">int uninit_data;</text>
        
        <text x="15" y="90" fill="#E2E8F0" font-size="14" class="code">int main() {</text>
        <text x="35" y="110" fill="#4ADE80" font-size="14" class="code">int local = 5;</text>
        <text x="35" y="150" fill="#60A5FA" font-size="14" class="code">void *mem = malloc(100);</text>
        <text x="15" y="190" fill="#E2E8F0" font-size="14" class="code">}</text>
    </g>

    <!-- Linking arrows -->
    <path d="M 340 185 Q 370 185 390 150" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)" fill="none"/>
    <path d="M 340 310 Q 370 310 390 345" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)" fill="none"/>
    <path d="M 340 190 Q 370 230 390 395" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)" fill="none"/>
    <path d="M 340 210 Q 370 230 390 395" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)" fill="none"/>

</svg>
