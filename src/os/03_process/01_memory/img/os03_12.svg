<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .box { rx: 12; stroke-width: 3; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
        </marker>
    </defs>
    <rect width="900" height="500" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#F8FAFC" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="1">프로그램과 프로세스</text>

    <!-- System Bus -->
    <line x1="100" y1="250" x2="800" y2="250" stroke="#64748B" stroke-width="6"/>

    <!-- Processor -->
    <rect x="150" y="100" width="160" height="100" fill="#B45309" stroke="#F59E0B" class="box"/>
    <text x="230" y="160" fill="#FEF3C7" font-size="24" font-weight="800" text-anchor="middle">프로세서</text>
    <line x1="230" y1="200" x2="230" y2="250" stroke="#64748B" stroke-width="6"/>

    <!-- Memory (Process) -->
    <rect x="500" y="80" width="220" height="130" fill="#1D4ED8" stroke="#3B82F6" class="box"/>
    <text x="610" y="125" fill="#DBEAFE" font-size="20" font-weight="600" text-anchor="middle">메인 메모리 (RAM)</text>
    <rect x="520" y="145" width="180" height="45" fill="#0F172A" rx="8"/>
    <text x="610" y="175" fill="#FDE047" font-size="20" font-weight="800" text-anchor="middle">프로세스 (동적)</text>
    <line x1="610" y1="210" x2="610" y2="250" stroke="#64748B" stroke-width="6"/>

    <!-- Disk (Program) -->
    <path d="M 150 320 Q 300 280 450 320 L 450 440 Q 300 480 150 440 Z" fill="#0F766E"/>
    <path d="M 150 320 Q 300 360 450 320" fill="none" stroke="#14B8A6" stroke-width="3"/>
    <rect x="175" y="360" width="250" height="60" fill="#1E293B" rx="8"/>
    <text x="300" y="315" fill="#CCFBF1" font-size="24" font-weight="800" text-anchor="middle">디스크 (HDD/SSD)</text>
    <text x="300" y="385" fill="#FFFFFF" font-size="18" font-weight="800" text-anchor="middle">프로그램 (정적 데이터)</text>
    <text x="300" y="405" fill="#94A3B8" font-size="14" font-weight="600" text-anchor="middle">실행 파일명 (ex: chrome.exe, a.out)</text>
    
    <!-- Upload to Memory arrow -->
    <path d="M 450 380 L 730 380 L 730 165 L 710 165" stroke="#3B82F6" stroke-width="4" stroke-dasharray="8" fill="none" marker-end="url(#arrow)"/>
    <text x="760" y="300" fill="#3B82F6" font-size="20" font-weight="800" text-anchor="start">적재 (Load)</text>
</svg>
