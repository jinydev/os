<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { stroke: #0f172a; stroke-width: 1; }
      .box-if { fill: #e5e7eb; }
      .box-id { fill: #0284c7; }
      .box-of { fill: #0d9488; }
      .box-ex { fill: #312e81; }
      .text-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
      .text-node { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; fill: #ffffff; text-anchor: middle; }
      .text-id { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .axis { fill: none; stroke: #0ea5e9; stroke-width: 3; marker-end: url(#arrow-axis); }
      
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .text-title { fill: #f8fafc; }
        .box { stroke: #1e293b; }
        .box-if { fill: #cbd5e1; }
        .text-id { fill: #0f172a; }
      }
    </style>
    <marker id="arrow-axis" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#0ea5e9"/>
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" />
  
  <text x="400" y="40" class="text-title" text-anchor="middle">명령어 파이프라이닝 (Instruction Pipelining)</text>

  <!-- Axes -->
  <path class="axis" d="M 120 280 L 120 100 L 680 100" />
  <text x="600" y="80" class="text-title" style="font-size: 16px">Time (Clock)</text>
  <text x="120" y="310" class="text-title" style="font-size: 16px" text-anchor="middle">Instructions</text>

  <!-- Pipeline blocks -->
  <g transform="translate(120, 100)">
    <!-- Inst 1 -->
    <rect class="box box-if" x="0" y="0" width="70" height="40" /> <text x="35" y="25" class="text-id">IF</text>
    <rect class="box box-id" x="70" y="0" width="70" height="40" /> <text x="105" y="25" class="text-node">ID</text>
    <rect class="box box-of" x="140" y="0" width="70" height="40" /> <text x="175" y="25" class="text-node">OF</text>
    <rect class="box box-ex" x="210" y="0" width="70" height="40" /> <text x="245" y="25" class="text-node">EX</text>

    <!-- Inst 2 -->
    <rect class="box box-if" x="70" y="40" width="70" height="40" /> <text x="105" y="65" class="text-id">IF</text>
    <rect class="box box-id" x="140" y="40" width="70" height="40" /> <text x="175" y="65" class="text-node">ID</text>
    <rect class="box box-of" x="210" y="40" width="70" height="40" /> <text x="245" y="65" class="text-node">OF</text>
    <rect class="box box-ex" x="280" y="40" width="70" height="40" /> <text x="315" y="65" class="text-node">EX</text>

    <!-- Inst 3 -->
    <rect class="box box-if" x="140" y="80" width="70" height="40" /> <text x="175" y="105" class="text-id">IF</text>
    <rect class="box box-id" x="210" y="80" width="70" height="40" /> <text x="245" y="105" class="text-node">ID</text>
    <rect class="box box-of" x="280" y="80" width="70" height="40" /> <text x="315" y="105" class="text-node">OF</text>
    <rect class="box box-ex" x="350" y="80" width="70" height="40" /> <text x="385" y="105" class="text-node">EX</text>

    <!-- Inst 4 -->
    <rect class="box box-if" x="210" y="120" width="70" height="40" /> <text x="245" y="145" class="text-id">IF</text>
    <rect class="box box-id" x="280" y="120" width="70" height="40" /> <text x="315" y="145" class="text-node">ID</text>
    <rect class="box box-of" x="350" y="120" width="70" height="40" /> <text x="385" y="145" class="text-node">OF</text>
    <rect class="box box-ex" x="420" y="120" width="70" height="40" /> <text x="455" y="145" class="text-node">EX</text>
  </g>

  <rect x="400" y="270" width="300" height="50" fill="#4f46e5" rx="4" />
  <text x="550" y="300" class="text-node text-white" style="font-size:14px">RISC 방식 프로세서의 명령어 병렬 처리</text>

</svg>
