<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 6; ry: 6; }
      .box-head { fill: #bfdbfe; stroke: #3b82f6; }
      .text-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .text-sub { font-family: 'Inter', sans-serif; font-size: 14px; fill: #475569; text-anchor: middle; }
      .text-label { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; fill: #1e293b; text-anchor: middle; }
      .text-desc { font-family: 'Inter', sans-serif; font-size: 13px; fill: #334155; }
      
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .box { fill: #1e293b; stroke: #334155; }
        .box-head { fill: #1e3a8a; stroke: #3b82f6; }
        .text-title, .text-label { fill: #f8fafc; }
        .text-sub, .text-desc { fill: #94a3b8; }
      }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" />
  
  <text x="400" y="40" class="text-title">주요 CPU 레지스터 (Registers)</text>
  <text x="400" y="65" class="text-sub">CPU 내부에 존재하는 가장 빠른 메모리 공간</text>

  <!-- User Visible Registers -->
  <rect class="box" x="100" y="120" width="280" height="280" />
  <rect class="box box-head" x="100" y="120" width="280" height="40" />
  <text x="240" y="145" class="text-label">사용자 가시 레지스터</text>
  <text x="240" y="165" class="text-sub" style="font-size: 12px">(프로그래머가 제어 가능)</text>

  <rect class="box" x="120" y="190" width="80" height="30" />
  <text x="160" y="210" class="text-label">Data Reg</text>
  <text x="215" y="210" class="text-desc">연산용 데이터 저장</text>

  <rect class="box" x="120" y="240" width="80" height="30" />
  <text x="160" y="260" class="text-label">Addr Reg</text>
  <text x="215" y="260" class="text-desc">메모리 주소 저장 (Base, Index)</text>

  <rect class="box" x="120" y="290" width="80" height="30" />
  <text x="160" y="310" class="text-label">GP Reg</text>
  <text x="215" y="310" class="text-desc">범용 레지스터 (데이터/주소 겸용)</text>


  <!-- Control & Status Registers -->
  <rect class="box" x="420" y="120" width="280" height="280" />
  <rect class="box box-head" x="420" y="120" width="280" height="40" />
  <text x="560" y="145" class="text-label">제어 및 상태 레지스터</text>
  <text x="560" y="165" class="text-sub" style="font-size: 12px">(CPU 내부 제어용, 일반 접근 불가)</text>

  <rect class="box" x="440" y="190" width="60" height="30" />
  <text x="470" y="210" class="text-label">PC</text>
  <text x="515" y="210" class="text-desc">다음 실행할 명령어 주소 (Program Counter)</text>

  <rect class="box" x="440" y="240" width="60" height="30" />
  <text x="470" y="260" class="text-label">IR</text>
  <text x="515" y="260" class="text-desc">현재 실행 중인 명령어 (Instruction Reg)</text>

  <rect class="box" x="440" y="290" width="60" height="30" />
  <text x="470" y="310" class="text-label">MAR</text>
  <text x="515" y="310" class="text-desc">접근할 메모리 주소 버퍼</text>

  <rect class="box" x="440" y="340" width="60" height="30" />
  <text x="470" y="360" class="text-label">MBR</text>
  <text x="515" y="360" class="text-desc">메모리에서 읽고 쓸 데이터 버퍼</text>

  <rect class="box" x="440" y="390" width="60" height="30" />
  <text x="470" y="410" class="text-label">PSW</text>
  <text x="515" y="410" class="text-desc">상태 플래그 (Program Status Word)</text>

</svg>
