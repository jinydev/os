<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .box { rx: 12; stroke-width: 2; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#020617"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#38BDF8"/>
        </marker>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#38BDF8" flood-opacity="0.8"/>
        </filter>
    </defs>

    <rect width="900" height="600" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#FFFFFF" font-size="24" font-weight="800" text-anchor="middle" letter-spacing="2">INSTRUCTION FETCH CYCLE</text>

    <!-- CPU Box Container -->
    <rect x="50" y="100" width="500" height="450" fill="#1E293B" stroke="#334155" stroke-width="4" rx="20"/>
    <text x="300" y="140" fill="#94A3B8" font-size="18" font-weight="800" text-anchor="middle">CPU (Microprocessor)</text>

    <!-- Memory Box -->
    <rect x="650" y="100" width="200" height="450" fill="#064E3B" stroke="#10B981" stroke-width="4" rx="20"/>
    <text x="750" y="140" fill="#A7F3D0" font-size="18" font-weight="800" text-anchor="middle">Main Memory</text>

    <line x1="680" y1="200" x2="820" y2="200" stroke="#047857" stroke-width="2"/>
    <line x1="680" y1="260" x2="820" y2="260" stroke="#047857" stroke-width="2"/>
    <text x="750" y="240" fill="#D1FAE5" font-size="14" font-weight="600" text-anchor="middle">[ Instruction ]</text>
    <line x1="680" y1="320" x2="820" y2="320" stroke="#047857" stroke-width="2"/>
    
    <!-- System Bus Vertical -->
    <rect x="575" y="120" width="50" height="410" fill="#9333EA" fill-opacity="0.3" stroke="#A855F7" stroke-width="2" rx="8"/>
    <text x="600" y="325" fill="#E9D5FF" font-size="14" font-weight="800" text-anchor="middle" transform="rotate(-90, 600, 325)">SYSTEM BUS</text>

    <!-- PC Box -->
    <rect x="100" y="180" width="120" height="60" fill="#0C4A6E" stroke="#38BDF8" class="box"/>
    <text x="160" y="215" fill="#BAE6FD" font-size="16" font-weight="600" text-anchor="middle">PC</text>

    <!-- MAR Box -->
    <rect x="350" y="180" width="120" height="60" fill="#0C4A6E" stroke="#38BDF8" class="box"/>
    <text x="410" y="205" fill="#BAE6FD" font-size="16" font-weight="600" text-anchor="middle">MAR</text>
    <text x="410" y="225" fill="#7DD3FC" font-size="11" font-weight="400" text-anchor="middle">Memory Address Reg</text>

    <!-- MBR Box -->
    <rect x="350" y="320" width="120" height="60" fill="#065F46" stroke="#34D399" class="box"/>
    <text x="410" y="345" fill="#D1FAE5" font-size="16" font-weight="600" text-anchor="middle">MBR</text>
    <text x="410" y="365" fill="#A7F3D0" font-size="11" font-weight="400" text-anchor="middle">Memory Buffer Reg</text>

    <!-- IR Box -->
    <rect x="100" y="320" width="120" height="60" fill="#7C2D12" stroke="#FB923C" class="box"/>
    <text x="160" y="345" fill="#FFEDD5" font-size="16" font-weight="600" text-anchor="middle">IR</text>
    <text x="160" y="365" fill="#FDBA74" font-size="11" font-weight="400" text-anchor="middle">Instruction Reg</text>

    <!-- Arrows with Steps -->
    <path d="M 220 210 L 335 210" stroke="#38BDF8" stroke-width="4" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/>
    <circle cx="277" cy="210" r="12" fill="#E0F2FE"/>
    <text x="277" y="215" fill="#0284C7" font-size="14" font-weight="800" text-anchor="middle">1</text>

    <path d="M 470 210 L 650 210" stroke="#38BDF8" stroke-width="4" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/>
    <circle cx="530" cy="210" r="12" fill="#E0F2FE"/>
    <text x="530" y="215" fill="#0284C7" font-size="14" font-weight="800" text-anchor="middle">2</text>
    <text x="530" y="190" fill="#94A3B8" font-size="12" font-weight="400" text-anchor="middle">Address Bus</text>

    <path d="M 650 350 L 485 350" stroke="#34D399" stroke-width="4" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/>
    <circle cx="530" cy="350" r="12" fill="#D1FAE5"/>
    <text x="530" y="355" fill="#059669" font-size="14" font-weight="800" text-anchor="middle">3</text>
    <text x="530" y="330" fill="#94A3B8" font-size="12" font-weight="400" text-anchor="middle">Data Bus (Inst)</text>

    <path d="M 350 350 L 235 350" stroke="#FB923C" stroke-width="4" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/>
    <circle cx="277" cy="350" r="12" fill="#FFEDD5"/>
    <text x="277" y="355" fill="#EA580C" font-size="14" font-weight="800" text-anchor="middle">4</text>

    <!-- Decoder Flow -->
    <path d="M 160 380 L 160 445" stroke="#FB923C" stroke-width="4" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
    <rect x="100" y="460" width="120" height="40" fill="#4C1D95" stroke="#8B5CF6" class="box"/>
    <text x="160" y="485" fill="#DDD6FE" font-size="14" font-weight="600" text-anchor="middle">Decode &amp; Exe</text>
    
    <text x="650" y="520" fill="#94A3B8" font-size="13" font-weight="400" text-anchor="start">1. PC sends address to MAR.</text>
    <text x="650" y="540" fill="#94A3B8" font-size="13" font-weight="400" text-anchor="start">2. MAR sends address to Mem via Bus.</text>
    <text x="650" y="560" fill="#94A3B8" font-size="13" font-weight="400" text-anchor="start">3. Memory sends Instr to MBR via Bus.</text>
    <text x="650" y="580" fill="#94A3B8" font-size="13" font-weight="400" text-anchor="start">4. MBR loads instruction into IR.</text>
</svg>
