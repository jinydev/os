<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .card { rx: 16; stroke-width: 3; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
    </defs>

    <rect width="900" height="450" rx="20" fill="url(#bg)"/>
    <text x="450" y="60" fill="#FFFFFF" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="2">PROCESSOR ARCHITECTURE ISA</text>

    <!-- CISC Card -->
    <g transform="translate(100, 110)">
        <rect width="330" height="280" fill="#1E3A8A" stroke="#3B82F6" class="card"/>
        <text x="165" y="45" fill="#DBEAFE" font-size="28" font-weight="800" text-anchor="middle">CISC</text>
        <text x="165" y="70" fill="#93C5FD" font-size="14" font-weight="400" text-anchor="middle">Complex Instruction Set Computer</text>
        
        <line x1="40" y1="90" x2="290" y2="90" stroke="#3B82F6" stroke-width="2"/>
        
        <text x="40" y="130" fill="#EFF6FF" font-size="16" font-weight="600" text-anchor="start">🚀 Hardware Focus</text>
        <text x="40" y="165" fill="#EFF6FF" font-size="16" font-weight="600" text-anchor="start">🚀 Variable length instructions</text>
        <text x="40" y="200" fill="#EFF6FF" font-size="16" font-weight="600" text-anchor="start">🚀 1 Instruction = Many cycles</text>
        <text x="40" y="235" fill="#EFF6FF" font-size="16" font-weight="600" text-anchor="start">🚀 High Power Consumption</text>

        <text x="165" y="265" fill="#60A5FA" font-size="13" font-weight="800" text-anchor="middle">Examples: Intel x86, AMD</text>
    </g>

    <!-- VS Badge -->
    <circle cx="450" cy="250" r="30" fill="#4B5563" stroke="#0F172A" stroke-width="6"/>
    <text x="450" y="256" fill="#F3F4F6" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="1">VS</text>

    <!-- RISC Card -->
    <g transform="translate(470, 110)">
        <rect width="330" height="280" fill="#831843" stroke="#F43F5E" class="card"/>
        <text x="165" y="45" fill="#FFE4E6" font-size="28" font-weight="800" text-anchor="middle">RISC</text>
        <text x="165" y="70" fill="#FDA4AF" font-size="14" font-weight="400" text-anchor="middle">Reduced Instruction Set Computer</text>
        
        <line x1="40" y1="90" x2="290" y2="90" stroke="#F43F5E" stroke-width="2"/>
        
        <text x="40" y="130" fill="#FFF1F2" font-size="16" font-weight="600" text-anchor="start">⚡ Software/Compiler Focus</text>
        <text x="40" y="165" fill="#FFF1F2" font-size="16" font-weight="600" text-anchor="start">⚡ Fixed length instructions</text>
        <text x="40" y="200" fill="#FFF1F2" font-size="16" font-weight="600" text-anchor="start">⚡ 1 Instruction = 1 Cycle</text>
        <text x="40" y="235" fill="#FFF1F2" font-size="16" font-weight="600" text-anchor="start">⚡ Highly Pipeline &amp; Power Efficient</text>

        <text x="165" y="265" fill="#FB7185" font-size="13" font-weight="800" text-anchor="middle">Examples: ARM (Apple Silicon), RISC-V</text>
    </g>
</svg>
