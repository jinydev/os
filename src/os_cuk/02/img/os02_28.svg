<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 4; ry: 4; }
      .bus-line { stroke-width: 6; }
      .bus-data { stroke: #3b82f6; }
      .bus-addr { stroke: #22c55e; }
      .bus-ctrl { stroke: #eab308; }
      .path-line { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
      .path-line-bidir { fill: none; stroke: #64748b; stroke-width: 2; marker-start: url(#arrow-rev); marker-end: url(#arrow); }
      .text-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; text-anchor: middle; }
      .text-node { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .text-bus { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; fill: #0f172a; }
      
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .box { fill: #1e293b; stroke: #64748b; }
        .text-title, .text-node, .text-bus { fill: #f8fafc; }
        .path-line, .path-line-bidir { stroke: #94a3b8; }
        .bus-data { stroke: #60a5fa; }
        .bus-addr { stroke: #4ade80; }
        .bus-ctrl { stroke: #fde047; }
      }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="currentColor"/>
    </marker>
    <marker id="arrow-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="currentColor"/>
    </marker>
  </defs>

  <rect class="bg" width="100%" height="100%" />
  
  <text x="400" y="40" class="text-title">시스템 버스 (System Bus)</text>

  <!-- Components -->
  <rect class="box" x="100" y="100" width="150" height="80" />
  <text x="175" y="145" class="text-node">CPU</text>

  <rect class="box" x="325" y="100" width="150" height="80" />
  <text x="400" y="145" class="text-node">Memory</text>

  <rect class="box" x="550" y="100" width="150" height="80" />
  <text x="625" y="145" class="text-node">I/O Module</text>

  <!-- Buses -->
  <!-- 제어 버스 -->
  <line class="bus-line bus-ctrl" x1="100" y1="240" x2="700" y2="240" />
  <text x="720" y="245" class="text-bus" fill="#eab308">제어 버스 (Control Bus)</text>
  
  <!-- 주소 버스 -->
  <line class="bus-line bus-addr" x1="100" y1="280" x2="700" y2="280" />
  <text x="720" y="285" class="text-bus" fill="#22c55e">주소 버스 (Address Bus)</text>
  
  <!-- 데이터 버스 -->
  <line class="bus-line bus-data" x1="100" y1="320" x2="700" y2="320" />
  <text x="720" y="325" class="text-bus" fill="#3b82f6">데이터 버스 (Data Bus)</text>

  <!-- Connections -->
  <!-- CPU Lines -->
  <path class="path-line-bidir" d="M 140 180 L 140 320" stroke="#3b82f6" />
  <path class="path-line" d="M 175 180 L 175 280" stroke="#22c55e" />
  <path class="path-line-bidir" d="M 210 180 L 210 240" stroke="#eab308" />

  <!-- Memory Lines -->
  <path class="path-line-bidir" d="M 365 180 L 365 320" />
  <path class="path-line" d="M 400 280 L 400 180" /> <!-- 주소는 받기만함 -->
  <path class="path-line" d="M 435 240 L 435 180" /> <!-- 제어 신호도 주로 받음 -->

  <!-- I/O Lines -->
  <path class="path-line-bidir" d="M 590 180 L 590 320" />
  <path class="path-line-bidir" d="M 625 180 L 625 280" /> 
  <path class="path-line-bidir" d="M 660 180 L 660 240" />

</svg>
