<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --proc: #3498db;
        --res: #27ae60;
        --line: #2d3436;
        --err: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --proc: #2980b9;
          --res: #2ecc71;
          --line: #dfe6e9;
          --err: #c0392b;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .title { font-size: 26px; font-weight: bold; }
      .proc { fill: var(--proc); stroke: var(--line); stroke-width: 3; rx: 40; }
      .res { fill: var(--res); stroke: var(--line); stroke-width: 3; rx: 8; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow-req { stroke: var(--err); stroke-width: 4; fill: none; marker-end: url(#arrowhead-req); stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
    <marker id="arrowhead-req" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--err)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">교착 상태(Deadlock)의 개념적 순환 대기 모델</text>

  <!-- Process A block -->
  <rect x="420" y="100" width="160" height="80" class="proc"/>
  <text x="500" y="148" class="text" fill="#fff" text-anchor="middle" font-size="24">프로세스 A</text>

  <!-- Process B block -->
  <rect x="420" y="320" width="160" height="80" class="proc"/>
  <text x="500" y="368" class="text" fill="#fff" text-anchor="middle" font-size="24">프로세스 B</text>

  <!-- Resource 1 (Scanner) -->
  <rect x="150" y="210" width="160" height="80" class="res"/>
  <text x="230" y="258" class="text" fill="#fff" text-anchor="middle" font-size="22">스캐너 (자원)</text>

  <!-- Resource 2 (CD Recorder) -->
  <rect x="690" y="210" width="160" height="80" class="res"/>
  <text x="770" y="258" class="text" fill="#fff" text-anchor="middle" font-size="22">레코더 (자원)</text>

  <!-- Holding connections (Res -> Proc) -->
  <!-- Scanner to PA -->
  <path d="M 230 210 L 230 140 L 420 140" class="arrow"/>
  <text x="325" y="125" class="text" text-anchor="middle">점유 완료 (Hold)</text>

  <!-- Recorder to PB -->
  <path d="M 770 290 L 770 360 L 580 360" class="arrow"/>
  <text x="675" y="380" class="text" text-anchor="middle">점유 완료 (Hold)</text>

  <!-- Requesting connections (Proc -> Res) -->
  <!-- PA -> Recorder -->
  <path d="M 580 140 L 770 140 L 770 210" class="arrow-req"/>
  <text x="675" y="125" class="text" fill="var(--err)" text-anchor="middle">자원 요청 (Wait)</text>

  <!-- PB -> Scanner -->
  <path d="M 420 360 L 230 360 L 230 290" class="arrow-req"/>
  <text x="325" y="380" class="text" fill="var(--err)" text-anchor="middle">자원 요청 (Wait)</text>

</svg>
