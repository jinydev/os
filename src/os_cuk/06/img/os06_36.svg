<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --safe: #81ecec;
        --unsafe: #ffeaa7;
        --deadlock: #ff7675;
        --line: #2d3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --safe: #00cec9;
          --unsafe: #fdcb6e;
          --deadlock: #d63031;
          --line: #dfe6e9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .title { font-size: 26px; font-weight: bold; }
      .safe { fill: var(--safe); stroke: var(--line); stroke-width: 4; }
      .unsafe { fill: var(--unsafe); stroke: var(--line); stroke-width: 4; opacity: 0.9; }
      .deadlock { fill: var(--deadlock); stroke: var(--line); stroke-width: 4; }
      .pointer { stroke: var(--line); stroke-width: 3; fill: none; marker-start: url(#dot); marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">운영체제 자원 상태 공간 - 은행원 알고리즘(Banker's)의 회피 기준</text>

  <!-- Safe State Blob (All system states) -->
  <path d="M 200 150 C 400 50, 700 80, 800 200 C 900 350, 700 450, 500 450 C 300 450, 100 350, 200 150 Z" class="safe"/>
  
  <!-- Unsafe State Blob -->
  <path d="M 500 180 C 650 150, 750 250, 680 350 C 600 420, 450 350, 500 180 Z" class="unsafe"/>

  <!-- Deadlock State small Blob -->
  <path d="M 600 280 C 630 270, 660 300, 640 330 C 620 350, 580 320, 600 280 Z" class="deadlock"/>

  <!-- Labels -->
  <text x="350" y="260" class="text title" font-size="28" text-anchor="middle" fill="#2d3436">안정 상태 (Safe State)</text>
  <text x="350" y="290" class="text" font-size="16" text-anchor="middle" fill="#2d3436">자원을 모두 할당해도 데드락 안남</text>

  <text x="750" y="160" class="text title" text-anchor="start">불안정 상태 (Unsafe State)</text>
  <path d="M 740 155 L 580 230" class="pointer"/>

  <text x="750" y="380" class="text title" text-anchor="start">교착 상태 (Deadlock)</text>
  <path d="M 740 375 L 630 310" class="pointer"/>

  <rect x="150" y="460" width="700" height="30" fill="var(--bg)"/>
  <text x="500" y="480" class="text" text-anchor="middle">회피 정책: OS는 시스템이 절대로 '불안정 상태'에 진입하지 않도록 자원 요청을 심사하여 거절한다.</text>

</svg>
