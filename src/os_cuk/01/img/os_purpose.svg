<svg width="100%" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>

  <!-- Root -->
  <rect x="30" y="100" width="160" height="100" fill="#20B2AA" rx="5"/>
  <text x="110" y="145" fill="white" font-size="22" font-weight="bold" font-family="sans-serif" text-anchor="middle">운영체제의</text>
  <text x="110" y="175" fill="white" font-size="22" font-weight="bold" font-family="sans-serif" text-anchor="middle">발전 목적</text>

  <!-- Horizontal lines -->
  <path d="M 190 150 L 220 150" stroke="#FFF" stroke-width="2"/>
  <path d="M 220 50 L 220 250" stroke="#FFF" stroke-width="2"/>
  <path d="M 220 50 L 250 50" stroke="#FFF" stroke-width="2"/>
  <path d="M 220 150 L 250 150" stroke="#FFF" stroke-width="2"/>
  <path d="M 220 250 L 250 250" stroke="#FFF" stroke-width="2"/>

  <!-- Level 1 Nodes -->
  <rect x="250" y="25" width="160" height="50" fill="#005A9E" rx="5"/>
  <text x="330" y="58" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">편리성</text>

  <rect x="250" y="125" width="160" height="50" fill="#005A9E" rx="5"/>
  <text x="330" y="158" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">효율성</text>

  <rect x="250" y="225" width="160" height="50" fill="#005A9E" rx="5"/>
  <text x="330" y="258" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">제어 서비스 향상</text>

  <!-- Connections to Level 2 -->
  <path d="M 410 50 L 440 50" stroke="#FFF" stroke-width="2"/>
  <path d="M 410 150 L 440 150" stroke="#FFF" stroke-width="2"/>
  <path d="M 410 250 L 440 250" stroke="#FFF" stroke-width="2"/>

  <!-- Level 2 Content Boxes -->
  <rect x="440" y="25" width="330" height="50" fill="#333" rx="5" stroke="#555" stroke-width="2"/>
  <circle cx="460" cy="50" r="3" fill="#FFF"/>
  <text x="475" y="56" fill="white" font-size="16" font-family="sans-serif">사용자에게 편리한 환경 제공</text>

  <rect x="440" y="85" width="330" height="130" fill="#333" rx="5" stroke="#555" stroke-width="2"/>
  <text x="455" y="115" fill="white" font-size="18" font-weight="bold" font-family="sans-serif">시스템 성능 향상</text>
  <circle cx="460" cy="140" r="3" fill="#FFF"/><text x="475" y="146" fill="white" font-size="16" font-family="sans-serif">처리량 향상</text>
  <circle cx="460" cy="165" r="3" fill="#FFF"/><text x="475" y="171" fill="white" font-size="16" font-family="sans-serif">지연·응답시간 단축</text>
  <circle cx="460" cy="190" r="3" fill="#FFF"/><text x="475" y="196" fill="white" font-size="16" font-family="sans-serif">신뢰도 및 사용 가능도 향상</text>

  <rect x="440" y="225" width="330" height="60" fill="#333" rx="5" stroke="#555" stroke-width="2"/>
  <circle cx="460" cy="245" r="3" fill="#FFF"/><text x="475" y="251" fill="white" font-size="16" font-family="sans-serif">입출력장치의 동작 관리 및 제어</text>
  <circle cx="460" cy="270" r="3" fill="#FFF"/><text x="475" y="276" fill="white" font-size="16" font-family="sans-serif">시스템 오류 예방</text>

</svg>
