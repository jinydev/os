<svg width="100%" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#1E1E1E" rx="10"/>

  <!-- Table Header -->
  <rect x="50" y="30" width="700" height="40" fill="#005A9E" rx="5"/>
  <text x="150" y="58" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">호출 서비스 종류</text>
  <text x="490" y="58" fill="white" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">세부 기능 설명</text>
  <line x1="250" y1="30" x2="250" y2="370" stroke="#555" stroke-width="2"/>

  <!-- Row 1: Process Control -->
  <rect x="60" y="80" width="180" height="40" fill="#DAA520" rx="5"/>
  <text x="150" y="108" fill="black" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">프로세스 제어</text>
  <text x="270" y="95" fill="white" font-size="16" font-family="sans-serif">• 종료와 취소, 적재와 실행, 프로세스 생성/종료</text>
  <text x="270" y="120" fill="white" font-size="16" font-family="sans-serif">• 대기, 신호 이벤트, 메모리 할당/해제</text>
  
  <line x1="50" y1="140" x2="750" y2="140" stroke="#555" stroke-width="1"/>

  <!-- Row 2: File Manipulation -->
  <rect x="60" y="160" width="180" height="40" fill="#DAA520" rx="5"/>
  <text x="150" y="188" fill="black" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">파일 조작</text>
  <text x="270" y="175" fill="white" font-size="16" font-family="sans-serif">• 파일 생성/삭제/열기/닫기</text>
  <text x="270" y="200" fill="white" font-size="16" font-family="sans-serif">• 파일 읽기/쓰기/재배치, 파일 속성 획득/지정</text>

  <line x1="50" y1="220" x2="750" y2="220" stroke="#555" stroke-width="1"/>

  <!-- Row 3: Device Manipulation -->
  <rect x="60" y="240" width="180" height="40" fill="#DAA520" rx="5"/>
  <text x="150" y="268" fill="black" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">장치 조작</text>
  <text x="270" y="255" fill="white" font-size="16" font-family="sans-serif">• 장치 요구/해제, 장치 읽기/쓰기/재배치</text>
  <text x="270" y="280" fill="white" font-size="16" font-family="sans-serif">• 장치 속성 획득/설정, 논리적 부착/제거</text>

  <line x1="50" y1="300" x2="750" y2="300" stroke="#555" stroke-width="1"/>

  <!-- Row 4: Info Management -->
  <rect x="60" y="320" width="180" height="40" fill="#DAA520" rx="5"/>
  <text x="150" y="348" fill="black" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">정보 관리</text>
  <text x="270" y="335" fill="white" font-size="16" font-family="sans-serif">• 시간과 날짜 설정/획득</text>
  <text x="270" y="360" fill="white" font-size="16" font-family="sans-serif">• 프로세스, 파일, 장치 속성의 설정/획득</text>

</svg>
