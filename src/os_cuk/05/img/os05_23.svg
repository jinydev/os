<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #ecf0f1;
        --hl: #81ecec;
        --err: #ff7675;
        --line: #2d3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #2d3436;
          --hl: #00cec9;
          --err: #d63031;
          --line: #dfe6e9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold;}
      .title { font-size: 26px; }
      .box-p { fill: #fff; stroke: var(--line); stroke-width: 2; rx: 8; }
      .box-mem { fill: var(--hl); stroke: var(--line); stroke-width: 2; rx: 8; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .cross { stroke: var(--err); stroke-width: 6; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">상호배제(Mutual Exclusion)의 개념 구조</text>

  <!-- Step 1 -->
  <rect x="150" y="100" width="300" height="300" fill="transparent" stroke="var(--line)" stroke-width="2"/>
  <text x="300" y="80" class="text" fill="#ff7675" font-size="22" text-anchor="middle">1단계: P1 선점</text>
  
  <rect x="230" y="120" width="140" height="50" class="box-p"/>
  <text x="300" y="153" class="text" fill="#2d3436" text-anchor="middle">P1 프로세스</text>

  <rect x="230" y="280" width="140" height="80" class="box-mem"/>
  <text x="300" y="320" class="text" fill="#2d3436" text-anchor="middle">공유 메모리</text>
  <text x="300" y="345" class="text" fill="#2d3436" font-size="16" text-anchor="middle">(임계 영역)</text>

  <path d="M 300 170 L 300 270" class="arrow"/>
  <text x="385" y="225" class="text" font-size="14" text-anchor="middle">P1 임계 영역 진입</text>

  <!-- Step 2 -->
  <rect x="550" y="100" width="300" height="300" fill="transparent" stroke="var(--line)" stroke-width="2"/>
  <text x="700" y="80" class="text" fill="#ff7675" font-size="22" text-anchor="middle">2단계: P2 접근 차단</text>

  <rect x="630" y="120" width="140" height="50" class="box-p"/>
  <text x="700" y="153" class="text" fill="#2d3436" text-anchor="middle">P2 프로세스</text>

  <rect x="630" y="280" width="140" height="80" class="box-mem" fill="#b2bec3"/>
  <text x="700" y="320" class="text" fill="#2d3436" text-anchor="middle">공유 메모리</text>
  <text x="700" y="345" class="text" fill="#2d3436" font-size="16" text-anchor="middle">(P1이 점유 중)</text>

  <path d="M 700 170 L 700 270" class="arrow"/>
  <path d="M 660 200 L 740 250" class="cross"/>
  <path d="M 740 200 L 660 250" class="cross"/>
  <text x="810" y="225" class="text" font-size="14" fill="var(--err)" text-anchor="middle">P2 접근 불가 (대기)</text>

</svg>
