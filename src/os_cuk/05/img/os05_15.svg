<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #3498db;
        --box-text: #ffffff;
        --line: #2d3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #2980b9;
          --box-text: #ecf0f1;
          --line: #dfe6e9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .title { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: bold; }
      .box { fill: var(--box); rx: 4; }
      .box-text { fill: var(--box-text); font-family: 'Inter', sans-serif; font-size: 22px; font-weight: bold; text-anchor: middle; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">비동기 정보 전달을 위한 생산자-소비자(Producer-Consumer) 아키텍처</text>

  <!-- Row 1 -->
  <text x="250" y="160" class="text" text-anchor="end">라인 프린터 드라이버</text>
  <path class="arrow" d="M 270 150 L 380 150"/>
  <text x="325" y="130" class="text" font-size="16" text-anchor="middle" fill="#e74c3c">생산 (Produce)</text>
  
  <rect x="400" y="120" width="200" height="60" class="box"/>
  <text x="500" y="158" class="box-text">문자 스트림</text>

  <path class="arrow" d="M 620 150 L 730 150"/>
  <text x="675" y="130" class="text" font-size="16" text-anchor="middle" fill="#e74c3c">소비 (Consume)</text>
  <text x="750" y="160" class="text" text-anchor="start">라인 프린터</text>

  <!-- Row 2 -->
  <text x="250" y="260" class="text" text-anchor="end">컴파일러 (Compiler)</text>
  <path class="arrow" d="M 270 250 L 380 250"/>
  <text x="325" y="230" class="text" font-size="16" text-anchor="middle" fill="#e74c3c">생산</text>
  
  <rect x="400" y="220" width="200" height="60" class="box"/>
  <text x="500" y="258" class="box-text">어셈블리 코드</text>

  <path class="arrow" d="M 620 250 L 730 250"/>
  <text x="675" y="230" class="text" font-size="16" text-anchor="middle" fill="#e74c3c">소비</text>
  <text x="750" y="260" class="text" text-anchor="start">어셈블러 (Assembler)</text>

  <!-- Row 3 -->
  <text x="250" y="360" class="text" text-anchor="end">어셈블러 (Assembler)</text>
  <path class="arrow" d="M 270 350 L 380 350"/>
  <text x="325" y="330" class="text" font-size="16" text-anchor="middle" fill="#e74c3c">생산</text>
  
  <rect x="400" y="320" width="200" height="60" class="box"/>
  <text x="500" y="358" class="box-text">목적 모듈 (Object)</text>

  <path class="arrow" d="M 620 350 L 730 350"/>
  <text x="675" y="330" class="text" font-size="16" text-anchor="middle" fill="#e74c3c">소비</text>
  <text x="750" y="360" class="text" text-anchor="start">로더 (Loader)</text>

  <!-- Footer description -->
  <rect x="250" y="440" width="500" height="40" fill="#f1c40f" rx="4"/>
  <text x="500" y="466" class="text" fill="#2d3436" text-anchor="middle">현대 컴퓨팅 시스템 전체를 흐르는 근본적인 데이터 스트림 패턴</text>

</svg>
