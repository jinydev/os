<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #3498db;
        --diamond: #e67e22;
        --line: #2d3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #2980b9;
          --diamond: #d35400;
          --line: #dfe6e9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .title { font-size: 26px; font-weight: bold; }
      .box { fill: var(--box); stroke: var(--line); stroke-width: 2; rx: 4; }
      .diamond { fill: var(--diamond); stroke: var(--line); stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">세마포어 프로토콜의 P/V 원자적 연산</text>

  <!-- P(S) wait operation -->
  <text x="300" y="120" class="text title" text-anchor="middle">wait(S) - P연산 (진입)</text>
  
  <path d="M 300 140 L 300 200" class="arrow"/>
  
  <!-- Diamond -->
  <polygon points="300,200 400,240 300,280 200,240" class="diamond"/>
  <text x="300" y="248" class="text" fill="#fff" text-anchor="middle" font-size="24">S</text>
  
  <!-- S <= 0 Loop -->
  <path d="M 200 240 L 150 240 L 150 160 L 290 160" class="arrow"/>
  <text x="140" y="200" class="text" text-anchor="end">S &lt;= 0 인 경우 (자원 없음)</text>
  <text x="140" y="225" class="text" text-anchor="end" fill="#ff7675">Busy Wait (대기)</text>
  
  <!-- S > 0 Flow -->
  <path d="M 300 280 L 300 320" class="arrow"/>
  <text x="310" y="305" class="text" text-anchor="start">S &gt; 0 (자원 있음)</text>

  <rect x="225" y="320" width="150" height="60" class="box"/>
  <text x="300" y="360" class="text" fill="#fff" font-size="24" text-anchor="middle">S = S - 1</text>

  <path d="M 300 380 L 300 440" class="arrow"/>
  <text x="310" y="420" class="text" text-anchor="start">임계 영역으로 진행</text>


  <!-- V(S) signal operation -->
  <text x="700" y="120" class="text title" text-anchor="middle">signal(S) - V연산 (반납)</text>
  
  <path d="M 700 140 L 700 220" class="arrow"/>

  <rect x="625" y="220" width="150" height="60" class="box"/>
  <text x="700" y="260" class="text" fill="#fff" font-size="24" text-anchor="middle">S = S + 1</text>

  <path d="M 700 280 L 700 360" class="arrow"/>
  <text x="710" y="330" class="text" text-anchor="start">대기 중인 프로세스 깨움</text>

</svg>
