<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --proc: #3498db;
        --res: #1abc9c;
        --err: #e74c3c;
        --line: #2d3436;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --proc: #2980b9;
          --res: #16a085;
          --err: #c0392b;
          --line: #dfe6e9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
      .title { font-size: 24px; font-weight: bold; }
      .proc { fill: var(--proc); stroke: var(--line); stroke-width: 2; rx: 20; }
      .res-box { fill: var(--res); stroke: var(--line); stroke-width: 2; rx: 8; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-err { stroke: var(--err); stroke-width: 3; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrowhead-err); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
    <marker id="arrowhead-err" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--err)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">계수 세마포어(Counting Semaphore)의 자원 관리 한도</text>

  <!-- Requesting Processes -->
  <text x="200" y="100" class="title text" text-anchor="middle">프로세스 그룹</text>
  
  <rect x="150" y="130" width="100" height="40" class="proc"/>
  <text x="200" y="157" class="text" fill="#fff" text-anchor="middle">P 1</text>
  <path d="M 250 150 L 580 160" class="arrow"/>

  <rect x="150" y="190" width="100" height="40" class="proc"/>
  <text x="200" y="217" class="text" fill="#fff" text-anchor="middle">P 2</text>
  <path d="M 250 210 L 580 220" class="arrow"/>

  <text x="200" y="260" class="text" text-anchor="middle">...</text>

  <rect x="150" y="280" width="100" height="40" class="proc"/>
  <text x="200" y="307" class="text" fill="#fff" text-anchor="middle">P N</text>
  <path d="M 250 300 L 580 280" class="arrow"/>

  <rect x="150" y="360" width="100" height="40" class="proc"/>
  <text x="200" y="387" class="text" fill="#fff" text-anchor="middle">P N+1</text>
  <path d="M 250 380 L 580 340" class="arrow-err"/>

  <text x="350" y="415" class="text" fill="var(--err)">자원 한도 도달 -> Block 되어 대기 큐로 이동</text>

  <!-- Resource Container -->
  <rect x="600" y="120" width="200" height="260" class="res-box"/>
  <text x="700" y="100" class="title text" text-anchor="middle">자원 풀 (Limit: N)</text>

  <rect x="625" y="140" width="150" height="30" fill="#fff" rx="4"/>
  <text x="700" y="162" class="text" fill="#2d3436" text-anchor="middle">자원 인스턴스 1</text>

  <rect x="625" y="190" width="150" height="30" fill="#fff" rx="4"/>
  <text x="700" y="212" class="text" fill="#2d3436" text-anchor="middle">자원 인스턴스 2</text>

  <text x="700" y="250" class="text" fill="#2d3436" text-anchor="middle">...</text>

  <rect x="625" y="260" width="150" height="30" fill="#fff" rx="4"/>
  <text x="700" y="282" class="text" fill="#2d3436" text-anchor="middle">자원 인스턴스 N-1</text>

  <rect x="625" y="320" width="150" height="30" fill="#fff" rx="4"/>
  <text x="700" y="342" class="text" fill="#2d3436" text-anchor="middle">자원 인스턴스 N</text>

</svg>
