<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --buf: #ecf0f1;
        --buf-fill: #1abc9c;
        --line: #2d3436;
        --p-color: #3498db;
        --c-color: #e67e22;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --buf: #2d3436;
          --buf-fill: #16a085;
          --line: #dfe6e9;
          --p-color: #2980b9;
          --c-color: #d35400;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; }
      .title { font-size: 26px; font-weight: bold; }
      .buf { fill: var(--buf); stroke: var(--line); stroke-width: 2; }
      .filled { fill: var(--buf-fill); stroke: var(--line); stroke-width: 2; }
      .arrow { stroke: var(--p-color); stroke-width: 4; fill: none; marker-end: url(#arrowhead-in); }
      .arrow-out { stroke: var(--c-color); stroke-width: 4; fill: none; marker-end: url(#arrowhead-out); }
    </style>
    <marker id="arrowhead-in" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--p-color)"/>
    </marker>
    <marker id="arrowhead-out" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--c-color)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">공유 메모리를 이용한 중간 버퍼 (Circular Buffer) 매커니즘</text>

  <!-- Circular Buffer drawn as a linear buffer wrapper visually representing circular -->
  <g transform="translate(500, 250)">
    <!-- Base circles -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="var(--line)" stroke-width="2"/>
    <circle cx="0" cy="0" r="70" class="bg" stroke="var(--line)" stroke-width="2"/>
    
    <!-- Dividers -->
    <path d="M 0 -140 L 0 -70" class="buf"/>
    <path d="M 99 -99 L 49 -49" class="buf"/>
    <path d="M 140 0 L 70 0" class="buf"/>
    <path d="M 99 99 L 49 49" class="buf"/>
    <path d="M 0 140 L 0 70" class="buf"/>
    <path d="M -99 99 L -49 49" class="buf"/>
    <path d="M -140 0 L -70 0" class="buf"/>
    <path d="M -99 -99 L -49 -49" class="buf"/>

    <!-- Fill items -->
    <circle cx="75" cy="-75" r="15" fill="var(--buf-fill)"/>
    <circle cx="105" cy="0" r="15" fill="var(--buf-fill)"/>
    <circle cx="75" cy="75" r="15" fill="var(--buf-fill)"/>
    <circle cx="0" cy="105" r="15" fill="var(--buf-fill)"/>
    <circle cx="-75" cy="75" r="15" fill="var(--buf-fill)"/>

    <!-- Pointers -->
    <!-- in -->
    <path d="M -200 65 L -100 65" class="arrow"/>
    <text x="-210" y="70" class="text" font-size="16" font-weight="bold" text-anchor="end">다음 생산 위치 (in)</text>

    <!-- out -->
    <path d="M 200 -65 L 100 -65" class="arrow-out"/>
    <text x="210" y="-60" class="text" font-size="16" font-weight="bold" text-anchor="start">다음 소비 위치 (out)</text>

    <!-- Movement arrorws -->
    <path d="M -150 -60 A 160 160 0 0 1 0 -160" stroke="#7f8c8d" stroke-width="3" fill="none" marker-end="url(#arrowhead-in)"/>
    <path d="M 150 60 A 160 160 0 0 1 0 160" stroke="#7f8c8d" stroke-width="3" fill="none" marker-end="url(#arrowhead-in)"/>
  </g>

  <!-- Process Blocks -->
  <rect x="50" y="210" width="120" height="40" fill="var(--p-color)" rx="4"/>
  <text x="110" y="238" fill="#fff" font-family="Inter" font-weight="bold" font-size="20" text-anchor="middle">생산자</text>
  <path d="M 180 230 L 250 230" class="arrow"/>

  <rect x="830" y="210" width="120" height="40" fill="var(--c-color)" rx="4"/>
  <text x="890" y="238" fill="#fff" font-family="Inter" font-weight="bold" font-size="20" text-anchor="middle">소비자</text>
  <path d="M 750 230 L 820 230" class="arrow-out"/>

</svg>
