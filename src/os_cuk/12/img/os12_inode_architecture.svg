<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --inode: #e67e22;
        --direct: #f39c12;
        --indirect: #3498db;
        --d-indirect: #9b59b6;
        --data: #27ae60;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --inode: #d35400;
          --direct: #f1c40f;
          --indirect: #2980b9;
          --d-indirect: #8e44ad;
          --data: #2ecc71;
          --line: #95a5a6;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 16px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: normal; }
      .title { font-size: 26px; }
      .inode-box { fill: transparent; stroke: var(--inode); stroke-width: 3; rx: 5; }
      .cell { fill: transparent; stroke: var(--line); stroke-width: 1; }
      .data-block { fill: var(--data); stroke: var(--bg); stroke-width: 1; rx: 3; }
      .ptr-block { fill: var(--indirect); rx: 3; }
      .arrow { stroke: var(--line); stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">UNIX i-node (Index Node) 커널 아키텍처</text>
  <text x="500" y="70" class="text-sm" text-anchor="middle">거대한 파일을 단 수십 바이트의 메타데이터 블록만으로 트리 형태로 탐색해내는 시스템</text>

  <!-- iNode Structure Base -->
  <text x="120" y="120" class="text" text-anchor="middle" fill="var(--inode)">i-node 블록</text>
  <rect x="50" y="140" width="140" height="330" class="inode-box"/>
  
  <rect x="50" y="140" width="140" height="80" fill="var(--bg)" stroke="var(--line)"/>
  <text x="120" y="165" class="text-sm" text-anchor="middle">File Mode, Owner</text>
  <text x="120" y="185" class="text-sm" text-anchor="middle">Timestamps</text>
  <text x="120" y="205" class="text-sm" text-anchor="middle">File Size</text>

  <!-- Direct Pointers -->
  <rect x="50" y="220" width="140" height="25" fill="var(--direct)"/>
  <text x="120" y="238" class="text-sm" fill="#fff" text-anchor="middle">Direct Block 0</text>
  
  <rect x="50" y="245" width="140" height="25" fill="var(--direct)"/>
  <text x="120" y="263" class="text-sm" fill="#fff" text-anchor="middle">Direct Block 1</text>
  
  <text x="120" y="290" class="text-sm" text-anchor="middle">...</text>
  
  <rect x="50" y="300" width="140" height="25" fill="var(--direct)"/>
  <text x="120" y="318" class="text-sm" fill="#fff" text-anchor="middle">Direct Block 11</text>

  <!-- Indirect -->
  <rect x="50" y="350" width="140" height="35" fill="var(--indirect)"/>
  <text x="120" y="372" class="text-sm" fill="#fff" text-anchor="middle">단일 간접 (Single)</text>

  <rect x="50" y="390" width="140" height="35" fill="var(--d-indirect)"/>
  <text x="120" y="412" class="text-sm" fill="#fff" text-anchor="middle">이중 간접 (Double)</text>

  <rect x="50" y="430" width="140" height="40" fill="#2c3e50"/>
  <text x="120" y="455" class="text-sm" fill="#fff" text-anchor="middle">삼중간접 (Triple)</text>

  <!-- Pointers rendering -->
  
  <!-- Direct File Data -->
  <text x="350" y="120" class="text" text-anchor="middle" fill="var(--data)">실제 데이터 블록</text>
  <rect x="300" y="215" width="100" height="35" class="data-block"/>
  <text x="350" y="238" class="text-sm" fill="#fff" text-anchor="middle">Data (4KB)</text>
  <path d="M 190 232 L 295 232" class="arrow"/>

  <!-- Single Indirect -->
  <text x="350" y="310" class="text" text-anchor="middle" fill="var(--indirect)">인덱스 블록</text>
  <rect x="300" y="330" width="100" height="80" class="ptr-block"/>
  <rect x="300" y="330" width="100" height="20" class="cell"/>
  <rect x="300" y="350" width="100" height="20" class="cell"/>
  <rect x="300" y="370" width="100" height="20" class="cell"/>
  <path d="M 190 367 L 295 367" class="arrow"/>
  
  <text x="350" y="385" class="text-sm" fill="#fff" text-anchor="middle">Pointers...</text>

  <!-- Single Indirect Data target -->
  <rect x="470" y="325" width="100" height="35" class="data-block"/>
  <text x="520" y="348" class="text-sm" fill="#fff" text-anchor="middle">Data (4KB)</text>
  <path d="M 400 340 L 465 340" class="arrow"/>
  
  <rect x="470" y="365" width="100" height="35" class="data-block"/>
  <text x="520" y="388" class="text-sm" fill="#fff" text-anchor="middle">Data (4KB)</text>
  <path d="M 400 360 L 465 375" class="arrow"/>


  <!-- Double indirect -->
  <rect x="300" y="440" width="100" height="40" fill="var(--d-indirect)" rx="3"/>
  <path d="M 190 407 Q 240 407 240 460 L 295 460" class="arrow"/>
  <text x="350" y="465" class="text-sm" fill="#fff" text-anchor="middle">Pointer Array</text>
  
  <rect x="470" y="420" width="100" height="80" class="ptr-block"/>
  <rect x="470" y="420" width="100" height="20" class="cell"/>
  <rect x="470" y="440" width="100" height="20" class="cell"/>
  <path d="M 400 460 L 465 460" class="arrow"/>
  
  <rect x="620" y="415" width="100" height="35" class="data-block"/>
  <text x="670" y="438" class="text-sm" fill="#fff" text-anchor="middle">Data (4KB)</text>
  <path d="M 570 430 L 615 430" class="arrow"/>


  <!-- Explanation Right -->
  <rect x="750" y="140" width="230" height="300" fill="var(--bg)" stroke="var(--line)" stroke-width="2" rx="10"/>
  <text x="865" y="170" class="text">용량 비례 매핑 구조</text>
  <text x="765" y="210" class="text-sm">- Direct: 즉시 접근 (크기작음)</text>
  <text x="765" y="240" class="text-sm">- Single: 1번 점프 (수백 MB)</text>
  <text x="765" y="270" class="text-sm">- Double: 2번 점프 (수십 GB)</text>
  <text x="765" y="300" class="text-sm">- Triple: 3번 점프 (수 TB)</text>
  
  <text x="765" y="380" class="text-sm" fill="var(--inode)">파일이 커질수록 탐색 뎁스도 길어진다.</text>

</svg>
