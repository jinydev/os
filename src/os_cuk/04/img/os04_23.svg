<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --text-mut: #7f8c8d;
        --tc-bg: #ecf0f1;
        --tc-border: #bdc3c7;
        --header-bg: #e3f2fd;
        --header-border: #64b5f6;
        --stack: #48dbfb;
        --heap: #c8d6e5;
        --data: #2980b9;
        --code: #95a5a6;
        --line: #2d3436;
        --ptr1: #e74c3c;
        --ptr-pc: #f39c12;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --text-mut: #b2bec3;
          --tc-bg: #1e272e;
          --tc-border: #485460;
          --header-bg: #112d4e;
          --header-border: #21618c;
          --stack: #0984e3;
          --heap: #636e72;
          --data: #0f1c3f;
          --code: #353b48;
          --line: #dfe6e9;
          --ptr1: #ff6b81;
          --ptr-pc: #f1c40f;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', system-ui, sans-serif; }
      .text-w { fill: #fff; font-family: 'Inter', system-ui, sans-serif; font-weight: bold; }
      .title { font-size: 26px; font-weight: bold; }
      .box { stroke: var(--bg); stroke-width: 2; }
      .tcb { fill: var(--tc-bg); stroke: var(--tc-border); stroke-width: 2; rx: 4; }
      .tcb-head { fill: var(--header-bg); stroke: var(--header-border); stroke-width: 2; rx: 4; }
      .ptr-sp { stroke: var(--ptr1); stroke-width: 3; fill: none; marker-end: url(#arrow-sp); }
      .ptr-pc { stroke: var(--ptr-pc); stroke-width: 3; fill: none; marker-end: url(#arrow-pc); }
    </style>
    <marker id="arrow-sp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--ptr1)"/>
    </marker>
    <marker id="arrow-pc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--ptr-pc)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>

  <text x="500" y="40" class="text title" text-anchor="middle">스레드 제어 블록 (TCB, Thread Control Block) 공간 매핑</text>

  <!-- Process Memory Map -->
  <g transform="translate(50, 100)">
    <text x="100" y="-20" class="text" font-size="20" font-weight="bold" text-anchor="middle">프로세스 주소 공간</text>
    <rect x="0" y="0" width="200" height="500" fill="none" stroke="var(--line)" stroke-width="2"/>
    
    <!-- Stacks (Shared area representation) -->
    <rect x="0" y="0" width="200" height="150" fill="var(--os)" class="box"/>
    <text x="100" y="80" class="text" font-size="20" font-weight="bold" text-anchor="middle">스택 (Stack)</text>

    <!-- Heap Area -->
    <rect x="0" y="150" width="200" height="100" fill="var(--heap)" class="box"/>
    <text x="100" y="210" class="text" font-size="20" font-weight="bold" text-anchor="middle">힙 (Heap)</text>

    <!-- Data Area -->
    <rect x="0" y="250" width="200" height="100" fill="var(--data)" class="box"/>
    <text x="100" y="310" class="text-w" font-size="20" text-anchor="middle">데이터 (Data)</text>

    <!-- Text Area -->
    <rect x="0" y="350" width="200" height="150" fill="var(--code)" class="box"/>
    <text x="100" y="430" class="text" font-size="20" font-weight="bold" text-anchor="middle">텍스트/코드</text>
  </g>

  <!-- Dedicated Thread Stacks (Zoomed in logically) -->
  <g transform="translate(350, 80)">
    <rect x="0" y="0" width="600" height="520" fill="none" stroke="var(--line)" stroke-width="1" rx="8" stroke-dasharray="8 8"/>
    <text x="300" y="30" class="text" font-size="20" font-weight="bold" text-anchor="middle" fill="var(--ptr1)">스레드 전용 공간 및 제어 블록</text>

    <!-- TCB 1 -->
    <g transform="translate(40, 60)">
      <rect x="0" y="0" width="120" height="100" class="tcb"/>
      <rect x="0" y="0" width="120" height="33" class="tcb-head"/>
      <text x="60" y="22" class="text" font-weight="bold" text-anchor="middle">Thread ID</text>
      <text x="60" y="55" class="text" font-weight="bold" text-anchor="middle">PC</text>
      <text x="60" y="88" class="text" font-weight="bold" text-anchor="middle">SP</text>

      <rect x="0" y="150" width="120" height="250" fill="var(--stack)" class="box"/>
      <text x="60" y="280" class="text-w" font-size="20" text-anchor="middle">스택 1</text>
      <path class="ptr-sp" d="M0,80 L-20,80 L-20,200 L-5,200"/>
      <!-- PC pointer to Code -->
      <path class="ptr-pc" d="M-20,48 L-140,48 L-140,400 L-100,400"/>
    </g>

    <!-- TCB 2 -->
    <g transform="translate(240, 60)">
      <rect x="0" y="0" width="120" height="100" class="tcb"/>
      <rect x="0" y="0" width="120" height="33" class="tcb-head"/>
      <text x="60" y="22" class="text" font-weight="bold" text-anchor="middle">Thread ID</text>
      <text x="60" y="55" class="text" font-weight="bold" text-anchor="middle">PC</text>
      <text x="60" y="88" class="text" font-weight="bold" text-anchor="middle">SP</text>

      <rect x="0" y="150" width="120" height="250" fill="var(--stack)" class="box"/>
      <text x="60" y="280" class="text-w" font-size="20" text-anchor="middle">스택 2</text>
      <path class="ptr-sp" d="M0,80 L-20,80 L-20,200 L-5,200"/>
      <!-- PC pointer to Code -->
      <path class="ptr-pc" d="M-20,48 L-320,48 L-320,430 L-300,430"/>
    </g>

    <!-- TCB 3 -->
    <g transform="translate(440, 60)">
      <rect x="0" y="0" width="120" height="100" class="tcb"/>
      <rect x="0" y="0" width="120" height="33" class="tcb-head"/>
      <text x="60" y="22" class="text" font-weight="bold" text-anchor="middle">Thread ID</text>
      <text x="60" y="55" class="text" font-weight="bold" text-anchor="middle">PC</text>
      <text x="60" y="88" class="text" font-weight="bold" text-anchor="middle">SP</text>

      <rect x="0" y="150" width="120" height="250" fill="var(--stack)" class="box"/>
      <text x="60" y="280" class="text-w" font-size="20" text-anchor="middle">스택 3</text>
      <path class="ptr-sp" d="M0,80 L-20,80 L-20,200 L-5,200"/>
      <!-- PC pointer to Code -->
      <path class="ptr-pc" d="M-20,48 L-500,48 L-500,460 L-500,460"/>
      <polygon points="-500,460, -490,463.5, -500,467" fill="var(--ptr-pc)"/>
    </g>
  </g>

</svg>
