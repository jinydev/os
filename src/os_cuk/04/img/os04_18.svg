<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-main: #2c3e50;
        --text-muted: #596a7b;
        --accent-blue: #3498db;
        --accent-purple: #9b59b6;
        --accent-green: #2ecc71;
        --accent-red: #e74c3c;
        --box-bg: #ecf0f1;
        --box-border: #bdc3c7;
        --proc-bg: #e3f2fd;
        --proc-border: #64b5f6;
        --thread-color: #2e86de;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #121212;
          --text-main: #ecf0f1;
          --text-muted: #95a5a6;
          --accent-blue: #3498db;
          --accent-purple: #9b59b6;
          --accent-green: #2ecc71;
          --accent-red: #e74c3c;
          --box-bg: #1e272e;
          --box-border: #485460;
          --proc-bg: #112d4e;
          --proc-border: #21618c;
          --thread-color: #48dbfb;
        }
      }
      .bg { fill: var(--bg-color); }
      .text-main { fill: var(--text-main); font-family: 'Inter', system-ui, sans-serif; }
      .text-muted { fill: var(--text-muted); font-family: 'Inter', system-ui, sans-serif; }
      .proc-circle { fill: var(--proc-bg); stroke: var(--proc-border); stroke-width: 4; }
      .title { font-size: 26px; font-weight: bold; font-family: 'Inter', system-ui, sans-serif; fill: var(--text-main); }
      .label { font-size: 18px; font-weight: 600; text-anchor: middle; fill: var(--text-main); }
      .thread { stroke: var(--thread-color); stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrow { stroke: var(--text-muted); stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-muted)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>

  <text x="500" y="50" class="title" text-anchor="middle">스레드 활용 사례 : 웹 브라우저 프로세스 (Web Browser Process)</text>
  <text x="500" y="80" class="text-muted" text-anchor="middle" font-size="16">다중 스레드(Multi-thread)를 이용한 비동기 작업 분리</text>

  <!-- Process Circle -->
  <circle cx="500" cy="280" r="140" class="proc-circle"/>
  <text x="500" y="450" class="label text-main">웹 브라우저 프로세스 영역</text>

  <!-- Cache box -->
  <rect x="440" y="360" width="120" height="30" fill="var(--box-bg)" stroke="var(--box-border)" stroke-width="2"/>
  <text x="500" y="380" class="label" font-size="14">웹 페이지 캐시 메모리</text>

  <!-- Thread 1 -->
  <path class="thread" d="M420,180 Q390,200 420,220 T420,260 T420,300 T420,340"/>
  <!-- Thread 2 -->
  <path class="thread" d="M500,180 Q470,200 500,220 T500,260 T500,300 T500,340"/>
  <!-- Thread 3 -->
  <path class="thread" d="M580,180 Q550,200 580,220 T580,260 T580,300 T580,340"/>

  <!-- Annotations -->
  <text x="250" y="270" class="label">네트워크 연결/다운로드 스레드</text>
  <text x="250" y="295" class="text-muted" font-size="14">(Network I/O Thread)</text>
  <path class="arrow" d="M350,260 L400,260"/>

  <text x="500" y="120" class="label">이미지/텍스트 렌더링 스레드</text>
  <text x="500" y="145" class="text-muted" font-size="14">(Rendering / Parsing Thread)</text>
  <path class="arrow" d="M500,150 L500,170"/>

  <text x="770" y="270" class="label">사용자 상호작용 (UI) 스레드</text>
  <text x="770" y="295" class="text-muted" font-size="14">(User Interface Thread)</text>
  <path class="arrow" d="M640,260 L595,260"/>

  <text x="770" y="375" class="label">웹 페이지 캐시 자원 공유</text>
  <path class="arrow" d="M660,370 L570,370"/>

</svg>
