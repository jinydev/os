<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --node-parent: #3498db;
        --node-child: #2ecc71;
        --node-term: #e74c3c;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --node-parent: #2980b9;
          --node-child: #27ae60;
          --node-term: #c0392b;
          --line: #95a5a6;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: bold; }
      .node-text { fill: #fff; font-family: monospace; font-size: 20px; font-weight: bold; text-anchor: middle;}
      .node-p { fill: var(--node-parent); stroke: none; rx: 30; }
      .node-c { fill: var(--node-child); stroke: none; rx: 30; }
      .node-t { fill: var(--node-term); stroke: none; rx: 30; }
      .link { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .title { font-size: 24px; font-weight: bold; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>

  <text x="500" y="50" class="text title" text-anchor="middle">프로세스 생성 및 상태 변화 라이프사이클 (fork - exec - wait - exit)</text>

  <!-- Parent Process Line -->
  <text x="150" y="140" class="text">부모 프로세스</text>
  <rect x="250" y="100" width="120" height="60" class="node-p"/>
  <text x="310" y="137" class="node-text">fork()</text>

  <rect x="650" y="100" width="120" height="60" class="node-p"/>
  <text x="710" y="137" class="node-text">wait()</text>

  <rect x="850" y="100" width="100" height="60" class="node-p"/>
  <text x="900" y="137" class="node-text">resume</text>

  <path class="link" d="M150,130 L250,130" />
  <path class="link" d="M370,130 L650,130"/>
  <text x="500" y="120" class="text" fill="var(--line)">Blocked (대기 상태)</text>
  
  <path class="link" d="M770,130 L850,130"/>

  <!-- Child Process Line -->
  <text x="150" y="340" class="text">자식 프로세스</text>
  
  <rect x="450" y="300" width="120" height="60" class="node-c"/>
  <text x="510" y="337" class="node-text">exec()</text>

  <rect x="650" y="300" width="120" height="60" class="node-t"/>
  <text x="710" y="337" class="node-text">exit()</text>

  <!-- fork to exec -->
  <path class="link" d="M310,160 Q310,330 450,330" />
  <text x="350" y="320" class="text" fill="var(--node-child)">새로운 PID 할당</text>
  
  <!-- exec to exit -->
  <path class="link" d="M570,330 L650,330"/>
  <text x="610" y="320" class="text" text-anchor="middle">실행</text>

  <!-- exit to wait -->
  <path class="link" d="M710,300 L710,160"/>
  <text x="730" y="240" class="text" fill="var(--node-term)">종료 상태 반환</text>
  <text x="730" y="260" class="text" fill="var(--line)">SIGCHLD signal</text>

</svg>
