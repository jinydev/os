<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --text-mut: #7f8c8d;
        --user-bg: #ffecec;
        --user-border: #ffb8b8;
        --kernel-bg: #eceffd;
        --kernel-border: #b8c4ff;
        --hw-bg: #e8f8f5;
        --hw-border: #a3e4d7;
        --proc: #1abc9c;
        --thread: #e74c3c;
        --thread-k: #3498db;
        --tcb: #f39c12;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --text-mut: #a4b0be;
          --user-bg: #2d1a1a;
          --user-border: #5a2e2e;
          --kernel-bg: #1a1e2d;
          --kernel-border: #2e3b5a;
          --hw-bg: #1e2826;
          --hw-border: #385955;
          --proc: #1abc9c;
          --thread: #ff6b81;
          --thread-k: #70a1ff;
          --tcb: #ffa502;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', system-ui, sans-serif; }
      .text-mut { fill: var(--text-mut); font-family: 'Inter', system-ui, sans-serif; }
      .box-user { fill: var(--user-bg); stroke: var(--user-border); stroke-width: 2; rx: 8; }
      .box-kernel { fill: var(--kernel-bg); stroke: var(--kernel-border); stroke-width: 2; rx: 8; }
      .box-hw { fill: var(--hw-bg); stroke: var(--hw-border); stroke-width: 2; rx: 8; }
      .thread-u { stroke: var(--thread); stroke-width: 4; fill: none; }
      .thread-k { stroke: var(--thread-k); stroke-width: 4; fill: none; }
      .link { stroke: var(--text-mut); stroke-width: 2; fill: none; stroke-dasharray: 6 4; }
      .title { font-size: 24px; font-weight: bold; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-mut)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>

  <text x="500" y="40" class="text title" text-anchor="middle">사용자 수준 스레드 (User-Level Thread) : 다대일 (N:1) 매핑</text>

  <!-- Layers -->
  <rect x="50" y="80" width="900" height="230" class="box-user"/>
  <text x="70" y="110" class="text" font-size="18" font-weight="bold">사용자 영역 (User Space)</text>
  
  <rect x="50" y="320" width="900" height="150" class="box-kernel"/>
  <text x="70" y="350" class="text" font-size="18" font-weight="bold">커널 영역 (Kernel Space)</text>

  <rect x="50" y="480" width="900" height="100" class="box-hw"/>
  <text x="70" y="510" class="text" font-size="18" font-weight="bold">하드웨어 (Hardware)</text>

  <!-- Process & User Threads -->
  <circle cx="500" cy="180" r="80" fill="none" stroke="var(--proc)" stroke-width="4"/>
  <text x="500" y="90" class="text" font-size="16" text-anchor="middle">프로세스 (Process)</text>
  
  <!-- User threads -->
  <path class="thread-u" d="M460,130 Q440,150 460,170 T460,210 T460,250"/>
  <path class="thread-u" d="M500,130 Q480,150 500,170 T500,210 T500,250"/>
  <path class="thread-u" d="M540,130 Q520,150 540,170 T540,210 T540,250"/>
  
  <rect x="460" y="260" width="80" height="20" fill="var(--tcb)"/>
  <text x="500" y="275" fill="#fff" font-size="12" font-family="system-ui" text-anchor="middle" font-weight="bold">Thread Library</text>

  <!-- Kernel Thread -->
  <path class="thread-k" d="M500,340 Q480,360 500,380 T500,420 T500,460"/>
  
  <rect x="485" y="420" width="30" height="20" fill="#27ae60"/>
  <text x="500" y="435" fill="#fff" font-size="12" font-family="system-ui" text-anchor="middle" font-weight="bold">PCB</text>

  <!-- CPU -->
  <rect x="475" y="520" width="50" height="40" fill="#7f8c8d"/>
  <text x="500" y="545" fill="#fff" font-size="14" font-family="system-ui" text-anchor="middle" font-weight="bold">CPU</text>

  <!-- Mapping Lines -->
  <!-- N User threads to 1 Kernel thread -->
  <path class="link" d="M500,280 L500,340" marker-end="url(#arrow)"/>
  <path class="link" d="M500,460 L500,520" marker-end="url(#arrow)"/>

  <!-- Annotations Right Side -->
  <text x="650" y="160" class="text" font-size="16" font-weight="bold">사용자 수준 스레드</text>
  <text x="650" y="180" class="text-mut" font-size="14">(개발자가 스레드 라이브러리를 통해 관리)</text>

  <text x="650" y="270" class="text" font-size="16" font-weight="bold">스레드 제어 블록 (TCB)</text>
  <text x="650" y="290" class="text-mut" font-size="14">(커널은 TCB의 존재를 모름)</text>

  <text x="650" y="380" class="text" font-size="16" font-weight="bold">커널 수준 스레드</text>
  <text x="650" y="400" class="text-mut" font-size="14">(OS 커널이 인식하는 단일 실행 단위)</text>
  
  <text x="650" y="430" class="text" font-size="16" font-weight="bold">프로세스 제어 블록 (PCB)</text>

  <!-- Highlight Box -->
  <rect x="700" y="20" width="200" height="40" fill="#f1c40f" rx="4"/>
  <text x="800" y="46" fill="#000" font-size="18" font-family="system-ui" font-weight="bold" text-anchor="middle">다대일 (N:1) 매핑</text>

</svg>
