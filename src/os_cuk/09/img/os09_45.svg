<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #2980b9;
        --pipe: #1abc9c;
        --line: #34495e;
        --highlight: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #3498db;
          --pipe: #16a085;
          --line: #95a5a6;
          --highlight: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .title { font-size: 28px; }
      .proc-ellipse { fill: var(--box); }
      .pipe-cyl { fill: var(--pipe); rx: 10; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke: var(--line); stroke-width: 4; stroke-dasharray: 6 6; fill: none; opacity: 0.5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">부모-자식 간의 파이프(익명 파이프) 통신 구축</text>
  
  <text x="500" y="90" class="text" font-weight="normal" text-anchor="middle">파이프 생성 후 fork() 시 부모의 파일 기술자가 자식에게 복사됨</text>

  <!-- Parent Process -->
  <ellipse cx="200" cy="270" rx="110" ry="70" class="proc-ellipse"/>
  <text x="160" y="275" class="text" fill="#fff" text-anchor="middle" font-size="24">부모 프로세스</text>
  <text x="280" y="240" class="text" fill="#f1c40f">읽기(닫음)</text>
  <text x="280" y="320" class="text" fill="#f1c40f">쓰기</text>

  <!-- Child Process -->
  <ellipse cx="800" cy="270" rx="110" ry="70" class="proc-ellipse"/>
  <text x="840" y="275" class="text" fill="#fff" text-anchor="middle" font-size="24">자식 프로세스</text>
  <text x="720" y="240" class="text" fill="#f1c40f">읽기</text>
  <text x="720" y="320" class="text" fill="#f1c40f">쓰기(닫음)</text>

  <!-- Pipe -->
  <rect x="425" y="240" width="150" height="60" class="pipe-cyl"/>
  <text x="500" y="278" class="text" fill="#fff" text-anchor="middle" font-size="24">파이프</text>
  <ellipse cx="425" cy="270" rx="10" ry="30" fill="var(--bg)" opacity="0.3"/>

  <!-- Active Data Flow -->
  <path d="M 320 310 Q 380 320 420 280" class="arrow"/>
  <rect x="330" y="330" width="120" height="30" fill="#fce4ec" rx="5"/>
  <text x="390" y="352" class="text" fill="var(--highlight)" text-anchor="middle">filedes[1]</text>

  <path d="M 580 270 Q 640 240 700 230" class="arrow"/>
  <rect x="560" y="200" width="120" height="30" fill="#fce4ec" rx="5"/>
  <text x="620" y="222" class="text" fill="var(--highlight)" text-anchor="middle">filedes[0]</text>

  <!-- Closed Connections (dashed, indicating close()) -->
  <path d="M 430 250 Q 360 210 320 230" class="dashed"/>
  <path d="M 700 310 Q 620 330 550 290" class="dashed"/>

</svg>
