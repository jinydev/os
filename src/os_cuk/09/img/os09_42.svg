<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #2980b9;
        --pipe: #1abc9c;
        --line: #7f8c8d;
        --highlight: #f39c12;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #3498db;
          --pipe: #16a085;
          --line: #95a5a6;
          --highlight: #f1c40f;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .title { font-size: 28px; }
      .cmd-box { fill: transparent; stroke: var(--line); stroke-width: 2; rx: 8; }
      .proc-box { fill: var(--box); rx: 4; }
      .pipe-cyl { fill: var(--pipe); stroke: var(--bg); stroke-width: 2; rx: 15; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">파이프(Pipe)의 개념: 단방향 스트림 연결</text>

  <!-- Terminal Command Example -->
  <text x="150" y="110" class="text">터미널 명령어 활용 예시:</text>
  <rect x="150" y="130" width="300" height="80" class="cmd-box"/>
  <text x="170" y="180" class="text" font-family="monospace">$&gt; cat a.txt <tspan fill="var(--highlight)">|</tspan> wc</text>

  <!-- Architecture -->
  <text x="250" y="270" class="text" text-anchor="middle">Process #1</text>
  <rect x="150" y="280" width="200" height="60" class="proc-box"/>
  <text x="250" y="318" class="text" fill="#fff" text-anchor="middle" font-size="24">cat a.txt</text>

  <text x="750" y="270" class="text" text-anchor="middle">Process #2</text>
  <rect x="650" y="280" width="200" height="60" class="proc-box"/>
  <text x="750" y="318" class="text" fill="#fff" text-anchor="middle" font-size="24">wc</text>

  <!-- Pipe -->
  <rect x="420" y="270" width="160" height="80" class="pipe-cyl"/>
  <text x="500" y="318" class="text" fill="#fff" text-anchor="middle" font-size="26">파이프 (Pipe)</text>
  
  <ellipse cx="420" cy="310" rx="10" ry="40" fill="var(--pipe)" opacity="0.7"/>

  <!-- Data Flow -->
  <path d="M 350 310 L 410 310" class="arrow"/>
  <text x="380" y="300" class="text" fill="var(--highlight)" text-anchor="middle">표준 출력</text>

  <path d="M 580 310 L 640 310" class="arrow"/>
  <text x="610" y="300" class="text" fill="var(--highlight)" text-anchor="middle">표준 입력</text>

</svg>
