<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #2980b9;
        --pipe1: #1abc9c;
        --pipe2: #27ae60;
        --line: #34495e;
        --highlight: #e74c3c;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #3498db;
          --pipe1: #16a085;
          --pipe2: #2ecc71;
          --line: #95a5a6;
          --highlight: #ff7675;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .title { font-size: 28px; }
      .proc-ellipse { fill: var(--box); }
      .pipe-cyl1 { fill: var(--pipe1); rx: 10; }
      .pipe-cyl2 { fill: var(--pipe2); rx: 10; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">2개의 파이프를 이용한 프로세스 간 양방향 통신</text>
  
  <text x="500" y="90" class="text" font-weight="normal" text-anchor="middle">한 파이프는 단방향이므로, 송/수신을 각각 전담할 파이프 2개가 필요</text>

  <!-- Parent Process -->
  <ellipse cx="200" cy="270" rx="110" ry="70" class="proc-ellipse"/>
  <text x="160" y="275" class="text" fill="#fff" text-anchor="middle" font-size="24">부모 프로세스</text>
  <text x="280" y="240" class="text" fill="#f1c40f">읽기</text>
  <text x="280" y="320" class="text" fill="#f1c40f">쓰기</text>

  <!-- Child Process -->
  <ellipse cx="800" cy="270" rx="110" ry="70" class="proc-ellipse"/>
  <text x="840" y="275" class="text" fill="#fff" text-anchor="middle" font-size="24">자식 프로세스</text>
  <text x="720" y="240" class="text" fill="#f1c40f">쓰기</text>
  <text x="720" y="320" class="text" fill="#f1c40f">읽기</text>

  <!-- Pipe 1 -->
  <rect x="425" y="180" width="150" height="50" class="pipe-cyl1"/>
  <text x="500" y="212" class="text" fill="#fff" text-anchor="middle" font-size="22">파이프 #1</text>
  <ellipse cx="425" cy="205" rx="8" ry="25" fill="var(--bg)" opacity="0.3"/>

  <!-- Path for Pipe 1 (Parent Read, Child Write) -->
  <path d="M 690 230 Q 640 210 580 205" class="arrow"/>
  <path d="M 425 205 Q 350 205 300 230" class="arrow"/>

  <!-- Pipe 2 -->
  <rect x="425" y="310" width="150" height="50" class="pipe-cyl2"/>
  <text x="500" y="342" class="text" fill="#fff" text-anchor="middle" font-size="22">파이프 #2</text>
  <ellipse cx="425" cy="335" rx="8" ry="25" fill="var(--bg)" opacity="0.3"/>

  <!-- Path for Pipe 2 (Parent Write, Child Read) -->
  <path d="M 300 310 Q 350 330 420 335" class="arrow"/>
  <path d="M 580 335 Q 640 335 690 310" class="arrow"/>

</svg>
