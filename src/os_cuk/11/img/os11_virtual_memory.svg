<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --box: #34495e;
        --logical: #3498db;
        --physical: #27ae60;
        --disk: #8e44ad;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --box: #4a6278;
          --logical: #2980b9;
          --physical: #2ecc71;
          --disk: #9b59b6;
          --line: #95a5a6;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-weight: bold; font-size: 20px; }
      .text-sm { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; }
      .title { font-size: 28px; }
      .logical-box { fill: var(--logical); stroke: var(--bg); stroke-width: 2; }
      .physical-box { fill: var(--physical); stroke: var(--bg); stroke-width: 2; }
      .disk-shape { fill: var(--disk); opacity: 0.2; stroke: var(--disk); stroke-width: 3; }
      .empty-box { fill: transparent; stroke: var(--line); stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 2; fill: none; }
      .arrow-map { stroke: var(--line); stroke-width: 2; stroke-dasharray: 4 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="50" class="text title" text-anchor="middle">가상 메모리 (Virtual Memory) 매핑의 원리</text>
  <text x="500" y="80" class="text-sm" font-weight="normal" text-anchor="middle">메인 메모리보다 훨씬 큰 프로그램을 실행할 수 있는 이유</text>

  <!-- Logical Address Space -->
  <text x="250" y="140" class="text" text-anchor="middle">논리 주소 공간 (가상)</text>
  <rect x="200" y="160" width="100" height="240" class="empty-box"/>
  <rect x="200" y="160" width="100" height="40" class="logical-box"/>
  <rect x="200" y="200" width="100" height="40" class="logical-box"/>
  <rect x="200" y="240" width="100" height="40" class="logical-box"/>
  <rect x="200" y="280" width="100" height="40" class="logical-box"/>
  <!-- More logical space than physical -->
  <rect x="200" y="320" width="100" height="40" class="logical-box"/>
  <rect x="200" y="360" width="100" height="40" class="logical-box"/>
  
  <text x="250" y="186" class="text" fill="#fff" text-anchor="middle">Page 0</text>
  <text x="250" y="226" class="text" fill="#fff" text-anchor="middle">Page 1</text>
  <text x="250" y="266" class="text" fill="#fff" text-anchor="middle">Page 2</text>
  <text x="250" y="306" class="text" fill="#fff" text-anchor="middle">Page 3</text>
  <text x="250" y="346" class="text" fill="#fff" text-anchor="middle">Page 4</text>
  <text x="250" y="386" class="text" fill="#fff" text-anchor="middle">Page 5</text>


  <!-- Physical Memory -->
  <text x="500" y="200" class="text" text-anchor="middle">물리 메모리 (RAM)</text>
  <text x="500" y="220" class="text-sm" text-anchor="middle" fill="var(--physical)">(크기가 작음)</text>
  
  <rect x="450" y="240" width="100" height="120" class="empty-box"/>
  <rect x="450" y="240" width="100" height="40" class="physical-box"/>
  <rect x="450" y="280" width="100" height="40" class="empty-box"/>
  <rect x="450" y="320" width="100" height="40" class="physical-box"/>

  <text x="500" y="266" class="text" fill="#fff" text-anchor="middle">Page 0</text>
  <text x="500" y="346" class="text" fill="#fff" text-anchor="middle">Page 3</text>

  <!-- Virtual mapping lines logically -->
  <path d="M 300 180 L 450 260" class="arrow"/>
  <path d="M 300 300 L 450 340" class="arrow"/>


  <!-- Disk / Backing Store -->
  <text x="800" y="140" class="text" text-anchor="middle">2차 기억장치 (Disk SWAP)</text>
  <ellipse cx="800" cy="180" rx="90" ry="20" class="disk-shape"/>
  <path d="M 710 180 L 710 380 A 90 20 0 0 0 890 380 L 890 180" class="disk-shape"/>
  
  <!-- Disk Pages -->
  <rect x="750" y="220" width="100" height="40" class="logical-box" fill="var(--disk)"/>
  <rect x="750" y="270" width="100" height="40" class="logical-box" fill="var(--disk)"/>
  <rect x="750" y="320" width="100" height="40" class="logical-box" fill="var(--disk)"/>
  
  <text x="800" y="246" class="text" fill="#fff" text-anchor="middle">Page 1</text>
  <text x="800" y="296" class="text" fill="#fff" text-anchor="middle">Page 2</text>
  <text x="800" y="346" class="text" fill="#fff" text-anchor="middle">Page 4</text>
  
  <text x="800" y="390" class="text" fill="#fff" text-anchor="middle">Page 5</text>

  <!-- Page Map Lines to Disk -->
  <path d="M 300 220 C 500 220 600 240 750 240" class="arrow-map"/>
  <path d="M 300 260 C 500 260 600 290 750 290" class="arrow-map"/>
  <path d="M 300 340 C 500 340 600 340 750 340" class="arrow-map"/>
  <path d="M 300 380 C 500 400 680 400 780 390" class="arrow-map"/>

</svg>
