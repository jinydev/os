<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .block { rx: 8; stroke-width: 2; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#38BDF8"/>
        </marker>
        <marker id="arrowB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
        </marker>
    </defs>

    <rect width="900" height="600" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#F8FAFC" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="1">PROCESS CONTEXT SWITCHING</text>
    <text x="450" y="75" fill="#94A3B8" font-size="14" font-weight="400" text-anchor="middle">CPU interleaving between Process 0 and Process 1 managed by Kernel</text>

    <!-- Header Titles -->
    <text x="150" y="130" fill="#38BDF8" font-size="18" font-weight="800" text-anchor="middle">Process 0</text>
    <text x="450" y="130" fill="#F43F5E" font-size="18" font-weight="800" text-anchor="middle">OS System / Kernel</text>
    <text x="750" y="130" fill="#10B981" font-size="18" font-weight="800" text-anchor="middle">Process 1</text>

    <!-- Vertical Timelines -->
    <line x1="150" y1="150" x2="150" y2="550" stroke="#334155" stroke-width="4"/>
    <line x1="450" y1="150" x2="450" y2="550" stroke="#334155" stroke-width="4"/>
    <line x1="750" y1="150" x2="750" y2="550" stroke="#334155" stroke-width="4"/>

    <!-- P0 Execution Block -->
    <rect x="75" y="150" width="150" height="80" fill="#0C4A6E" stroke="#38BDF8" class="block"/>
    <text x="150" y="195" fill="#BAE6FD" font-size="16" font-weight="800" text-anchor="middle">Executing</text>

    <!-- Interrupt Arrow P0 to OS -->
    <path d="M 150 230 L 440 250" stroke="#38BDF8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <text x="290" y="235" fill="#93C5FD" font-size="12" font-weight="600" text-anchor="middle">Interrupt or Syscall</text>

    <!-- OS Save P0 / Load P1 -->
    <rect x="350" y="250" width="200" height="60" fill="#831843" stroke="#F43F5E" class="block"/>
    <text x="450" y="275" fill="#FFE4E6" font-size="14" font-weight="600" text-anchor="middle">Save state into PCB 0</text>
    <text x="450" y="295" fill="#FDA4AF" font-size="11" font-weight="400" text-anchor="middle">Registers, PC, Flags</text>

    <rect x="350" y="320" width="200" height="60" fill="#831843" stroke="#F43F5E" class="block"/>
    <text x="450" y="345" fill="#FFE4E6" font-size="14" font-weight="600" text-anchor="middle">Reload state from PCB 1</text>

    <!-- Arrow OS to P1 -->
    <path d="M 450 380 L 740 400" stroke="#38BDF8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    
    <!-- P1 Execution Block -->
    <rect x="675" y="400" width="150" height="80" fill="#064E3B" stroke="#10B981" class="block"/>
    <text x="750" y="445" fill="#A7F3D0" font-size="16" font-weight="800" text-anchor="middle">Executing</text>

    <!-- Idle gaps info -->
    <line x1="150" y1="230" x2="150" y2="550" stroke="#94A3B8" stroke-width="6" stroke-dasharray="4"/>
    <text x="90" y="380" fill="#64748B" font-size="14" font-weight="600" text-anchor="middle" transform="rotate(-90, 90, 380)">IDLE</text>

    <line x1="750" y1="150" x2="750" y2="400" stroke="#94A3B8" stroke-width="6" stroke-dasharray="4"/>
    <text x="810" y="280" fill="#64748B" font-size="14" font-weight="600" text-anchor="middle" transform="rotate(-90, 810, 280)">IDLE</text>

    <!-- OS Overhead Label -->
    <path d="M 570 250 L 600 250 L 600 380 L 570 380" stroke="#FB7185" stroke-width="2" fill="none"/>
    <text x="610" y="320" fill="#FB7185" font-size="14" font-weight="800" text-anchor="start">Overhead</text>

</svg>
