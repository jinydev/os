<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .block { rx: 6; stroke-width: 2; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
        <marker id="arrowB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#38BDF8"/>
        </marker>
    </defs>
    <rect width="900" height="600" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#F8FAFC" font-size="28" font-weight="800" text-anchor="middle">프로세스 문맥 교환 (Context Switch)의 흐름</text>

    <!-- Headers -->
    <text x="150" y="100" fill="#38BDF8" font-size="20" font-weight="800" text-anchor="middle">프로세스 P1</text>
    <text x="450" y="100" fill="#CBD5E1" font-size="20" font-weight="800" text-anchor="middle">운영체제 커널</text>
    <text x="750" y="100" fill="#10B981" font-size="20" font-weight="800" text-anchor="middle">프로세스 P2</text>

    <!-- Timelines axes -->
    <line x1="150" y1="120" x2="150" y2="560" stroke="#334155" stroke-width="4"/>
    <line x1="450" y1="120" x2="450" y2="560" stroke="#334155" stroke-width="4"/>
    <line x1="750" y1="120" x2="750" y2="560" stroke="#334155" stroke-width="4"/>

    <!-- P1 Execution -->
    <rect x="100" y="120" width="100" height="80" fill="#0C4A6E" stroke="#38BDF8" class="block"/>
    <text x="150" y="165" fill="#BAE6FD" font-size="16" font-weight="800" text-anchor="middle">실행 중</text>

    <path d="M 150 200 L 440 220" stroke="#38BDF8" stroke-width="3" fill="none" marker-end="url(#arrowB)"/>
    <text x="295" y="200" fill="#93C5FD" font-size="14" font-weight="600" text-anchor="middle">인터럽트 / 시스템호출</text>

    <!-- OS Work 1 -->
    <rect x="350" y="220" width="200" height="40" fill="#1E293B" stroke="#475569" class="block"/>
    <text x="450" y="245" fill="#F8FAFC" font-size="14" font-weight="600" text-anchor="middle">PCB 1 에 P1 상태 저장</text>

    <rect x="350" y="270" width="200" height="40" fill="#1E293B" stroke="#475569" class="block"/>
    <text x="450" y="295" fill="#F8FAFC" font-size="14" font-weight="600" text-anchor="middle">PCB 2 에서 P2 상태 로드</text>

    <path d="M 450 310 L 740 330" stroke="#10B981" stroke-width="3" fill="none" marker-end="url(#arrowB)"/>
    
    <!-- P2 Execution -->
    <rect x="700" y="330" width="100" height="80" fill="#064E3B" stroke="#10B981" class="block"/>
    <text x="750" y="375" fill="#A7F3D0" font-size="16" font-weight="800" text-anchor="middle">실행 중</text>

    <path d="M 750 410 L 460 430" stroke="#10B981" stroke-width="3" fill="none" marker-end="url(#arrowB)"/>
    <text x="605" y="410" fill="#6EE7B7" font-size="14" font-weight="600" text-anchor="middle">인터럽트 / 시스템호출</text>

    <!-- OS Work 2 -->
    <rect x="350" y="430" width="200" height="40" fill="#1E293B" stroke="#475569" class="block"/>
    <text x="450" y="455" fill="#F8FAFC" font-size="14" font-weight="600" text-anchor="middle">PCB 2 에 P2 상태 저장</text>

    <rect x="350" y="480" width="200" height="40" fill="#1E293B" stroke="#475569" class="block"/>
    <text x="450" y="505" fill="#F8FAFC" font-size="14" font-weight="600" text-anchor="middle">PCB 1 에서 P1 상태 로드</text>

    <path d="M 450 520 L 160 540" stroke="#38BDF8" stroke-width="3" fill="none" marker-end="url(#arrowB)"/>

    <!-- P1 Re-Execution -->
    <rect x="100" y="540" width="100" height="40" fill="#0C4A6E" stroke="#38BDF8" class="block"/>
    
    <!-- Idle lines overlay -->
    <line x1="150" y1="200" x2="150" y2="540" stroke="#64748B" stroke-width="8" stroke-dasharray="4"/>
    <text x="120" y="370" fill="#94A3B8" font-size="14" font-weight="800" transform="rotate(-90 120 370)">휴식 상태 (유휴)</text>

    <line x1="750" y1="120" x2="750" y2="330" stroke="#64748B" stroke-width="8" stroke-dasharray="4"/>
    <text x="780" y="225" fill="#94A3B8" font-size="14" font-weight="800" transform="rotate(90 780 225)">휴식 상태 (유휴)</text>
</svg>
