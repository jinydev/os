<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;family=Inter:wght@400;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .code { font-family: 'Fira Code', monospace; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
        </filter>
    </defs>
    <rect width="900" height="500" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#F8FAFC" font-size="28" font-weight="800" text-anchor="middle">운영체제에서 프로세스 목록 확인하기</text>
    
    <text x="450" y="90" fill="#94A3B8" font-size="18" text-anchor="middle">윈도우 계열: 작업 관리자 / UNIX 계열: ps, top 명령어</text>

    <!-- Terminal Mockup -->
    <g transform="translate(100, 130)" filter="url(#shadow)">
        <rect width="700" height="320" rx="12" fill="#000000" stroke="#334155" stroke-width="2"/>
        <rect width="700" height="30" rx="12" fill="#334155"/>
        <!-- Window Controls -->
        <circle cx="25" cy="15" r="6" fill="#EF4444"/>
        <circle cx="45" cy="15" r="6" fill="#F59E0B"/>
        <circle cx="65" cy="15" r="6" fill="#10B981"/>
        <text x="350" y="21" fill="#94A3B8" font-size="12" text-anchor="middle">bash — 80x24</text>

        <!-- Terminal Text -->
        <text x="20" y="60" fill="#A7F3D0" font-size="14" class="code" font-weight="600">$ top -bn1 | head -n 10</text>
        
        <text x="20" y="90" fill="#E2E8F0" font-size="13" class="code">top - 14:23:01 up  5:12,  2 users,  load average: 0.14, 0.22, 0.28</text>
        <text x="20" y="110" fill="#E2E8F0" font-size="13" class="code">Tasks: 135 total,   1 running, 134 sleeping,   0 stopped,   0 zombie</text>
        <text x="20" y="130" fill="#E2E8F0" font-size="13" class="code">%Cpu(s):  2.3 us,  1.1 sy,  0.0 ni, 95.8 id,  0.7 wa,  0.0 hi,  0.1 si,  0.0 st</text>
        
        <!-- Header -->
        <g transform="translate(20, 160)">
            <rect width="660" height="20" fill="#1E293B"/>
            <text x="0" y="14" fill="#38BDF8" font-size="13" class="code" font-weight="600">  PID USER      PR  NI    VIRT    RES    SHR S  %CPU  %MEM     TIME+ COMMAND</text>
        </g>
        
        <text x="20" y="195" fill="#E2E8F0" font-size="13" class="code"> 1121 root      20   0 3615464  81404  45332 S   3.1   0.5   1:34.52 gnome-shell</text>
        <text x="20" y="215" fill="#E2E8F0" font-size="13" class="code"> 2450 hojin     20   0 1345204 154320  65120 S   2.0   1.0   0:45.31 chrome</text>
        <text x="20" y="235" fill="#E2E8F0" font-size="13" class="code"> 1042 hojin     20   0  352110  25100  12000 S   0.5   0.2   0:10.15 code</text>
        <text x="20" y="255" fill="#E2E8F0" font-size="13" class="code"> 2841 hojin     20   0   14340   4210   3100 R   0.0   0.0   0:00.01 top</text>
        <text x="20" y="275" fill="#E2E8F0" font-size="13" class="code">    1 root      20   0  167440  11450   8200 S   0.0   0.1   0:02.10 systemd</text>
        <text x="20" y="295" fill="#E2E8F0" font-size="13" class="code">   12 root      20   0       0      0      0 S   0.0   0.0   0:00.00 kworker</text>
        
        <text x="20" y="340" fill="#A7F3D0" font-size="14" class="code" font-weight="600">$ <tspan fill="#E2E8F0">▉</tspan></text>
    </g>
</svg>
