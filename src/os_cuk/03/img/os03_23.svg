<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" fill="none">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
            text { font-family: 'Inter', sans-serif; }
            .box { stroke-width: 2; rx: 8; }
        </style>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#1E293B"/>
        </linearGradient>
    </defs>
    <rect width="900" height="600" rx="20" fill="url(#bg)"/>
    <text x="450" y="50" fill="#F8FAFC" font-size="28" font-weight="800" text-anchor="middle">프로세스 제어 블록 (PCB) 세부 정보</text>

    <g transform="translate(50, 90)">
        <!-- PID -->
        <rect x="0" y="0" width="250" height="50" fill="#0C4A6E" stroke="#0284C7" class="box"/>
        <text x="125" y="32" fill="#E0F2FE" font-size="20" font-weight="800" text-anchor="middle">프로세스 식별자 (PID)</text>
        <rect x="270" y="0" width="530" height="50" fill="#1E293B" stroke="#475569" class="box"/>
        <text x="290" y="30" fill="#94A3B8" font-size="16" font-weight="600">각 프로세스의 고유 식별자 숫자 (주민번호와 유사)</text>

        <!-- State -->
        <rect x="0" y="70" width="250" height="50" fill="#065F46" stroke="#059669" class="box"/>
        <text x="125" y="102" fill="#D1FAE5" font-size="20" font-weight="800" text-anchor="middle">프로세스 상태</text>
        <rect x="270" y="70" width="530" height="50" fill="#1E293B" stroke="#475569" class="box"/>
        <text x="290" y="100" fill="#94A3B8" font-size="16" font-weight="600">생성, 준비, 실행, 대기, 종료 등 현재 상태 표시</text>

        <!-- Program Counter -->
        <rect x="0" y="140" width="250" height="50" fill="#4C1D95" stroke="#7C3AED" class="box"/>
        <text x="125" y="172" fill="#EDE9FE" font-size="20" font-weight="800" text-anchor="middle">프로그램 카운터 (PC)</text>
        <rect x="270" y="140" width="530" height="50" fill="#1E293B" stroke="#475569" class="box"/>
        <text x="290" y="170" fill="#94A3B8" font-size="16" font-weight="600">해당 프로세스가 이어서 실행해야 할 다음 명령어의 메모리 주소</text>

        <!-- Registers -->
        <rect x="0" y="210" width="250" height="90" fill="#831843" stroke="#E11D48" class="box"/>
        <text x="125" y="260" fill="#FFE4E6" font-size="20" font-weight="800" text-anchor="middle">CPU 레지스터 정보</text>
        <rect x="270" y="210" width="530" height="90" fill="#1E293B" stroke="#475569" class="box"/>
        <text x="290" y="240" fill="#94A3B8" font-size="15" font-weight="600">누산기, 스택 포인터, 범용 레지스터 등 문맥 교환 시 백업되는</text>
        <text x="290" y="270" fill="#94A3B8" font-size="15" font-weight="600">하드웨어 문맥(Context)의 스냅샷 데이터</text>

        <!-- Scheduling Info -->
        <rect x="0" y="320" width="250" height="50" fill="#B45309" stroke="#D97706" class="box"/>
        <text x="125" y="352" fill="#FEF3C7" font-size="20" font-weight="800" text-anchor="middle">스케줄링 및 우선순위</text>
        <rect x="270" y="320" width="530" height="50" fill="#1E293B" stroke="#475569" class="box"/>
        <text x="290" y="350" fill="#94A3B8" font-size="16" font-weight="600">스케줄링 우선순위, 큐 포인터 등 자원 할당 정책 매개변수</text>

        <!-- IO/Mem Info -->
        <rect x="0" y="390" width="250" height="90" fill="#1D4ED8" stroke="#3B82F6" class="box"/>
        <text x="125" y="430" fill="#DBEAFE" font-size="20" font-weight="800" text-anchor="middle">메모리 / 입출력 정보</text>
        <rect x="270" y="390" width="530" height="90" fill="#1E293B" stroke="#475569" class="box"/>
        <text x="290" y="420" fill="#94A3B8" font-size="15" font-weight="600">페이지 테이블이나 세그먼트 주소 경계 레지스터 값</text>
        <text x="290" y="450" fill="#94A3B8" font-size="15" font-weight="600">열린 파일(Open File Deskriptors) 리스트 등</text>

    </g>
</svg>
