<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --axis: #bdc3c7;
        --p1: #3498db;
        --p2: #e74c3c;
        --p3: #2ecc71;
        --p4: #f1c40f;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --axis: #7f8c8d;
          --p1: #2980b9;
          --p2: #c0392b;
          --p3: #27ae60;
          --p4: #f39c12;
          --line: #b2bec3;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
      .desc { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; }
      .title { font-size: 24px; }
      .axis { stroke: var(--axis); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .tick { stroke: var(--axis); stroke-width: 2; fill: none; }
      
      .box1 { fill: var(--p1); }
      .box2 { fill: var(--p2); }
      .box3 { fill: var(--p3); }
      .box4 { fill: var(--p4); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--axis)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">FCFS vs SJF 스케줄링 간트 차트 (Gantt Chart) 비교</text>

  <text x="500" y="70" class="desc" text-anchor="middle">가정: 프로세스 도착(동시) 실행시간 - P1(24), P2(3), P3(3)</text>

  <!-- FCFS Section -->
  <text x="50" y="120" class="text">1. FCFS (선입선처리) : 들어온 순서대로 (P1 -> P2 -> P3)</text>
  
  <path d="M 50 180 L 950 180" class="axis"/>
  
  <!-- FCFS Gantt -->
  <rect x="50" y="140" width="720" height="40" class="box1"/>
  <text x="410" y="165" class="text" fill="#fff" text-anchor="middle">P1 (실행시간 24)</text>

  <rect x="770" y="140" width="90" height="40" class="box2"/>
  <text x="815" y="165" class="text" fill="#fff" text-anchor="middle">P2 (3)</text>

  <rect x="860" y="140" width="90" height="40" class="box3"/>
  <text x="905" y="165" class="text" fill="#fff" text-anchor="middle">P3 (3)</text>

  <!-- FCFS Timeline Ticks -->
  <path d="M 50 180 L 50 190" class="tick"/><text x="50" y="210" class="desc" text-anchor="middle">0</text>
  <path d="M 770 180 L 770 190" class="tick"/><text x="770" y="210" class="desc" text-anchor="middle">24</text>
  <path d="M 860 180 L 860 190" class="tick"/><text x="860" y="210" class="desc" text-anchor="middle">27</text>
  <path d="M 950 180 L 950 190" class="tick"/><text x="950" y="210" class="desc" text-anchor="middle">30</text>

  <text x="50" y="240" class="text" fill="var(--p2)">호위 효과(Convoy Effect): P1(긴 놈) 때문에 P2, P3이 길게 대기함 -> FCFS 평균 대기시간 = (0 + 24 + 27) / 3 = 17ms</text>


  <!-- SJF Section -->
  <path d="M 50 270 L 950 270" stroke="var(--line)" stroke-width="2" stroke-dasharray="10 10"/>

  <text x="50" y="310" class="text">2. SJF (최소작업 우선) : 짧은 것부터 (P2 -> P3 -> P1)</text>

  <path d="M 50 370 L 950 370" class="axis"/>

  <!-- SJF Gantt -->
  <rect x="50" y="330" width="90" height="40" class="box2"/>
  <text x="95" y="355" class="text" fill="#fff" text-anchor="middle">P2 (3)</text>

  <rect x="140" y="330" width="90" height="40" class="box3"/>
  <text x="185" y="355" class="text" fill="#fff" text-anchor="middle">P3 (3)</text>

  <rect x="230" y="330" width="720" height="40" class="box1"/>
  <text x="590" y="355" class="text" fill="#fff" text-anchor="middle">P1 (실행시간 24)</text>

  <!-- SJF Timeline Ticks -->
  <path d="M 50 370 L 50 380" class="tick"/><text x="50" y="400" class="desc" text-anchor="middle">0</text>
  <path d="M 140 370 L 140 380" class="tick"/><text x="140" y="400" class="desc" text-anchor="middle">3</text>
  <path d="M 230 370 L 230 380" class="tick"/><text x="230" y="400" class="desc" text-anchor="middle">6</text>
  <path d="M 950 370 L 950 380" class="tick"/><text x="950" y="400" class="desc" text-anchor="middle">30</text>

  <text x="50" y="430" class="text" fill="var(--p3)">SJF 최적화: 짧은 프로세스를 앞당기면 -> SJF 평균 대기시간 = (0(P2) + 3(P3) + 6(P1)) / 3 = 3ms (성능 급상승)</text>

</svg>
