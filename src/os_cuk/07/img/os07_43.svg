<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --axis: #34495e;
        --p1: #3f51b5;
        --p2: #00bcd4;
        --p3: #1976d2;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --axis: #bdc3c7;
          --p1: #5c6bc0;
          --p2: #26c6da;
          --p3: #42a5f5;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .title { font-size: 24px; }
      .axis { stroke: var(--axis); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .measure { stroke: var(--axis); stroke-width: 2; fill: none; marker-start: url(#arrowhead-rev); marker-end: url(#arrowhead); }
      .dashed { stroke: var(--axis); stroke-dasharray: 6 6; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--axis)"/>
    </marker>
    <marker id="arrowhead-rev" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="var(--axis)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">프로세스 대기시간과 반환시간 측정 예시</text>
  <text x="500" y="70" class="text" font-weight="normal" text-anchor="middle">(조건: P1, P2, P3는 동시에 도착)</text>

  <!-- P1 Box -->
  <rect x="200" y="220" width="200" height="40" fill="var(--p1)"/>
  <text x="300" y="248" class="text" fill="#fff" text-anchor="middle">P1</text>

  <!-- P2 Box -->
  <rect x="400" y="220" width="120" height="40" fill="var(--p2)"/>
  <text x="460" y="248" class="text" fill="#fff" text-anchor="middle">P2</text>

  <!-- P3 Box -->
  <rect x="520" y="220" width="300" height="40" fill="var(--p3)"/>
  <text x="670" y="248" class="text" fill="#fff" text-anchor="middle">P3</text>

  <!-- Timeline Axis -->
  <path d="M 200 270 L 900 270" class="axis" stroke="var(--p3)"/>
  <text x="880" y="295" class="text">시간</text>

  <!-- Vertical dashed lines -->
  <path d="M 200 100 L 200 380" class="dashed"/>
  <path d="M 400 140 L 400 380" class="dashed"/>
  <path d="M 520 100 L 520 380" class="dashed"/>
  <path d="M 820 100 L 820 220" class="dashed"/>


  <!-- Measurements Above: Turn-around Time -->
  <!-- P3 Turnaround -->
  <path d="M 200 110 L 820 110" class="measure"/>
  <rect x="470" y="95" width="100" height="30" fill="var(--bg)"/>
  <text x="520" y="117" class="text" text-anchor="middle">P3 반환시간</text>

  <!-- P2 Turnaround -->
  <path d="M 200 160 L 520 160" class="measure"/>
  <rect x="310" y="145" width="100" height="30" fill="var(--bg)"/>
  <text x="360" y="167" class="text" text-anchor="middle">P2 반환시간</text>

  <!-- P1 Turnaround -->
  <path d="M 200 200 L 400 200" class="measure"/>
  <rect x="250" y="185" width="100" height="30" fill="var(--bg)"/>
  <text x="300" y="207" class="text" text-anchor="middle">P1 반환시간</text>


  <!-- Measurements Below: Waiting Time -->
  <!-- P1 Waiting = 0 -->
  <rect x="120" y="290" width="140" height="30" fill="var(--bg)" stroke="var(--axis)" stroke-width="1"/>
  <text x="190" y="312" class="text" text-anchor="middle">P1 대기시간 = 0</text>

  <!-- P2 Waiting -->
  <path d="M 200 340 L 400 340" class="measure"/>
  <rect x="250" y="325" width="100" height="30" fill="var(--bg)"/>
  <text x="300" y="347" class="text" text-anchor="middle">P2 대기시간</text>

  <!-- P3 Waiting -->
  <path d="M 200 380 L 520 380" class="measure"/>
  <rect x="310" y="365" width="100" height="30" fill="var(--bg)"/>
  <text x="360" y="387" class="text" text-anchor="middle">P3 대기시간</text>

</svg>
