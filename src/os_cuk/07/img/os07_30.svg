<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --queue: #5c6bc0;
        --cpu: #2980b9;
        --disk: #1abc9c;
        --line: #7f8c8d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --queue: #3f51b5;
          --cpu: #3498db;
          --disk: #16a085;
          --line: #b2bec3;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; }
      .desc { font-weight: normal; font-size: 16px; fill: var(--text); }
      .title { font-size: 24px; }
      .queue-box { fill: var(--queue); stroke: #fff; stroke-width: 2; }
      .cpu-ellipse { fill: var(--cpu); stroke: #fff; stroke-width: 2; }
      .disk-cyl { fill: var(--disk); stroke: #fff; stroke-width: 2; }
      .arrow { stroke: var(--line); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: var(--line); stroke-width: 3; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">장기 스케줄러와 단기 스케줄러의 큐잉 도표</text>

  <!-- Disk -->
  <path d="M 120 180 Q 170 160 220 180 L 220 260 Q 170 280 120 260 Z" class="disk-cyl"/>
  <path d="M 120 180 Q 170 200 220 180" stroke="#fff" stroke-width="2" fill="none"/>
  <text x="170" y="230" class="text" fill="#fff" text-anchor="middle">디스크</text>

  <!-- Ready Queue -->
  <rect x="300" y="190" width="160" height="50" class="queue-box"/>
  <text x="380" y="223" class="text" fill="#fff" text-anchor="middle">준비 큐</text>

  <!-- CPU -->
  <ellipse cx="650" cy="215" rx="70" ry="60" class="cpu-ellipse"/>
  <text x="650" y="210" class="text" fill="#fff" text-anchor="middle" font-size="28">CPU</text>
  <text x="650" y="240" class="text" fill="#fff" text-anchor="middle">프로세서</text>

  <!-- IO Device -->
  <ellipse cx="320" cy="350" rx="60" ry="45" class="cpu-ellipse"/>
  <text x="320" y="345" class="text" fill="#fff" text-anchor="middle">입출력</text>
  <text x="320" y="370" class="text" fill="#fff" text-anchor="middle">장치</text>

  <!-- IO Queue -->
  <rect x="500" y="325" width="160" height="50" class="queue-box"/>
  <text x="580" y="358" class="text" fill="#fff" text-anchor="middle">입출력장치 큐</text>

  <!-- Edges -->
  <!-- Long term scheduler -->
  <path d="M 220 215 L 290 215" class="arrow"/>
  <path d="M 255 120 L 255 205" class="arrow-dashed"/>
  <text x="255" y="100" class="text" text-anchor="middle">장기 스케줄러</text>

  <!-- Short term scheduler -->
  <path d="M 460 215 L 570 215" class="arrow"/>
  <path d="M 515 120 L 515 205" class="arrow-dashed"/>
  <text x="515" y="100" class="text" text-anchor="middle">단기 스케줄러</text>

  <!-- CPU -> End -->
  <path d="M 720 215 L 850 215" class="arrow"/>
  <text x="880" y="223" class="text" text-anchor="middle">종료</text>

  <!-- CPU -> IO Queue -->
  <path d="M 720 215 L 750 215 L 750 350 L 670 350" class="arrow"/>

  <!-- IO Queue -> IO Device -->
  <path d="M 500 350 L 390 350" class="arrow"/>

  <!-- IO Device -> Ready Queue -->
  <path d="M 320 305 L 320 250" stroke="var(--line)" stroke-width="4" fill="none"/>
  <path d="M 260 250 L 320 250" stroke="var(--line)" stroke-width="4" fill="none"/>
  <path d="M 260 380 L 260 250" stroke="var(--line)" stroke-width="4" fill="none"/>
  <path d="M 320 395 L 320 380 L 260 380" stroke="var(--line)" stroke-width="4" fill="none"/>

</svg>
