<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --axis: #34495e;
        --p1: #1565c0;
        --p2: #1976d2;
        --p3: #2196f3;
        --p4: #42a5f5;
        --p5: #64b5f6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --axis: #bdc3c7;
          --p1: #3f51b5;
          --p2: #5c6bc0;
          --p3: #7986cb;
          --p4: #9fa8da;
          --p5: #c5cae9;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
      .desc { font-weight: normal; font-size: 16px; fill: var(--text); }
      .title { font-size: 24px; }
      .gantt-bg { fill: var(--p2); stroke: var(--bg); stroke-width: 2; }
      .axis { stroke: var(--axis); stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">선입선처리 스케줄링의 예 #2 (도착 순서 최적화 체험)</text>

  <!-- Source Table Mapping -->
  <text x="50" y="80" class="text" text-anchor="start">도착: P3(0), P1(1), P4(2), P5(3), P2(4)  <tspan fill="#e74c3c">(도착 순서가 바뀜)</tspan></text>
  <text x="50" y="110" class="text" text-anchor="start">실행: P3(6), P1(10), P4(4), P5(14), P2(28)</text>

  <!-- FCFS Gantt Box -->
  <!-- Timeline Start = 0 -->
  <text x="100" y="270" class="text" text-anchor="middle">0</text>
  
  <!-- P3 (0 to 6) -> Length = 6 -->
  <rect x="100" y="160" width="60" height="80" class="gantt-bg" fill="var(--p3)"/>
  <text x="130" y="205" class="text" fill="#fff" text-anchor="middle" font-size="22">P3</text>
  <text x="160" y="270" class="text" text-anchor="middle">6</text>

  <!-- P1 (6 to 16) -> Length = 10 -->
  <rect x="160" y="160" width="100" height="80" class="gantt-bg" fill="var(--p1)"/>
  <text x="210" y="205" class="text" fill="#fff" text-anchor="middle" font-size="22">P1</text>
  <text x="260" y="270" class="text" text-anchor="middle">16</text>

  <!-- P4 (16 to 20) -> Length = 4 -->
  <rect x="260" y="160" width="40" height="80" class="gantt-bg" fill="var(--p4)"/>
  <text x="280" y="205" class="text" fill="#fff" text-anchor="middle" font-size="18">P4</text>
  <text x="300" y="270" class="text" text-anchor="middle">20</text>

  <!-- P5 (20 to 34) -> Length = 14 -->
  <rect x="300" y="160" width="140" height="80" class="gantt-bg" fill="var(--p5)"/>
  <text x="370" y="205" class="text" fill="#fff" text-anchor="middle" font-size="22">P5</text>
  <text x="440" y="270" class="text" text-anchor="middle">34</text>

  <!-- P2 (34 to 62) -> Length = 28 -->
  <rect x="440" y="160" width="280" height="80" class="gantt-bg" fill="var(--p2)"/>
  <text x="580" y="205" class="text" fill="#fff" text-anchor="middle" font-size="22">P2</text>
  <text x="720" y="270" class="text" text-anchor="middle">62</text>


  <!-- Metrics Box -->
  <rect x="50" y="320" width="900" height="100" fill="transparent" stroke="var(--axis)" stroke-width="2"/>
  
  <text x="80" y="350" class="text">반환시간 (완료 - 도착)</text>
  <text x="80" y="380" class="desc">P1: 15, P2: 58, P3: 6, P4: 18, P5: 31 (평균: <tspan fill="#e74c3c" font-weight="bold">25.6</tspan> ▼)</text>

  <text x="500" y="350" class="text">대기시간</text>
  <text x="500" y="380" class="desc">P1: 5, P2: 30, P3: 0, P4: 14, P5: 17 (평균: <tspan fill="#e74c3c" font-weight="bold">13.2</tspan> ▼)</text>

</svg>
