<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --axis: #7f8c8d;
        --p1: #3498db;
        --p2: #e74c3c;
        --int: #f1c40f;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --axis: #b2bec3;
          --p1: #2980b9;
          --p2: #c0392b;
          --int: #f39c12;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
      .desc { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; }
      .title { font-size: 24px; }
      .axis { stroke: var(--axis); stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .box1 { fill: var(--p1); }
      .box2 { fill: var(--p2); }
      .warn { fill: var(--int); font-size: 30px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--axis)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">선점형(Preemptive) vs 비선점형(Non-Preemptive) 스케줄링</text>

  <!-- Non-Preemptive Section -->
  <text x="100" y="100" class="text">1. 비선점형 (Non-Preemptive)</text>
  <text x="120" y="130" class="desc">- 프로세스가 자발적으로 CPU를 반납(종료 또는 I/O)할 때까지 뺏기지 않음</text>
  
  <path d="M 100 180 L 900 180" class="axis"/>
  <text x="910" y="185" class="desc">Time</text>
  
  <!-- P1 Executing -->
  <rect x="150" y="150" width="300" height="30" class="box1"/>
  <text x="300" y="171" class="text" fill="#fff" text-anchor="middle">P1 수행 완료까지 독점</text>
  
  <!-- High Priority P2 arrives but has to wait -->
  <text x="300" y="140" class="warn" text-anchor="middle">↓</text>
  <text x="330" y="130" class="desc" fill="var(--p2)">우선순위 높은 P2 도착</text>
  
  <!-- P2 executes only after P1 finishes -->
  <rect x="470" y="150" width="150" height="30" class="box2"/>
  <text x="545" y="171" class="text" fill="#fff" text-anchor="middle">P2 대기 후 수행</text>


  <!-- Preemptive Section -->
  <path d="M 100 240 L 900 240" stroke="var(--axis)" stroke-width="2" stroke-dasharray="10 10"/>

  <text x="100" y="280" class="text">2. 선점형 (Preemptive)</text>
  <text x="120" y="310" class="desc">- OS 인터럽트나 우선순위 상위 프로세스 등장 시 강제로 CPU를 빼앗아 할당함 (Context Switch)</text>
  
  <path d="M 100 360 L 900 360" class="axis"/>
  <text x="910" y="365" class="desc">Time</text>

  <!-- P1 Executing Part 1 -->
  <rect x="150" y="330" width="150" height="30" class="box1"/>
  <text x="225" y="351" class="text" fill="#fff" text-anchor="middle">P1 실행</text>

  <!-- High Priority P2 arrives and PREEMPTS -->
  <text x="300" y="320" class="warn" text-anchor="middle">↓</text>
  <text x="330" y="310" class="desc" fill="var(--p2)">P2 도착 -> 강제 선점!</text>

  <!-- P2 executes immediately -->
  <rect x="310" y="330" width="150" height="30" class="box2"/>
  <text x="385" y="351" class="text" fill="#fff" text-anchor="middle">P2 우선 실행 (Preempt)</text>

  <!-- P1 resumes afterwards -->
  <rect x="470" y="330" width="150" height="30" class="box1"/>
  <text x="545" y="351" class="text" fill="#fff" text-anchor="middle">P1 잔여 실행</text>
  <path d="M 150 375 L 470 375" stroke="var(--p1)" stroke-width="2" stroke-dasharray="4 4" fill="none"/>
  <path d="M 470 375 L 470 365" stroke="var(--p1)" stroke-width="2" fill="none"/>
  <text x="470" y="390" class="desc" fill="var(--p1)" text-anchor="middle">Context Switch</text>

</svg>
