<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --text: #2c3e50;
        --disk: #7f8c8d;
        --mem: #3498db;
        --cpu: #e74c3c;
        --line: #2c3e50;
        --highlight: #f1c40f;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --text: #ecf0f1;
          --disk: #636e72;
          --mem: #2980b9;
          --cpu: #c0392b;
          --line: #bdc3c7;
          --highlight: #f39c12;
        }
      }
      .bg { fill: var(--bg); }
      .text { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
      .desc { fill: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; }
      .title { font-size: 24px; }
      .box { fill: var(--bg); stroke: var(--text); stroke-width: 2; rx: 8; }
      .disk-shape { fill: var(--disk); stroke: var(--bg); stroke-width: 2; }
      .mem-shape { fill: var(--mem); stroke: var(--bg); stroke-width: 2; rx: 8; }
      .cpu-shape { fill: var(--cpu); stroke: var(--bg); stroke-width: 2; rx: 50; }
      .arrow { stroke: var(--line); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: var(--line); stroke-width: 3; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <text x="500" y="40" class="text title" text-anchor="middle">CPU 스케줄러 계층 구조 (장기 / 중기 / 단기)</text>

  <!-- Job Pool / Disk -->
  <rect x="80" y="200" width="120" height="140" class="disk-shape" rx="10"/>
  <path d="M 80 220 Q 140 240 200 220" stroke="var(--bg)" stroke-width="2" fill="none"/>
  <path d="M 80 320 Q 140 340 200 320" stroke="var(--bg)" stroke-width="2" fill="none"/>
  <text x="140" y="280" class="text" fill="#fff" text-anchor="middle">디스크</text>
  <text x="140" y="300" class="desc" fill="#fff" text-anchor="middle">(Job Pool)</text>

  <!-- Ready Queue / Memory -->
  <rect x="400" y="230" width="150" height="80" class="mem-shape"/>
  <text x="475" y="270" class="text" fill="#fff" text-anchor="middle">준비 큐 (Memory)</text>
  <text x="475" y="290" class="desc" fill="#fff" text-anchor="middle">(Ready Queue)</text>

  <!-- Wait / I/O Queue -->
  <rect x="400" y="380" width="150" height="80" class="box"/>
  <text x="475" y="420" class="text" text-anchor="middle">대기 큐 (I/O)</text>
  <text x="475" y="440" class="desc" text-anchor="middle">(Wait Queue)</text>

  <!-- CPU -->
  <circle cx="800" cy="270" r="60" class="cpu-shape"/>
  <text x="800" y="275" class="text" fill="#fff" text-anchor="middle" font-size="24">CPU</text>

  <!-- Edges -->
  <!-- Long-term: Disk to Memory -->
  <path d="M 200 250 L 390 250" class="arrow"/>
  <text x="295" y="210" class="text" text-anchor="middle" fill="var(--highlight)">장기 스케줄러</text>
  <text x="295" y="235" class="desc" text-anchor="middle">메모리 적재 승인 (Job)</text>

  <!-- Short-term: Memory to CPU -->
  <path d="M 550 270 L 730 270" class="arrow"/>
  <text x="640" y="240" class="text" text-anchor="middle" fill="var(--cpu)">단기 스케줄러 (Dispatcher)</text>
  <text x="640" y="260" class="desc" text-anchor="middle">CPU 할당</text>

  <!-- I/O Request: CPU to Wait Queue -->
  <path d="M 800 330 L 800 420 L 550 420" class="arrow"/>
  <text x="675" y="410" class="desc" text-anchor="middle">I/O 요청</text>

  <!-- I/O Complete: Wait Queue to Ready Queue -->
  <path d="M 400 420 L 350 420 L 350 290 L 390 290" class="arrow"/>
  <text x="340" y="380" class="desc" text-anchor="end">I/O 완료 / 인터럽트</text>

  <!-- Completion: CPU to Terminated -->
  <path d="M 860 270 L 950 270" class="arrow"/>
  <text x="910" y="260" class="desc" text-anchor="middle">종료</text>

  <!-- Medium-term: Memory Swap -->
  <path d="M 475 230 L 475 140 L 140 140 L 140 190" class="arrow-dashed"/>
  <text x="310" y="110" class="text" text-anchor="middle" fill="var(--mem)">중기 스케줄러</text>
  <text x="310" y="130" class="desc" text-anchor="middle">스와핑 (Swapping): 다중 프로그래밍 과부하 시 메모리에서 디스크로 쫓아냄</text>

</svg>
